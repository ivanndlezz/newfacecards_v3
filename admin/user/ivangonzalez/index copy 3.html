    <style>
      :root {
        --background-color: #efefef;
        --font-color: #111111;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background-color: #e6e6e6; /* Fondo gris claro exterior */
        color: var(--font-color);
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        scroll-behavior: smooth;
        transition: blur-start;
      }

      #app {
        width: 100%;
        max-width: 500px;
        display: flex;
        flex-direction: column;
        position: relative;
      }

      /* === HEADER (PIXEL PERFECT) === */
      .header__actions {
        display: flex;
        justify-content: space-between;
        align-items: center;
        width: -webkit-fill-available;
        margin: 50px 10px;
        margin-bottom: 30px;
        box-sizing: border-box;
        position: sticky;
        top: 30px;
        transition: all 0.3s ease;
        transform: scale(var(--scale, 1));
        filter: blur(var(--blur, 0px));
      }

      .header__menu {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .header__back-btn {
        background: transparent;
        border: solid 1px #555 !important;
        color: #333;
        border: none;
        padding: 8px 16px 8px 8px;
        border-radius: 15px;
        font-size: 18px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
      }

      .header__back-btn svg {
        transform: rotate(90deg) translateX(3px);
        --wh: 24px;
        width: var(--wh);
        height: var(--wh);
      }

      .header__title-container {
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .header__title {
        font-size: 16px;
        font-weight: 400;
        color: #111;
      }

      .header__module-icon svg {
        width: 16px;
        height: 16px;
        opacity: 0.8;
        transform: translateY(3px);
      }

      .header__cta {
        background: #06896c; /* Verde del botón publish */
        color: white;
        border: none;
        padding: 8px 18px 8px 14px;
        border-radius: 25px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 8px;
        transition: all 0.3s ease;
        min-height: 47px;
      }

      .header__cta svg {
        width: 18px;
        height: 18px;
      }

      .header__cta--cancel {
        display: none;
      }

      .header__cta-container:has(#publishBtn) {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 0px 9px 26px;
        font-size: 18px;
      }

      .header__cta-container:has(#publishBtn) svg {
        width: 24px;
        height: 24px;
        opacity: 0.8;
      }

      #publishBtn {
        min-width: 133px;
        z-index: 1;
        justify-content: center;
      }

      #completePublishBtn {
        position: absolute;
      }

      header {
        transition: all 0.3s ease;
      }

      [data-top-menu="hidden"] + #app {
        header {
          margin-bottom: -50px;
          transform: translatey(-105px);
        }
      }

      .header__action.handler {
        display: flex;
        width: -webkit-fill-available;
        justify-content: center;
      }

      .handler--drag {
        padding: 8px 15px;
        border-radius: 100px;
        background-color: #fff;
        margin: 5px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        cursor: pointer;
        z-index: 1;
      }

      .handler--drag:before,
      .handler--drag:after {
        content: "";
        display: block;
        width: 18px;
        height: 4px;
        background: #ccc;
        border-radius: 2px;
        transition: all 0.2s;
      }

      .handler--drag:before {
        margin-right: -1px;
      }
      .handler--drag:after {
        margin-left: -1px;
      }

      [data-top-menu="hidden"] + #app .handler--drag:before {
        transform: rotate(16deg);
      }
      [data-top-menu="hidden"] + #app .handler--drag:after {
        transform: rotate(-16deg);
      }

      #data-status-storage:not([data-top-menu="hidden"])
        + #app
        .handler--drag:before {
        transform: rotate(-16deg);
      }
      #data-status-storage:not([data-top-menu="hidden"])
        + #app
        .handler--drag:after {
        transform: rotate(16deg);
      }

      /* === MAIN CONTENT (CARD) === */
      .main-content {
        background: var(--background-color);
        min-height: calc(100vh - 160px);
        position: relative;
        border-radius: 20px 20px 0px 0px;
        transition: all 0.5s ease;
        box-shadow: 0 0px 62px rgb(0 0 0 / 25%);
        z-index: 15;
        max-width: 500px;
        margin: 0 auto;
        width: 97%;
        height: -webkit-fill-available;
        overflow: clip;
      }

      .main-content__top-bar {
        display: flex;
        width: -webkit-fill-available;
        justify-content: space-between;
        margin-bottom: 5px;
        transition: all 0.5s ease;
        position: absolute;
        top: 20px;
        padding: 20px;
        padding-bottom: 0px;
        z-index: 10;
        pointer-events: none;
        top: 0px;
      }

      .logo-chip {
        --wh: 30px;
        height: var(--wh);
        width: calc(var(--wh) * 2);
        border-radius: 40px;
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #00000055;
        color: #fff;
        min-height: 44px;
        --blur: blur(18px);
        backdrop-filter: var(--blur);
        -webkit-backdrop-filter: var(--blur);
      }

      .logo-chip__icon {
        width: 24px;
        height: 24px;
        fill: white;
      }

      /* === SKELETON LOADERS === */
      h1:empty,
      h2:empty {
        width: fit-content;
        min-width: 200px;
        height: 24px;
        background-color: #e0e0e0;
        margin: 10px 0;
        border-radius: 100px;
        background-image: linear-gradient(
          90deg,
          #00000005 0%,
          #00000015 50%,
          #00000005 100%
        );
        background-size: 400% 100%;
        animation: skel-shimmer 2s infinite linear;
      }

      @keyframes skel-shimmer {
        0% {
          background-position: 100% 0;
        }
        100% {
          background-position: -100% 0;
        }
      }

      /* === BOTTOM SHEET: CONTROLS === */
      .controls {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        z-index: 3000;
        background: #fff;
        border-radius: 16px 16px 0 0;
        box-shadow: 0 -8px 24px rgba(0, 0, 0, 0.18);
        padding: 8px 16px 16px;
        box-sizing: border-box;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        max-height: 48px; /* collapsed state - only handle visible */
        overflow: hidden;
        transition: max-height 0.35s cubic-bezier(0.32, 0.72, 0, 1);
        border-top: 1px solid #e5e5e5;
      }

      .controls.expanded {
        max-height: 320px; /* enough for all fields + textarea */
        overflow: auto;
      }

      .controls__handle {
        width: 100%;
        height: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        margin-bottom: 4px;
        flex: 0 0 100%;
      }

      /* Hide all controls content except the handle when collapsed */
      .controls:not(.expanded) > *:not(.controls__handle) {
        display: none;
      }

      .controls__handle::after {
        content: "";
        width: 36px;
        height: 4px;
        background: #ccc;
        border-radius: 2px;
        transition: all 0.2s;
      }

      .controls:hover .controls__handle::after {
        background: #999;
      }

      .controls__input,
      .controls__select,
      .controls__button {
        border: solid 1px #bbb;
        padding: 6px 12px;
        border-radius: 8px;
        background: white;
      }

      .controls__editor {
        width: 100%;
        height: 70px;
        margin-top: 4px;
        border: 1px solid #bbb;
        border-radius: 8px;
        padding: 8px;
        font-family: monospace;
        flex: 1 1 100%;
      }

      /**/
      .main-content__user-card {
        display: flex;
        flex-direction: column;
        align-items: center;
        height: 100vh;
        max-height: -webkit-fill-available;
        background-color: var(--card-background);
      }

      .main-content__user-card > div {
        height: -webkit-fill-available;
      }

      /* === COVER & PROFILE PIC === */
      .cover {
        position: relative;
        width: 100%;
        margin-bottom: 50px;
      }

      .cover__box {
        width: 100%;
        height: 180px;
        overflow: hidden;
        border-top-left-radius: 20px;
        border-top-right-radius: 20px;
      }

      .cover__image {
        width: 100%;
        height: 100%;
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
      }

      .cover__avatar {
        position: absolute;
        bottom: -40px;
        left: 50%;
        transform: translateX(-50%);
        width: 100px;
        height: 100px;
        border-radius: 50%;
        border: 4px solid var(--background-color);
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
        overflow: hidden;
        background-color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .cover__avatar-img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      #card * {
        max-width: -webkit-fill-available;
      }

      .header__action.handler:before {
        content: "";
        width: -webkit-fill-available;
        position: absolute;
        min-height: 70px;
        background-image: linear-gradient(transparent 1%, #e6e6e6 60%, #e6e6e6);
        border-radius: 19px;
        transform: translateY(var(--translate));
      }
    </style>
  </head>
  <body>
    <div id="data-status-storage" data-bind-attr="config.cover_active"></div>

    <div id="app">
      <header class="header">
        <div>
          <div class="header__actions">
            <div class="header__menu">
              <button
                class="header__back-btn"
                id="backBtn"
                data-action="nav:back"
                aria-label="Atrás"
              >
                <svg><use href="#back-arrow"></use></svg>
              </button>
              <div class="header__title-container">
                <span class="header__title">Main hub</span>
                <div class="header__module-icon">
                  <svg><use href="#chevron-arrow"></use></svg>
                </div>
              </div>
            </div>

            <button
              id="cancelBtn"
              data-action="content:cancel"
              class="header__cta header__cta--cancel"
            >
              Cancel
            </button>

            <span class="header__cta-container">
              <button
                id="completePublishBtn"
                data-action="content:publish"
                class="header__cta"
              >
                <svg><use href="#share"></use></svg>
                <span class="header__btn-text">Complete</span>
              </button>
              <button
                id="publishBtn"
                data-action="content:publish"
                class="header__cta"
              >
                <svg><use href="#share"></use></svg>
                <span class="header__btn-text">Publish</span>
              </button>
            </span>
          </div>
          <!-- CORREGIDO: antes era un </div> -->

          <div class="header__action handler" aria-label="Arrastrar">
            <span class="header__action__handler handler--drag"></span>
          </div>
        </div>
        <!-- CORREGIDO: antes era un </span> -->
      </header>

      <main class="main-content main-content--profile" data-style="classic">
        <div class="main-content__top-bar">
          <div class="logo-chip">
            <svg class="logo-chip__icon" viewBox="0 0 24 24" fill="none">
              <use href="#logo"></use>
            </svg>
          </div>
        </div>
        <div
          id="card"
          class="main-content__user-card"
          data-object="binder-area"
        >
          <div class="cover">
            <div class="cover__box">
              <div class="cover__image nfc_cover" id="background_cover"></div>
            </div>
            <div class="cover__avatar">
              <div data-img="none" data-status="skel"></div>
            </div>
          </div>
          <h1 id="title"></h1>
           <h2 id="subtitle"></h2>
         </div>

         <!-- Apariencia carousel panel (lives OUTSIDE #card so binder swaps never destroy it) -->
         <div
           id="appearance-panel"
           hidden
           data-role="appearance-panel"
           style="margin: 12px 0 24px; padding: 8px 0; border-top: 1px solid rgba(255,255,255,0.08);"
         >
           <!-- Populated dynamically by card-carousel when island mode === 'apariencia' -->
         </div>
       </main>
     </div>
     <!-- ======================== 
           ISLAND MENU
         ======================== -->
    <div
      id="island"
      data-component="island"
      data-status="idle"
      role="toolbar"
      aria-label="Barra de acciones"
    ></div>

    <div id="root-styles-loader"></div>
    <!-- 2. CONFIGURACIÓN E IMPORTACIÓN DEL BINDER UTILITY (ES MODULE) -->
    <script type="module">
      import { DataBinder } from "/shared/utilities/binder.js";

      // Configuración del sistema de bindeo e hidratación
      const binderConfig = {
        container: document.querySelector("#card"), // Montar e hidratar EXCLUSIVAMENTE dentro del card
        endpoint:
          "https://app.newfacecards.com/wp-content/uploads/ultimatemember/1/data/card-data.json",

        // Habilita/Deshabilita el fetch local de respaldo en caso de que falle el remoto (SOLID Configurable)
        allowLocalFallback: true,
        localPath: "/data/card-data.json", // Ruta al backup local (root-relative, recomendada)

        onSuccess: (data) => {
          console.log("[App] Hidratación completada con éxito:", data);
        },
        onError: (err) => {
          console.error("[App] Error crítico de hidratación:", err);
        },
      };

      // Inicializar y ejecutar la tubería de bindeo con la plantilla cargada dinámicamente
      const binder = new DataBinder(binderConfig);

      // Theme bootstrap + overrides (core live font/accent WYSIWYG)
      const THEME_STORAGE_KEY = "APP_THEME_SELECTED";
      const OVERRIDES_KEY = "APP_THEME_OVERRIDES";
      const initialTheme = localStorage.getItem(THEME_STORAGE_KEY) || "aurora";
      const initialOverrides = (() => {
        try { return JSON.parse(localStorage.getItem(OVERRIDES_KEY) || '{}'); } catch { return {}; }
      })();
      binder.loadTemplateAndRun(`/templates/cards/${initialTheme}.html`).then(() => {
        if (initialOverrides && Object.keys(initialOverrides).length) applyLiveOverrides(initialOverrides);
      });

      window.__adminBinder = binder;

      function applyLiveOverrides(overrides) {
        const cardEl = document.getElementById('card');
        if (!cardEl || !overrides) return;
        let styleEl = document.getElementById('live-theme-overrides');
        if (!styleEl) {
          styleEl = document.createElement('style');
          styleEl.id = 'live-theme-overrides';
          document.head.appendChild(styleEl);
        }
        let css = '';
        if (overrides.font) css += `#card, #card * { font-family: "${overrides.font}", system-ui, -apple-system, sans-serif !important; }`;
        if (overrides.accentColor) {
          const a = overrides.accentColor;
          css += `#card [class*="__avatar"], #card [class*="avatar"] { border-color: ${a} !important; box-shadow: 0 0 0 6px ${a}22 !important; }`;
          css += `#card h1, #card [class*="__name"], #card [class*="name"] { color: ${a} !important; }`;
          css += `#card [class*="__role"], #card [class*="role"] { color: ${a} !important; }`;
        }
        styleEl.textContent = css;
      }

      window.__setCardTheme = (themeId) => {
        if (!themeId) return;
        binder.loadTemplateAndRun(`/templates/cards/${themeId}.html`).then(() => {
          const saved = (() => { try { return JSON.parse(localStorage.getItem(OVERRIDES_KEY) || '{}'); } catch { return {}; } })();
          applyLiveOverrides(saved);
        });
        localStorage.setItem(THEME_STORAGE_KEY, themeId);
      };

      window.__applyCardTheme = (themeId, overrides = {}) => {
        if (!themeId) return;
        const merged = { ...(overrides || {}) };
        localStorage.setItem(THEME_STORAGE_KEY, themeId);
        localStorage.setItem(OVERRIDES_KEY, JSON.stringify(merged));
        binder.loadTemplateAndRun(`/templates/cards/${themeId}.html`).then(() => {
          applyLiveOverrides(merged);
        });
      };
    </script>

      /**

    <!-- Island Menu: modern reusable component (auto-enhances existing markup) -->
    <!--
      Pure JS object configs (admin now starts with the template you declared):
      - Bootstrap uses morphedIslandConfig (Perfil + Navegacion) — the one you chose in JS.
      - Clicking satellite in edit mode swaps to the other declared config.
      You control both templates directly in this script. No .html files involved at runtime.
    -->
    <script type="module">
      import { importIslandMenu } from "/shared/components/island-menu/island-menu.js";

      const defaultIslandConfig = {
        edit: { label: "Editar", icon: "ti ti-edit" },
        modes: [
          { value: "apariencia", label: "Apariencia", icon: "ti ti-palette" },
          {
            value: "cardbar",
            label: "Navegación",
            icon: "ti ti-layout-columns",
          },
        ],
      };

      const morphedIslandConfig = {
        edit: { label: "Editar", icon: "ti ti-edit" },
        modes: [
          { value: "apariencia", label: "Perfil", icon: "ti ti-user" },
          {
            value: "cardbar",
            label: "Navegacion",
            icon: "ti ti-layout-columns",
          },
        ],
      };

      function setupIslandListeners(el) {
        if (el._islandListenersSetup) return; // idempotent: attach only once (stable root + event delegation style)
        el._islandListenersSetup = true;

        el.addEventListener("island-action", (e) => {
          console.log("[admin binder] island-action:", e.detail);

          // Dynamic template swap demo: uses the JS-declared morphedIslandConfig (object-config path)
          if (e.detail.type === "more-options") {
            console.log(
              "Swapping to JS-declared morphed config (Perfil + Navegacion)",
            );
            importIslandMenu(morphedIslandConfig);
            // No re-setup needed: listener lives on the permanent #island div,
            // inner content replacement does not affect it. Re-enhance happens inside the loader.
          }
        });
        el.addEventListener("island-mode-change", (e) => {
          console.log("[admin binder] island-mode-change:", e.detail);
          handleAparienciaMode(e.detail.mode);
        });
        el.addEventListener("island-status-change", (e) => {
          console.log("[admin binder] island-status-change:", e.detail);
          if (e.detail.status !== 'edit') {
            hideAppearancePanel();
          }
        });
      }

      // ===== Apariencia / Immersive Editor integration (new premium path) =====
      let appearanceEditorModule = null;
      const appearancePanel = document.getElementById('appearance-panel');
      if (appearancePanel) appearancePanel.hidden = true;

      async function ensureAppearanceEditor() {
        if (appearanceEditorModule) return appearanceEditorModule;
        appearanceEditorModule = await import('/shared/components/appearance-editor/appearance-editor.js');
        return appearanceEditorModule;
      }

      let activeEditor = null;

      function openImmersiveAppearance() {
        if (activeEditor) return;
        ensureAppearanceEditor().then(({ openAppearanceEditor }) => {
          activeEditor = openAppearanceEditor({
            currentTheme: localStorage.getItem('APP_THEME_SELECTED') || 'aurora',
            livePatchCard: true,
            onApply: (themeId, overrides) => {
              if (window.__applyCardTheme) {
                window.__applyCardTheme(themeId, overrides || {});
              } else if (window.__setCardTheme) {
                window.__setCardTheme(themeId);
              }
            },
            onClose: () => {
              activeEditor = null;
            }
          });
        }).catch(err => console.error('[admin] appearance editor load failed:', err));
      }

      function closeImmersiveAppearance() {
        if (activeEditor && activeEditor.close) {
          activeEditor.close();
          activeEditor = null;
        }
      }

      let lastIslandStatus = 'idle';
      document.getElementById('island')?.addEventListener('island-status-change', (e) => {
        lastIslandStatus = e.detail?.status || 'idle';
        if (lastIslandStatus !== 'edit') closeImmersiveAppearance();
      }, { passive: true });

      function handleAparienciaMode(mode) {
        if (mode === 'apariencia' && lastIslandStatus === 'edit') {
          openImmersiveAppearance();
        } else if (mode !== 'apariencia') {
          closeImmersiveAppearance();
        }
      }
      window.__openAppearanceEditor = openImmersiveAppearance;
      window.__closeAppearanceEditor = closeImmersiveAppearance;

      // Bootstrap: populate via the new API right away using the JS-declared template you chose
      importIslandMenu(morphedIslandConfig)
        .then((island) => {
          setupIslandListeners(island);
        })
        .catch((err) =>
          console.error("[admin binder] island bootstrap failed:", err),
        );
    </script>

    <!-- Header: click toggle + scroll-depth compression effect -->
    <script>
      (function () {
        const storage = document.getElementById("data-status-storage");
        const handler = document.querySelector(".handler");
        const actions = document.querySelector(".header__actions");
        const nextHandler = document.querySelector(".header__action.handler");

        if (!storage || !handler) return;

        // === Click toggle for data-top-menu (handle rotation etc.) ===
        function setTopMenuState(state) {
          storage.setAttribute("data-top-menu", state); // "hidden" | "showing"
        }

        handler.addEventListener("click", () => {
          const current = storage.getAttribute("data-top-menu");
          setTopMenuState(current === "hidden" ? "showing" : "hidden");
        });

        // === Scroll-depth calculator (drives --scale / --blur on header) ===
        if (!actions) return;

        const MAX_SCROLL_DEPTH = 220;
        const MIN_SCALE = 0.7;
        const MAX_BLUR = 7;

        let ticking = false;

        function updateHeaderEffect() {
          const scrollY = window.scrollY || 0;
          const progress = Math.min(Math.max(scrollY / MAX_SCROLL_DEPTH, 0), 1);

          const scale = (1 - (1 - MIN_SCALE) * progress).toFixed(3);
          const blur = (MAX_BLUR * progress).toFixed(1);
          const newBlur = blur - 1.5;

          actions.style.setProperty("--scale", scale);
          actions.style.setProperty("--blur", `${newBlur}px`);
          nextHandler.style.setProperty("--translate", `${blur * -20}px`);
        }

        function onScroll() {
          if (!ticking) {
            requestAnimationFrame(() => {
              updateHeaderEffect();
              ticking = false;
            });
            ticking = true;
          }
        }

        window.addEventListener("scroll", onScroll, { passive: true });

        // Initialize on load (handles restored scroll position)
        updateHeaderEffect();
      })();
    </script>
