    <style>
      :root {
        --background-color: #efefef;
        --font-color: #111111;
        --w100: -webkit-fill-available;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background-color: #e6e6e6; /* Fondo gris claro exterior */
        color: var(--font-color);
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        scroll-behavior: smooth;
        transition: blur-start;
      }

      #app {
        width: var(--w100);
        display: flex;
        flex-direction: column;
        position: relative;
      }

      /* === HEADER (PIXEL PERFECT) === */
      .header__actions {
        display: flex;
        justify-content: space-between;
        align-items: center;
        width: var(--w100);
        margin: 50px 0px 30px 10px;
        box-sizing: border-box;
        position: sticky;
        top: 30px;
        transition: all 0.3s ease;
        transform: scale(var(--scale, 1));
        filter: blur(var(--blur, 0px));
      }

      .header__menu {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .header__back-btn {
        background: transparent;
        border: solid 1px #555 !important;
        color: #333;
        border: none;
        padding: 8px 16px 8px 8px;
        border-radius: 15px;
        font-size: 18px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
      }

      .header__back-btn svg {
        transform: rotate(90deg) translateX(3px);
        --wh: 24px;
        width: var(--wh);
        height: var(--wh);
      }

      .header__title-container {
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .header__title {
        font-size: 16px;
        font-weight: 400;
        color: #111;
      }

      .header__module-icon svg {
        width: 16px;
        height: 16px;
        opacity: 0.8;
        transform: translateY(3px);
      }

      .header__cta {
        background: #06896c; /* Verde del botón publish */
        color: white;
        border: none;
        padding: 8px 18px 8px 14px;
        border-radius: 25px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 8px;
        transition: all 0.3s ease;
        min-height: 47px;
      }

      .header__cta svg {
        width: 18px;
        height: 18px;
      }

      .header__cta--cancel {
        display: none;
      }

      .header__cta-container:has(#publishBtn) {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 0px 9px 26px;
        font-size: 18px;
      }

      .header__cta-container:has(#publishBtn) svg {
        width: 24px;
        height: 24px;
        opacity: 0.8;
      }

      #publishBtn {
        min-width: 133px;
        z-index: 1;
        justify-content: center;
      }

      #completePublishBtn {
        position: absolute;
      }

      header {
        transition: all 0.3s ease;
        margin: 0 auto;
        width: var(--w100);
        max-width: 500px;
      }

      [data-top-menu="hidden"] + #app {
        header {
          margin-bottom: -50px;
          transform: translatey(-110px);
        }
      }

      .header__action.handler {
        display: flex;
        width: var(--w100);
        justify-content: center;
      }

      .handler--drag {
        padding: 8px 15px;
        border-radius: 100px;
        background-color: #fff;
        margin: 5px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        cursor: pointer;
        z-index: 1;
      }

      .handler--drag:before,
      .handler--drag:after {
        content: "";
        display: block;
        width: 18px;
        height: 4px;
        background: #ccc;
        border-radius: 2px;
        transition: all 0.2s;
      }

      .handler--drag:before {
        margin-right: -1px;
      }
      .handler--drag:after {
        margin-left: -1px;
      }

      [data-top-menu="hidden"] + #app .handler--drag:before {
        transform: rotate(16deg);
      }
      [data-top-menu="hidden"] + #app .handler--drag:after {
        transform: rotate(-16deg);
      }

      #data-status-storage:not([data-top-menu="hidden"])
        + #app
        .handler--drag:before {
        transform: rotate(-16deg);
      }
      #data-status-storage:not([data-top-menu="hidden"])
        + #app
        .handler--drag:after {
        transform: rotate(16deg);
      }

      /* === MAIN CONTENT (CARD) === */
      .main-content {
        background: var(--background-color);
        min-height: calc(100vh - 160px);
        position: relative;
        border-radius: 20px 20px 0px 0px;
        transition: all 0.5s ease;
        box-shadow: 0 0px 62px rgb(0 0 0 / 25%);
        z-index: 15;
        max-width: 500px;
        margin: 0 auto;
        width: 97%;
        height: var(--w100);
        overflow: clip;
      }

      .main-content__top-bar {
        display: flex;
        width: var(--w100);
        justify-content: space-between;
        margin-bottom: 5px;
        transition: all 0.5s ease;
        position: absolute;
        top: 20px;
        padding: 20px;
        padding-bottom: 0px;
        z-index: 10;
        pointer-events: none;
        top: 0px;
      }

      .logo-chip {
        --wh: 30px;
        height: var(--wh);
        width: calc(var(--wh) * 2);
        border-radius: 40px;
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #00000055;
        color: #fff;
        min-height: 44px;
        --blur: blur(18px);
        backdrop-filter: var(--blur);
        -webkit-backdrop-filter: var(--blur);
      }

      .logo-chip__icon {
        width: 24px;
        height: 24px;
        fill: white;
      }

      /* === SKELETON LOADERS === */
      h1:empty,
      h2:empty {
        width: fit-content;
        min-width: 200px;
        height: 24px;
        background-color: #e0e0e0;
        margin: 10px 0;
        border-radius: 100px;
        background-image: linear-gradient(
          90deg,
          #00000005 0%,
          #00000015 50%,
          #00000005 100%
        );
        background-size: 400% 100%;
        animation: skel-shimmer 2s infinite linear;
      }

      @keyframes skel-shimmer {
        0% {
          background-position: 100% 0;
        }
        100% {
          background-position: -100% 0;
        }
      }

      /* === BOTTOM SHEET: CONTROLS === */
      .controls {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        z-index: 3000;
        background: #fff;
        border-radius: 16px 16px 0 0;
        box-shadow: 0 -8px 24px rgba(0, 0, 0, 0.18);
        padding: 8px 16px 16px;
        box-sizing: border-box;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        max-height: 48px; /* collapsed state - only handle visible */
        overflow: hidden;
        transition: max-height 0.35s cubic-bezier(0.32, 0.72, 0, 1);
        border-top: 1px solid #e5e5e5;
      }

      .controls.expanded {
        max-height: 320px; /* enough for all fields + textarea */
        overflow: auto;
      }

      .controls__handle {
        width: 100%;
        height: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        margin-bottom: 4px;
        flex: 0 0 100%;
      }

      /* Hide all controls content except the handle when collapsed */
      .controls:not(.expanded) > *:not(.controls__handle) {
        display: none;
      }

      .controls__handle::after {
        content: "";
        width: 36px;
        height: 4px;
        background: #ccc;
        border-radius: 2px;
        transition: all 0.2s;
      }

      .controls:hover .controls__handle::after {
        background: #999;
      }

      .controls__input,
      .controls__select,
      .controls__button {
        border: solid 1px #bbb;
        padding: 6px 12px;
        border-radius: 8px;
        background: white;
      }

      .controls__editor {
        width: 100%;
        height: 70px;
        margin-top: 4px;
        border: 1px solid #bbb;
        border-radius: 8px;
        padding: 8px;
        font-family: monospace;
        flex: 1 1 100%;
      }

      /**/
      .main-content__user-card {
        display: flex;
        flex-direction: column;
        align-items: center;
        height: 100vh;
        max-height: var(--w100);
        background-color: var(--card-background);
      }

      .main-content__user-card:not(:has([data-status="skel"])) > div {
        height: var(--w100);
      }

      /* === COVER & PROFILE PIC === */
      .cover {
        position: relative;
        width: 100%;
        margin-bottom: 50px;
      }

      .cover__box {
        width: 100%;
        height: 180px;
        overflow: hidden;
        border-top-left-radius: 20px;
        border-top-right-radius: 20px;
      }

      .cover__image {
        width: 100%;
        height: 100%;
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
      }

      .cover__avatar {
        position: absolute;
        bottom: -40px;
        left: 50%;
        transform: translateX(-50%);
        width: 100px;
        height: 100px;
        border-radius: 50%;
        border: 4px solid var(--background-color);
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
        overflow: hidden;
        background-color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .cover__avatar-img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      #card * {
        max-width: var(--w100);
      }

      .header__action.handler:before {
        content: "";
        width: var(--w100);
        position: absolute;
        min-height: 70px;
        background-image: linear-gradient(transparent 1%, #e6e6e6 60%, #e6e6e6);
        border-radius: 19px;
        transform: translateY(var(--translate));
      }

      #app:has(.edit-mode-active) header {
        margin-bottom: -50px;
        transform: translatey(-110px);
        height: 85px;
      }

      #app:has(.edit-mode-active) .handler--drag {
        transform: scale(0);
      }

      [data-bottom-sheet="showing"] + #app main {
        transform: scale(0.9) translate(0px, -50px);
      }
    </style>
  </head>
  <body>
    <div
      id="data-status-storage"
      data-bind-attr="config.cover_active"
      data-bottom-sheet="hidden"
    ></div>
    <div id="app">
      <!-- Selector de Temas Carrusel 3D Overlay -->
      <div class="card-carousel" id="carousel-viewport">
        <div class="card-carousel__track" id="stage">
          <!-- Inyectado dinámicamente -->
        </div>
      </div>
      <header class="header">
        <div>
          <div class="header__actions">
            <div class="header__menu">
              <button
                class="header__back-btn"
                id="backBtn"
                data-action="nav:back"
                aria-label="Atrás"
              >
                <svg><use href="#back-arrow"></use></svg>
              </button>
              <div class="header__title-container">
                <span class="header__title">Main hub</span>
                <div class="header__module-icon">
                  <svg><use href="#chevron-arrow"></use></svg>
                </div>
              </div>
            </div>

            <button
              id="cancelBtn"
              data-action="content:cancel"
              class="header__cta header__cta--cancel"
            >
              Cancel
            </button>

            <span class="header__cta-container">
              <button
                id="completePublishBtn"
                data-action="content:publish"
                class="header__cta"

      window.constructSheet = constructSheet;

      // Configuración del sistema de bindeo e hidratación
      const binderConfig = {
        container: document.querySelector("#card"), // Montar e hidratar EXCLUSIVAMENTE dentro del card
        endpoint:
          "https://app.newfacecards.com/wp-content/uploads/ultimatemember/1/data/card-data.json",

        // Habilita/Deshabilita el fetch local de respaldo en caso de que falle el remoto (SOLID Configurable)
        allowLocalFallback: true,
        localPath: "/data/card-data.json", // Ruta al backup local (root-relative, recomendada)

        onSuccess: (data) => {
          console.log("[App] Hidratación completada con éxito:", data);
        },
        onError: (err) => {
          console.error("[App] Error crítico de hidratación:", err);
        },
      };

      // Inicializar y ejecutar la tubería de bindeo con la plantilla cargada dinámicamente
      const binder = new DataBinder(binderConfig);

      const THEME_STORAGE_KEY = "APP_THEME_SELECTED";
      const OVERRIDES_KEY = "APP_THEME_OVERRIDES";
      // expose globally for other script blocks
      window.THEME_STORAGE_KEY = THEME_STORAGE_KEY;
      window.OVERRIDES_KEY = OVERRIDES_KEY;
      const initialTheme = localStorage.getItem(THEME_STORAGE_KEY) || "aurora";
      const initialOverrides = (() => {
        try {
          return JSON.parse(localStorage.getItem(OVERRIDES_KEY) || "{}");
        } catch {
          return {};
        }
      })();
      binder
        .loadTemplateAndRun(`/templates/cards/${initialTheme}.html`)
        .then(() => {
          if (initialOverrides && Object.keys(initialOverrides).length)
            applyLiveOverrides(initialOverrides);
        });

      window.__adminBinder = binder;

      function applyLiveOverrides(overrides) {
        const cardEl = document.getElementById("card");
        if (!cardEl || !overrides) return;
        let styleEl = document.getElementById("live-theme-overrides");
        if (!styleEl) {
          styleEl = document.createElement("style");
          styleEl.id = "live-theme-overrides";
          document.head.appendChild(styleEl);
        }
        let css = "";
        if (overrides.font)
          css += `#card, #card * { font-family: "${overrides.font}", system-ui, -apple-system, sans-serif !important; }`;
        if (overrides.accentColor) {
          const a = overrides.accentColor;
          css += `#card [class*="__avatar"], #card [class*="avatar"] { border-color: ${a} !important; box-shadow: 0 0 0 6px ${a}22 !important; }`;
          css += `#card h1, #card [class*="__name"], #card [class*="name"] { color: ${a} !important; }`;
          css += `#card [class*="__role"], #card [class*="role"] { color: ${a} !important; }`;
        }
        styleEl.textContent = css;
      }

      window.__setCardTheme = (themeId) => {
        if (!themeId) return;
        binder
          .loadTemplateAndRun(`/templates/cards/${themeId}.html`)
          .then(() => {
            const saved = (() => {
              try {
                return JSON.parse(localStorage.getItem(OVERRIDES_KEY) || "{}");
              } catch {
                return {};
              }
            })();
            applyLiveOverrides(saved);
          });
        localStorage.setItem(THEME_STORAGE_KEY, themeId);
      };

      window.__applyCardTheme = (themeId, overrides = {}) => {
        if (!themeId) return;
        const merged = { ...(overrides || {}) };
        localStorage.setItem(THEME_STORAGE_KEY, themeId);
        localStorage.setItem(OVERRIDES_KEY, JSON.stringify(merged));
        binder
          .loadTemplateAndRun(`/templates/cards/${themeId}.html`)
          .then(() => {
            applyLiveOverrides(merged);
          });
      };

    <script type="module">
      import { importIslandMenu } from "/shared/components/island-menu/island-menu.js";

      const defaultIslandConfig = {

      const morphedIslandConfig = {
        edit: { label: "Menu", icon: "ti ti-menu-2" },
        modes: [
          {
            value: "cardbar",
            label: "Profile",
            icon: "ti ti-user-circle",
          },
          { value: "apariencia", label: "Style", icon: "ti ti-palette" },

      function setupIslandListeners(el) {
        if (el._islandListenersSetup) return; // idempotent: attach only once (stable root + event delegation style)
        el._islandListenersSetup = true;

        el.addEventListener("island-action", (e) => {
          console.log("[admin binder] island-action:", e.detail);

          // Dynamic template swap demo: uses the JS-declared morphedIslandConfig (object-config path)
          if (e.detail.type === "more-options") {
            console.log(
              "Swapping to JS-declared morphed config (Perfil + Navegacion)",
            );
            importIslandMenu(morphedIslandConfig);
            // No re-setup needed: listener lives on the permanent #island div,
            // inner content replacement does not affect it. Re-enhance happens inside the loader.
          }
        });
        el.addEventListener("island-mode-change", (e) => {
          console.log("[admin binder] island-mode-change:", e.detail);
          if (typeof handleIslandMode === "function") {
            handleIslandMode(e.detail.mode);

      const OWNED_THEMES_KEY = "NFC_OWNED_THEMES";

      const BACKUP_THEMES = [
        {
          id: "aurora",

        },
      ];

      let ownedThemes = [];
      let shopThemes = [];
      let allThemes = [];

      function initOwnedThemes() {
        let stored = localStorage.getItem(OWNED_THEMES_KEY);
        if (stored) {
          try {
            ownedThemes = JSON.parse(stored);
          } catch (e) {
            ownedThemes = ["aurora"];
          }
        } else {
          ownedThemes = ["aurora"];
          localStorage.setItem(OWNED_THEMES_KEY, JSON.stringify(ownedThemes));
        }
      }

      async function loadThemesData() {
        initOwnedThemes();
        try {
          const [userRes, shopRes] = await Promise.all([
            fetch("/data/user-themes.json")
              .then((r) => r.json())
              .catch(() => null),
            fetch("/data/shop-themes.json")
              .then((r) => r.json())
              .catch(() => null),
          ]);

          if (userRes && userRes.ownedThemes) {
            userRes.ownedThemes.forEach((t) => {
              if (!ownedThemes.includes(t.id)) ownedThemes.push(t.id);
            });
            localStorage.setItem(OWNED_THEMES_KEY, JSON.stringify(ownedThemes));
          }

          if (shopRes && shopRes.shopThemes) {
            shopThemes = shopRes.shopThemes;
          } else {
            shopThemes = BACKUP_THEMES.filter((t) => !t.isFree);
          }
        } catch (e) {
          console.warn("Error loading theme JSON databases, falling back:", e);
          shopThemes = BACKUP_THEMES.filter((t) => !t.isFree);
        }

        allThemes = [];
        const aurora = BACKUP_THEMES.find((t) => t.id === "aurora");
        allThemes.push(aurora);

        shopThemes.forEach((t) => {
          if (!allThemes.some((x) => x.id === t.id)) {
            allThemes.push(t);
          }
        });
      }

        const wrap = document.createElement("div");
        wrap.style.cssText =
          "position:absolute;inset:0;font-family:" + font + ",system-ui";

      }

      let carouselCards = [];
      let carouselCurrentIndex = 0;
      let carouselTransitioning = false;
      let isCarouselActive = false;

      function showSuccessToast(themeLabel) {
        let toast = document.querySelector(".buy-toast");
        if (!toast) {
          toast = document.createElement("div");
          toast.className = "buy-toast";
          document.body.appendChild(toast);
        }
        toast.innerHTML = `<i class="fa-solid fa-circle-check"></i> ¡Tema <strong>${themeLabel}</strong> adquirido con éxito!`;
        toast.classList.add("buy-toast--visible");
        setTimeout(() => {
          toast.classList.remove("buy-toast--visible");
        }, 2200);
      }

      function buildCarouselUI() {
        const stage = document.getElementById("stage");
        if (!stage) return;
        stage.innerHTML = "";
        carouselCards = [];

        const currentSelectedTheme =
          localStorage.getItem(THEME_STORAGE_KEY) || "aurora";

        // Only show themes the user already owns (finite, non-looping list)
        const displayThemes = allThemes.filter((t) =>
          ownedThemes.includes(t.id),
        );

        displayThemes.forEach((theme, index) => {
          const isActive = theme.id === currentSelectedTheme;

          const cardEl = document.createElement("div");
          cardEl.className = `profile-card profile-card--glass`;

          const aeCard = document.createElement("div");
          aeCard.className = "ae-card";
          aeCard.dataset.theme = theme.id;

          const previewHost = document.createElement("div");
          previewHost.className = "ae-preview-host";
          previewHost.style.cssText = "position:absolute;inset:0;";

          renderHighFidelityPreview(
            theme.id,
            previewHost,
            theme.accent,
            theme.font,
          );

          const labelEl = document.createElement("div");
          labelEl.className = "ae-card-label";
          labelEl.innerText = theme.label;

          aeCard.appendChild(previewHost);
          aeCard.appendChild(labelEl);
          cardEl.appendChild(aeCard);

          const actionBar = document.createElement("div");
          actionBar.className = "profile-card__action-bar";

          if (isActive) {
            actionBar.innerHTML = `
              <div class="theme-active-badge">
                <i class="fa-solid fa-circle-check"></i> Tema Activo
              </div>
            `;
          } else {
            const applyBtn = document.createElement("button");
            applyBtn.className = "apply-theme-btn";
            applyBtn.innerHTML = `<i class="fa-solid fa-palette"></i> Aplicar`;
            applyBtn.addEventListener("click", (e) => {
              e.stopPropagation();
              applyThemeSelection(theme.id);
            });
            actionBar.appendChild(applyBtn);
          }

          cardEl.appendChild(actionBar);

          cardEl.addEventListener("click", () => {
            if (carouselTransitioning || !isCarouselActive) return;
            if (cardEl.classList.contains("profile-card--prev"))
              rotateCarousel(carouselCurrentIndex - 1);
            if (cardEl.classList.contains("profile-card--next"))
              rotateCarousel(carouselCurrentIndex + 1);
          });

          stage.appendChild(cardEl);
          carouselCards.push(cardEl);
        });

        // ── Special card: "Buscar más themes" ──
        const searchCard = document.createElement("div");
        searchCard.className =
          "profile-card profile-card--glass profile-card--special";
        searchCard.innerHTML = `
          <div class="special-card__content">
            <div class="special-card__icon"><i class="ti ti-search" aria-hidden="true"></i></div>
            <div class="special-card__label">Buscar más themes</div>
            <div class="special-card__hint">Explora la tienda de temas</div>
          </div>
        `;
        searchCard.addEventListener("click", () => {
          if (carouselTransitioning) return;
          if (searchCard.classList.contains("profile-card--active")) {
            window.location.href = "/theme-store.html";
          } else if (searchCard.classList.contains("profile-card--prev")) {
            rotateCarousel(carouselCurrentIndex - 1);
          } else if (searchCard.classList.contains("profile-card--next")) {
            rotateCarousel(carouselCurrentIndex + 1);
          }
        });
        stage.appendChild(searchCard);
        carouselCards.push(searchCard);

        // ── Special card: "Empezar en blanco" ──
        const blankCard = document.createElement("div");
        blankCard.className =
          "profile-card profile-card--glass profile-card--special";
        blankCard.innerHTML = `
          <div class="special-card__content">
            <div class="special-card__icon"><i class="ti ti-plus" aria-hidden="true"></i></div>
            <div class="special-card__label">Empezar en blanco</div>
            <div class="special-card__hint">Crea tu propio diseño</div>
          </div>
        `;
        blankCard.addEventListener("click", () => {
          if (carouselTransitioning) return;
          if (blankCard.classList.contains("profile-card--active")) {
            applyThemeSelection("blank");
          } else if (blankCard.classList.contains("profile-card--prev")) {
            rotateCarousel(carouselCurrentIndex - 1);
          } else if (blankCard.classList.contains("profile-card--next")) {
            rotateCarousel(carouselCurrentIndex + 1);
          }
        });
        stage.appendChild(blankCard);
        carouselCards.push(blankCard);

        const activeIdx = displayThemes.findIndex(
          (t) => t.id === currentSelectedTheme,
        );
        if (currentSelectedTheme === "blank") {
          carouselCurrentIndex = carouselCards.length - 1;
        } else {
          carouselCurrentIndex = activeIdx >= 0 ? activeIdx : 0;
        }

        updateCarouselClasses();
      }

      function updateCarouselClasses() {
        const length = carouselCards.length;
        if (length === 0) return;

        carouselCards.forEach((card, index) => {
          card.className = card.className
            .replace(/\b(profile-card--(active|prev|next|hidden))\b/g, "")
            .trim();

          if (index === carouselCurrentIndex) {
            card.classList.add("profile-card--active");
          } else if (
            index === carouselCurrentIndex - 1 &&
            carouselCurrentIndex > 0
          ) {
            card.classList.add("profile-card--prev");
          } else if (
            index === carouselCurrentIndex + 1 &&
            carouselCurrentIndex < length - 1
          ) {
            card.classList.add("profile-card--next");
          } else {
            card.classList.add("profile-card--hidden");
          }
        });
      }

      function rotateCarousel(newIndex) {
        if (carouselTransitioning) return;
        const length = carouselCards.length;
        const clamped = Math.max(0, Math.min(newIndex, length - 1));
        if (clamped === carouselCurrentIndex) return; // already at edge
        carouselTransitioning = true;
        carouselCurrentIndex = clamped;
        updateCarouselClasses();
        setTimeout(() => {
          carouselTransitioning = false;
        }, 500);
      }

      function simulatePurchase(theme) {
        if (ownedThemes.includes(theme.id)) return;

        ownedThemes.push(theme.id);
        localStorage.setItem(OWNED_THEMES_KEY, JSON.stringify(ownedThemes));

        showSuccessToast(theme.label);
        buildCarouselUI();
      }

      function applyThemeSelection(themeId) {
        if (window.__setCardTheme) {
          window.__setCardTheme(themeId);
        } else {
          localStorage.setItem(THEME_STORAGE_KEY, themeId);
        }

        buildCarouselUI();
        closeCarouselOverlay();

        const island = document.getElementById("island");
        if (island && typeof island.setActiveMode === "function") {
          island.setActiveMode(null);
        }
      }

      function openCarouselOverlay() {
        if (isCarouselActive) return; // Guard: already open, don't re-trigger animation
        isCarouselActive = true;
        loadThemesData().then(() => {
          // Double-check: user may have toggled off while themes were loading
          if (!isCarouselActive) return;
          buildCarouselUI();
          const viewport = document.getElementById("carousel-viewport");
          if (viewport) {
            viewport.style.display = "flex";
            viewport.offsetHeight; // force reflow
            viewport.classList.add("card-carousel--visible");
          }
        });
      }

      function closeCarouselOverlay() {
        isCarouselActive = false;
        const viewport = document.getElementById("carousel-viewport");
        if (viewport) {
          viewport.classList.remove("card-carousel--visible");
          setTimeout(() => {
            if (!isCarouselActive) viewport.style.display = "none";
          }, 400);
        }
      }

      function setupCarouselControls() {
        const viewport = document.getElementById("carousel-viewport");
        if (!viewport) return;

        document.addEventListener("keydown", (e) => {
          if (!isCarouselActive || carouselTransitioning) return;
          if (e.key === "ArrowRight") rotateCarousel(carouselCurrentIndex + 1);
          if (e.key === "ArrowLeft") rotateCarousel(carouselCurrentIndex - 1);
        });

        let wheelAccumulator = 0;
        let isWheelOnCooldown = false;

        viewport.addEventListener(
          "wheel",
          (e) => {
            if (!isCarouselActive) return;

            const delta =
              Math.abs(e.deltaX) > Math.abs(e.deltaY) ? e.deltaX : e.deltaY;
            if (Math.abs(delta) > 5) e.preventDefault();

            if (isWheelOnCooldown || carouselTransitioning) return;

            wheelAccumulator += delta;

            if (wheelAccumulator > 60) {
              rotateCarousel(carouselCurrentIndex + 1);
              triggerWheelCooldown();
            } else if (wheelAccumulator < -60) {
              rotateCarousel(carouselCurrentIndex - 1);
              triggerWheelCooldown();
            }
          },
          { passive: false },
        );

        function triggerWheelCooldown() {
          wheelAccumulator = 0;
          isWheelOnCooldown = true;
          setTimeout(() => {
            isWheelOnCooldown = false;
            wheelAccumulator = 0;
          }, 400);
        }

        let startX = 0;
        let isDragging = false;

        function getPositionX(e) {
          if (e.type.includes("mouse")) {
            return e.clientX;
          } else {
            return e.type.includes("end")
              ? e.changedTouches[0].clientX
              : e.touches[0].clientX;
          }
        }

        function touchStart(e) {
          if (!isCarouselActive) return;
          isDragging = true;
          startX = getPositionX(e);
        }

        function touchEnd(e) {
          if (!isDragging || !isCarouselActive) return;
          isDragging = false;
          const endX = getPositionX(e);
          const diffX = startX - endX;

          if (Math.abs(diffX) > 50 && !carouselTransitioning) {
            if (diffX > 0) rotateCarousel(carouselCurrentIndex + 1);
            else rotateCarousel(carouselCurrentIndex - 1);
          }
        }

        viewport.addEventListener("mousedown", touchStart);
        viewport.addEventListener("mouseup", touchEnd);
        viewport.addEventListener("mouseleave", () => (isDragging = false));

        viewport.addEventListener("touchstart", touchStart, { passive: true });
        viewport.addEventListener("touchend", touchEnd);
      }

      setupCarouselControls();

      function openImmersiveAppearance() {
        openCarouselOverlay();
      }

      function closeImmersiveAppearance() {
        closeCarouselOverlay();
      }

      let lastIslandStatus = "idle";
      document.getElementById("island")?.addEventListener(
        "island-status-change",
        (e) => {
          lastIslandStatus = e.detail?.status || "idle";
          if (lastIslandStatus !== "edit") closeCarouselOverlay();
        },
        { passive: true },
      );

      // ── iOS-style contextual editor: cohort titles ──
      const COHORT_TITLES = {
        1: "Editar Foto y Portada",
        2: "Editar Datos Personales",
        3: "Editar Contacto",
        4: "Editar Empresa",
        5: "Editar Redes Sociales",
        6: "Ajustes de Iconos",
      };

      function handleIslandMode(mode) {
        console.log(
          "[handleIslandMode]",
          mode,
          "| carousel active:",
          isCarouselActive,
        );
        if (mode === "apariencia") {
          // Exit card-edit mode & profile editor first
          deactivateCardEditMode();
          if (typeof closeProfileEditor === "function") {
            // CRITICAL: Call closeProfileEditor with false (fullyExit = false) to prevent it
            // from internally resetting the island mode back to null and breaking the switch.
            closeProfileEditor(false);
          }
          // Ensure island stays in edit status
          if (lastIslandStatus !== "edit") {
            const islandEl = document.getElementById("island");
            if (islandEl && islandEl.setStatus) islandEl.setStatus("edit");
          }
          openImmersiveAppearance();
        } else if (mode === "cardbar") {
          // Exit appearance mode first
          closeImmersiveAppearance();
          // Ensure island stays in edit status
          if (lastIslandStatus !== "edit") {
            const islandEl = document.getElementById("island");
            if (islandEl && islandEl.setStatus) islandEl.setStatus("edit");
          }
          // iOS-style: activate visual edit mode on card, don't open the sheet yet
          activateCardEditMode();
        } else {
          // mode === null → toggle OFF: clean up all active sub-modes
          console.log("[handleIslandMode] toggle OFF — closing everything");
          deactivateCardEditMode();
          closeImmersiveAppearance();
          if (typeof closeProfileEditor === "function") {
            // Call with false to avoid redundant loop calls when the island is already null
            closeProfileEditor(false);
          }
        }
      }

      // Toggle .edit-mode-active on #card, body and .main-content
      function activateCardEditMode() {
        console.log("[Perfil Editor] activateCardEditMode called");
        const card = document.getElementById("card");
        if (!card) {
          console.error("[Perfil Editor] #card element NOT found!");
          return;
        }
        card.classList.add("edit-mode-active");
        document.body.classList.add("edit-mode-active");
        const mainContent = document.querySelector(".main-content");
        if (mainContent) mainContent.classList.add("edit-mode-active");

        console.log("[Perfil Editor] #card classes:", card.className);
        setupCardEditDelegation();
      }

      function deactivateCardEditMode() {
        console.log("[Perfil Editor] deactivateCardEditMode called");
        const card = document.getElementById("card");
        if (card) card.classList.remove("edit-mode-active");
        document.body.classList.remove("edit-mode-active");
        const mainContent = document.querySelector(".main-content");
        if (mainContent) mainContent.classList.remove("edit-mode-active");
      }

      // Event delegation on #card: detect clicks on [data-editable-zone]
      let _cardDelegationSetup = false;
      function setupCardEditDelegation() {
        if (_cardDelegationSetup) return;
        _cardDelegationSetup = true;
        const card = document.getElementById("card");
        if (!card) {
          console.error(
            "[Perfil Editor] setupCardEditDelegation failed: no #card",
          );
          return;
        }
        console.log(
          "[Perfil Editor] Setting up card edit delegation click listener on #card",
        );

        card.addEventListener("click", (e) => {
          console.log("[Perfil Editor] Click detected inside #card:", e.target);
          const card = document.getElementById("card");
          if (!card || !card.classList.contains("edit-mode-active")) {
            console.log(
              "[Perfil Editor] Click ignored: edit-mode-active not on card",
            );
            return;
          }

          const zone = e.target.closest("[data-editable-zone]");
          if (!zone) {
            console.log(
              "[Perfil Editor] Click ignored: not inside an editable zone",
            );
            return;
          }

          e.stopPropagation();
          const cohort = parseInt(zone.dataset.editableCohort || "1", 10);
          if (cohort === 4) {
            console.log(
              "[Perfil Editor] Click ignored: Cohort 4 (Empresa) is ignored in this update.",
            );
            return;
          }
          console.log(
            "[Perfil Editor] Clicked inside editable zone! Cohort:",
            cohort,
            zone,
          );
          openContextualEditor(cohort);
        });
      }

      // Open the bottom sheet focused on one cohort (contextual mode)
      async function openContextualEditor(cohortNumber) {
        profileEditorActive = true;

        // Construct sheet dynamically using the bottom-sheet component
        constructSheet({
          title: COHORT_TITLES[cohortNumber] || "Edición de Perfil",
          scope: "profile",
          content: "#tmpl-profile-editor",
          bottom_actions: {
            layout: "single",
            primary: {
              label: "Listo",
              callback: () => closeProfileEditor(false),
            },
          },
        });

        // Set cohort attribute on the sheet container for conditional visibility styles
        const sheet = document.querySelector('[data-scope="profile"]');
        if (sheet) {
          sheet.setAttribute("data-active-cohort", cohortNumber);
        }

        // Get card data and populate inputs inside the fresh DOM
        await openProfileEditor();

        // Bind event listeners to these newly created input elements
        bindCohortInputs();

        // ── DataFlowBinder: Input → Mock API → DOM ────────────────────────
        // Destroy any previous binder instance before creating a new one
        if (window.__activeFlowBinder) {
          window.__activeFlowBinder.destroy();
        }
        if (window.DataFlowBinder && sheet) {
          const flowBinder = new window.DataFlowBinder({
            container: sheet,
            endpoint: "/wp-json/nfc/v1/update-field",
            debounceMs: 300,
            onSyncStart: (input) => {
              input?.classList.add("is-syncing");
            },
            onSyncSuccess: (input, field, target, value) => {
              input?.classList.remove("is-syncing");
              input?.classList.add("is-synced");
              setTimeout(() => input?.classList.remove("is-synced"), 1200);
              console.log(`[FlowBinder] ✓ ${field} → "${value}" → ${target}`);
            },
            onSyncError: (input, field, err) => {
              input?.classList.remove("is-syncing");
              input?.classList.add("is-error");
              setTimeout(() => input?.classList.remove("is-error"), 2000);
              console.error(`[FlowBinder] ✗ ${field}:`, err);
            },
          });
          flowBinder.bind();
          window.__activeFlowBinder = flowBinder;
        }

        // If it's cohort 3 or 5 (Navigation / Contact and Networks)
        if (cohortNumber === 3 || cohortNumber === 5) {
          // Initialize navigation mode (Scroll vs Tab)
          const navType = cachedCardData?.config?.["nav-type"] || "scroll";
          setNavModeUI(navType);

          // Activate pane and tab
          document
            .querySelectorAll(".cohort-tab")
            .forEach((t) => t.classList.remove("active"));
          document
            .querySelectorAll(".cohort-pane")
            .forEach((p) => p.classList.remove("active"));

          const targetPane = document.getElementById(`pane-${cohortNumber}`);
          if (targetPane) targetPane.classList.add("active");

          const targetTab = document.querySelector(
            `.cohort-tab[data-cohort="${cohortNumber}"]`,
          );
          if (targetTab) targetTab.classList.add("active");

          // Bind tab click listener
          setupTabListeners();
        } else {
          // Cohorts 1 and 2
          document
            .querySelectorAll(".cohort-pane")
            .forEach((p) => p.classList.remove("active"));
          const pane = document.getElementById(`pane-${cohortNumber}`);
          if (pane) pane.classList.add("active");
        }

        // Bind segmented buttons and cover style change listeners
        setupDesignModeListeners();
      }

      function setNavModeUI(mode) {
        const container = document.querySelector('[data-scope="profile"]');
        if (!container) return;

        if (mode === "scroll") {
          container.classList.remove("mode-tabs");
          container.classList.add("mode-scroll");
          document.getElementById("btn-nav-scroll")?.classList.add("active");
          document.getElementById("btn-nav-tabs")?.classList.remove("active");
        } else {
          container.classList.remove("mode-scroll");
          container.classList.add("mode-tabs");
          document.getElementById("btn-nav-tabs")?.classList.add("active");
          document.getElementById("btn-nav-scroll")?.classList.remove("active");
        }
      }

      function handleAparienciaMode(mode) {
        handleIslandMode(mode);
      }

      // ===== COHORT PROFILE EDITOR CONTROLLER =====
      let profileEditorActive = false;
      let cachedCardData = null;

      // 1. Intercept binder fetcher to establish Single Source of Truth
      function initBinderFetcherIntercept() {
        if (!window.__adminBinder || !window.__adminBinder.fetcher) return;
        const originalFetch = window.__adminBinder.fetcher.fetchData.bind(
          window.__adminBinder.fetcher,
        );
        window.__adminBinder.fetcher.fetchData = async function () {
          const stored = localStorage.getItem("NFC_CARD_DATA");
          if (stored) {
            try {
              return JSON.parse(stored);
            } catch (e) {}
          }
          const fetched = await originalFetch();
          localStorage.setItem("NFC_CARD_DATA", JSON.stringify(fetched));
          return fetched;
        };
      }

      // Initialize the intercept once binder is ready
      setTimeout(initBinderFetcherIntercept, 100);

      // Load data helper
      async function getCardData() {
        if (window.__adminBinder && window.__adminBinder.fetcher) {
          return await window.__adminBinder.fetcher.fetchData();
        }
        const stored = localStorage.getItem("NFC_CARD_DATA");
        if (stored) {
          try {
            return JSON.parse(stored);
          } catch (e) {}
        }
        return await fetch("/data/card-data.json")
          .then((r) => r.json())
          .catch(() => ({}));
      }

      // Save data helper
      function saveCardData(data) {
        localStorage.setItem("NFC_CARD_DATA", JSON.stringify(data));
        if (window.__adminBinder && window.__adminBinder.hydrator) {
          window.__adminBinder.hydrator.hydrate(data);
        }
      }

      // Open Profile Editor (mode === "cardbar"): loads and populates inputs
      async function openProfileEditor() {
        profileEditorActive = true;
        const data = await getCardData();
        cachedCardData = data;

        // Ensure nodes exist in cache
        if (!data.profile) data.profile = {};
        if (!data.profile.photo) data.profile.photo = { src: "" };
        if (!data.profile.cover) data.profile.cover = { src: "" };
        if (!data.config) data.config = {};

        const setVal = (id, val) => {
          const el = document.getElementById(id);
          if (el) el.value = val;
        };

        // Populate fields
        // Cohort 1: Foto y portada
        setVal("input-profile-photo", data.profile.photo.src || "");
        const avatarPrev = document.getElementById("edit-avatar-preview");
        if (avatarPrev) avatarPrev.src = data.profile.photo.src || "";

        setVal("input-profile-cover", data.profile.cover.src || "");
        const coverPrev = document.getElementById("edit-cover-preview");
        if (coverPrev) {
          coverPrev.style.backgroundImage = data.profile.cover.src
            ? `url("${data.profile.cover.src}")`
            : "";
        }

        // Check active cover style
        const mainEl = document.querySelector(".main-content");
        const activeStyle = mainEl
          ? mainEl.getAttribute("data-style")
          : "classic";
        const radioEl = document.querySelector(
          `input[name="image_style"][value="${activeStyle}"]`,
        );
        if (radioEl) radioEl.checked = true;

        // Cohort 2: Datos
        setVal("input-profile-name", data.profile.name || "");
        setVal("input-profile-title", data.profile.title || "");
        setVal("input-profile-org", data.profile.org || "");
        setVal("input-profile-bio", data.profile.bio || "");

        // Cohort 3: Contacto
        setVal("input-profile-email", data.profile.email || "");
        setVal("input-profile-phone", data.profile.phone || "");
        setVal("input-profile-website", data.profile.website || "");

        // Cohort 6: Redes Icons Toggle
        const showUnderBio = data.config["show-networks-under-bio"] ?? true;
        const toggleSocial = document.getElementById(
          "toggle-social-icons-under-bio",
        );
        if (toggleSocial) toggleSocial.checked = showUnderBio;
      }

      // closeProfileEditor: if fullyExit=true, reset island; otherwise just close sheet and
      // keep the card in edit mode so the user can continue tapping other zones.
      function closeProfileEditor(fullyExit = false) {
        profileEditorActive = false;

        // Destroy DataFlowBinder to cancel in-flight requests and remove listeners
        if (window.__activeFlowBinder) {
          window.__activeFlowBinder.destroy();
          window.__activeFlowBinder = null;
        }

        closeSheet();

        if (fullyExit) {
          deactivateCardEditMode();
          const island = document.getElementById("island");
          if (island && typeof island.setActiveMode === "function") {
            island.setActiveMode(null);
          }
        }
      }

      window.closeProfileEditor = closeProfileEditor;

      // Tabs switching mechanism
      function setupTabListeners() {
        document.querySelectorAll(".cohort-tab").forEach((tab) => {
          tab.addEventListener("click", (e) => {
            const btn = e.target.closest(".cohort-tab");
            const cohort = btn.dataset.cohort;

            document
              .querySelectorAll(".cohort-tab")
              .forEach((t) => t.classList.remove("active"));
            btn.classList.add("active");

            document
              .querySelectorAll(".cohort-pane")
              .forEach((p) => p.classList.remove("active"));
            const pane = document.getElementById(`pane-${cohort}`);
            if (pane) pane.classList.add("active");
          });
        });
      }

      // Design controls switching mechanism
      function setupDesignModeListeners() {
        document.querySelectorAll("[data-nav-mode]").forEach((btn) => {
          btn.addEventListener("click", (e) => {
            const targetMode = e.currentTarget.dataset.navMode;
            if (!cachedCardData) return;
            if (!cachedCardData.config) cachedCardData.config = {};
            cachedCardData.config["nav-type"] = targetMode;
            saveCardData(cachedCardData);

            // Update UI styles and active buttons
            setNavModeUI(targetMode);
          });
        });

        // Radio buttons style change event
        document
          .querySelectorAll('input[name="image_style"]')
          .forEach((radio) => {
            radio.addEventListener("change", (e) => {
              const val = e.target.value;
              const mainEl = document.querySelector(".main-content");
              if (mainEl) {
                mainEl.setAttribute("data-style", val);
                // Save to config
                if (cachedCardData) {
                  if (!cachedCardData.config) cachedCardData.config = {};
                  cachedCardData.config.cover_active = val === "with-cover";
                  saveCardData(cachedCardData);
                }
              }
            });
          });
      }

      // Save sync with inputs
      function bindCohortInputs() {
        const syncValue = (inputId, objPath, isSrc = false, isBg = false) => {
          const el = document.getElementById(inputId);
          if (!el) return;

          el.addEventListener("input", (e) => {
            if (!cachedCardData) return;
            const val = e.target.value;

            // Set nested value
            const parts = objPath.split(".");
            let current = cachedCardData;
            for (let i = 0; i < parts.length - 1; i++) {
              current = current[parts[i]];
            }
            current[parts[parts.length - 1]] = val;

            // Sync live previews in sheet
            if (isSrc) {
              const prev = document.getElementById(
                inputId.replace("input-", "") + "-preview",
              );
              if (prev) prev.src = val;
            }
            if (isBg) {
              const prev = document.getElementById(
                inputId.replace("input-", "") + "-preview",
              );
              if (prev) prev.style.backgroundImage = val ? `url("${val}")` : "";
            }

            // Sync visual covers
            if (objPath === "profile.cover.src") {
              const bgCover = document.getElementById("background_cover");
              if (bgCover)
                bgCover.style.backgroundImage = val ? `url("${val}")` : "";
            }

            saveCardData(cachedCardData);
          });
        };

        // Cohort 1
        syncValue("input-profile-photo", "profile.photo.src", true);
        syncValue("input-profile-cover", "profile.cover.src", false, true);

        // Radio buttons style change event
        document
          .querySelectorAll('input[name="image_style"]')
          .forEach((radio) => {
            radio.addEventListener("change", (e) => {
              const val = e.target.value;
              const mainEl = document.querySelector(".main-content");
              if (mainEl) {
                mainEl.setAttribute("data-style", val);
                // Save to config
                if (cachedCardData) {
                  if (!cachedCardData.config) cachedCardData.config = {};
                  cachedCardData.config.cover_active = val === "with-cover";
                  saveCardData(cachedCardData);
                }
              }
            });
          });

        // Cohort 2
        syncValue("input-profile-name", "profile.name");
        syncValue("input-profile-title", "profile.title");
        syncValue("input-profile-org", "profile.org");
        syncValue("input-profile-bio", "profile.bio");

        // Cohort 3
        syncValue("input-profile-email", "profile.email");
        syncValue("input-profile-phone", "profile.phone");
        syncValue("input-profile-website", "profile.website");

        // Cohort 6: toggle icons
        document
          .getElementById("toggle-social-icons-under-bio")
          ?.addEventListener("change", (e) => {
            if (!cachedCardData) return;
            cachedCardData.config["show-networks-under-bio"] = e.target.checked;
            saveCardData(cachedCardData);

            // Toggle UI list visibility
            const list =
              document.querySelector(".aurora__socials") ||
              document.querySelector(".blank__socials");
            if (list) {
              list.style.display = e.target.checked ? "flex" : "none";
            }
          });
      }

      // Initialize inputs listeners
      setTimeout(bindCohortInputs, 200);

      window.__openAppearanceEditor = openImmersiveAppearance;
      window.__closeAppearanceEditor = closeImmersiveAppearance;

      importIslandMenu(morphedIslandConfig)
        .then((island) => {
          setupIslandListeners(island);
        })
        .catch((err) =>
          console.error("[admin binder] island bootstrap failed:", err),
        );
    </script>

    <!-- Header: click toggle + scroll-depth compression effect -->
    <script>
      (function () {
        const storage = document.getElementById("data-status-storage");
        const handler = document.querySelector(".handler");
        const actions = document.querySelector(".header__actions");
        const nextHandler = document.querySelector(".header__action.handler");

        if (!storage || !handler) return;

        // === Click toggle for data-top-menu (handle rotation etc.) ===
        function setTopMenuState(state) {
          storage.setAttribute("data-top-menu", state); // "hidden" | "showing"
        }

        handler.addEventListener("click", () => {
          const current = storage.getAttribute("data-top-menu");
          setTopMenuState(current === "hidden" ? "showing" : "hidden");
        });

        // === Scroll-depth calculator (drives --scale / --blur on header) ===
        if (!actions) return;

        const MAX_SCROLL_DEPTH = 220;
        const MIN_SCALE = 0.7;
        const MAX_BLUR = 7;

        let ticking = false;

        function updateHeaderEffect() {
          const scrollY = window.scrollY || 0;
          const progress = Math.min(Math.max(scrollY / MAX_SCROLL_DEPTH, 0), 1);

          const scale = (1 - (1 - MIN_SCALE) * progress).toFixed(3);
          const blur = (MAX_BLUR * progress).toFixed(1);
          const newBlur = blur - 1.5;

          actions.style.setProperty("--scale", scale);
          actions.style.setProperty("--blur", `${newBlur}px`);
          nextHandler.style.setProperty("--translate", `${blur * -20}px`);
        }

        function onScroll() {
          if (!ticking) {
            requestAnimationFrame(() => {
              updateHeaderEffect();
              ticking = false;
            });
            ticking = true;
          }
        }

        window.addEventListener("scroll", onScroll, { passive: true });

        // Initialize on load (handles restored scroll position)
        updateHeaderEffect();
      })();
    </script>
  </body>
