    <style>
      :root {
        --background-color: #efefef;
        --font-color: #111111;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background-color: #e6e6e6; /* Fondo gris claro exterior */
        color: var(--font-color);
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      #app {
        width: 100%;
        max-width: 500px;
        display: flex;
        flex-direction: column;
        position: relative;
      }

      /* === HEADER (PIXEL PERFECT) === */
      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        width: -webkit-fill-available;
        margin: 50px 10px;
        margin-bottom: 30px;
        box-sizing: border-box;
      }

      .header__menu {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .header__back-btn {
        background: transparent;
        border: solid 1px #555 !important;
        color: #333;
        border: none;
        padding: 8px 16px 8px 8px;
        border-radius: 15px;
        font-size: 18px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
      }

      .header__back-btn svg {
        transform: rotate(90deg) translateX(3px);
        --wh: 24px;
        width: var(--wh);
        height: var(--wh);
      }

      .header__title-container {
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .header__title {
        font-size: 16px;
        font-weight: 400;
        color: #111;
      }

      .header__module-icon svg {
        width: 16px;
        height: 16px;
        opacity: 0.8;
        transform: translateY(3px);
      }

      .header__cta {
        background: #06896c; /* Verde del botón publish */
        color: white;
        border: none;
        padding: 8px 18px 8px 14px;
        border-radius: 25px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 8px;
        transition: all 0.3s ease;
      }

      .header__cta svg {
        width: 18px;
        height: 18px;
      }

      .header__cta--cancel {
        display: none;
      }

      .header__cta#publishBtn {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 32px 9px 26px;
        font-size: 18px;
      }

      .header__cta#publishBtn svg {
        width: 24px;
        height: 24px;
        opacity: 0.8;
      }

      /* === MAIN CONTENT (CARD) === */
      .main-content {
        background: var(--background-color);
        min-height: calc(100vh - 160px);
        position: relative;
        border-radius: 20px 20px 0px 0px;
        transition: all 0.5s ease;
        box-shadow: 0 0px 62px rgb(0 0 0 / 25%);
        z-index: 15;
        max-width: 500px;
        margin: 0 auto;
        width: 97%;
        height: -webkit-fill-available;
      }

      .main-content__top-bar {
        display: flex;
        width: -webkit-fill-available;
        justify-content: space-between;
        margin-bottom: 5px;
        transition: all 0.5s ease;
        position: absolute;
        top: 20px;
        padding: 20px;
        padding-bottom: 0px;
        z-index: 10;
        pointer-events: none;
        top: 0px;
      }

      .logo-chip {
        --wh: 30px;
        height: var(--wh);
        width: calc(var(--wh) * 2);
        border-radius: 40px;
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #00000055;
        color: #fff;
        min-height: 44px;
        --blur: blur(18px);
        backdrop-filter: var(--blur);
        -webkit-backdrop-filter: var(--blur);
      }

      .logo-chip__icon {
        width: 24px;
        height: 24px;
        fill: white;
      }

      /* === SKELETON LOADERS === */
      h1:empty,
      h2:empty {
        width: fit-content;
        min-width: 200px;
        height: 24px;
        background-color: #e0e0e0;
        margin: 10px 0;
        border-radius: 100px;
        background-image: linear-gradient(
          90deg,
          #00000005 0%,
          #00000015 50%,
          #00000005 100%
        );
        background-size: 400% 100%;
        animation: skel-shimmer 2s infinite linear;
      }

      @keyframes skel-shimmer {
        0% {
          background-position: 100% 0;
        }
        100% {
          background-position: -100% 0;
        }
      }

      /* === CONTROLS TOOLBAR (BOTTOM) === */
      .controls {
        position: fixed;
        bottom: 0px;
        left: 0px;
        padding: 16px;
        background-color: #ffffff;
        border-top: 1px solid #e0e0e0;
        width: 100%;
        box-sizing: border-box;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        z-index: 2000;
        box-shadow: 0 -4px 10px rgba(0, 0, 0, 0.05);
      }

      .controls__input,
      .controls__select,
      .controls__button {
        border: solid 1px #bbb;
        padding: 6px 12px;
        border-radius: 8px;
        background: white;
      }

      .controls__editor {
        width: 100%;
        height: 60px;
        margin-top: 4px;
        border: 1px solid #bbb;
        border-radius: 8px;
        padding: 8px;
        font-family: monospace;
      }

      /**/
      .main-content__user-card {
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      /* === COVER & PROFILE PIC === */
      .cover {
        position: relative;
        width: 100%;
        margin-bottom: 50px;
      }

      .cover__box {
        width: 100%;
        height: 180px;
        overflow: hidden;
        border-top-left-radius: 20px;
        border-top-right-radius: 20px;
      }

      .cover__image {
        width: 100%;
        height: 100%;
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
      }

      .cover__avatar {
        position: absolute;
        bottom: -40px;
        left: 50%;
        transform: translateX(-50%);
        width: 100px;
        height: 100px;
        border-radius: 50%;
        border: 4px solid var(--background-color);
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
        overflow: hidden;
        background-color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .cover__avatar-img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
    </style>
  </head>

  <body>
    <div id="data-status-storage"></div>

    <div id="app">
      <header class="header">
        <div class="header__menu">
          <button
            class="header__back-btn"
            id="backBtn"
            data-action="nav:back"
            aria-label="Atrás"
          >
            <svg><use href="#back-arrow"></use></svg>
          </button>
          <div class="header__title-container">
            <span class="header__title">Main hub</span>
            <div class="header__module-icon">
              <svg><use href="#chevron-arrow"></use></svg>
            </div>
          </div>
        </div>

        <button
          id="cancelBtn"
          data-action="content:cancel"
          class="header__cta header__cta--cancel"
        >
          Cancel
        </button>

        <span class="header__cta-container">
          <button
            id="publishBtn"
            data-action="content:publish"
            class="header__cta"
          >
            <svg><use href="#share"></use></svg>
            <span class="header__btn-text">Publish</span>
          </button>
        </span>
      </header>

      <main class="main-content main-content--profile" data-style="classic">
        <div class="main-content__top-bar">
          <div class="logo-chip">
            <svg class="logo-chip__icon" viewBox="0 0 24 24" fill="none">
              <use href="#logo"></use>
            </svg>
          </div>
        </div>

        <div class="cover">
          <div class="cover__box">
            <div
              class="cover__image nfc_cover"
              id="background_cover"
              style="
                background-image: url(&quot;https://app.newfacecards.com/nfc/cover/recBOO8H0GO0RZlUU.jpg?timestamp=1723160438&amp;size=1000x500&quot;);
              "
            ></div>
          </div>
          <div class="cover__avatar">
            <img
              decoding="async"
              src="https://app.newfacecards.com/nfc/profile-pic/recBOO8H0GO0RZlUU.jpg?timestamp=1723160426&amp;size=1000x1000"
              width="500"
              height="500"
              class="cover__avatar-img"
              id="profile_pic"
            />
          </div>
        </div>

        <div id="card" class="main-content__user-card">
          <h1 id="title"></h1>
          <h2 id="subtitle"></h2>
        </div>
      </main>
    </div>

    <div class="controls">
      <input
        type="text"
        class="controls__input"
        id="binder"
        placeholder="Escribe algo aquí..."
      />
      <select class="controls__select" id="selector"></select>
      <button class="controls__button" id="btn-bind">Bind</button>
      <button class="controls__button" id="btn-clear">Vaciar</button>
      <button class="controls__button" id="run-btn">Run JS</button>
      <textarea
        class="controls__editor"
        id="js-editor"
        placeholder="Escribe JS aquí (ej: loadStyles(styles.style1, 'set'))"
      ></textarea>
    </div>
    <!--   -->
    <div id="island"></div>

    <div id="root-styles-loader"></div>

    <script>
      const STORAGE_PREFIX = "APP_BIND_";
      const DOM = {
        TARGETS: {
          title: "#title",
          subtitle: "#subtitle",
          styles_loader: "#root-styles-loader",
        },
        INPUTS: { main: "#binder", selector: "#selector" },
        ACTIONS: { bind: "#btn-bind", clear: "#btn-clear", run: "run-btn" },
      };

      const BINDING_MAP = {
        TITLE: { label: "Título Principal", selector: DOM.TARGETS.title },
        SUBTITLE: { label: "Subtítulo", selector: DOM.TARGETS.subtitle },
      };

      const styles = {
        style1: `:root { --background-color: #0082ca; --font-color: #ffffff; }`,
        reset: `:root { --background-color: #efefef; --font-color: #111111; }`,
        style2: `:root { --background-color: #222222; --font-color: #ffffff; }`,
      };

      function loadStyles(data, action) {
        const container = document.querySelector(DOM.TARGETS.styles_loader);
        container.innerHTML = action === "set" ? `<style>${data}</style>` : "";
      }

      const BindingManager = {
        init() {
          this.input = document.querySelector("#binder");
          this.select = document.querySelector("#selector");

          Object.values(BINDING_MAP).forEach(({ label, selector }) => {
            const opt = document.createElement("option");
            opt.value = selector;
            opt.textContent = label;
            this.select.appendChild(opt);
          });

          Object.values(BINDING_MAP).forEach(({ selector }) => {
            const saved = localStorage.getItem(STORAGE_PREFIX + selector);
            if (saved) document.querySelector(selector).textContent = saved;
          });

          document.querySelector(DOM.ACTIONS.bind).onclick = () => {
            const target = document.querySelector(this.select.value);
            target.textContent = this.input.value;
            localStorage.setItem(
              STORAGE_PREFIX + this.select.value,
              this.input.value,
            );
          };

          document.querySelector(DOM.ACTIONS.clear).onclick = () => {
            document.querySelector(this.select.value).textContent = "";
            localStorage.removeItem(STORAGE_PREFIX + this.select.value);
          };

          document.getElementById(DOM.ACTIONS.run).onclick = () => {
            try {
              eval(document.getElementById("js-editor").value);
            } catch (e) {
              console.error(e);
            }
          };
        },
      };

      document.addEventListener("DOMContentLoaded", () =>
        BindingManager.init(),
      );
    </script>

    <!-- Island Menu: modern reusable component (auto-enhances existing markup) -->
    <script type="module">
      import { importIslandMenu } from "/shared/components/island-menu/island-menu.js";

      // Expose globally for testing/dynamic calls
      window.importIslandMenu = importIslandMenu;

      // Host page integration example: listen to island CustomEvents
      document.addEventListener("DOMContentLoaded", () => {
        const island = document.getElementById("island");
        if (island) {
          setupIslandListeners(island);
        }
      });

      function setupIslandListeners(el) {
        el.addEventListener("island-action", (e) => {
          console.log("[admin binder] island-action:", e.detail);

          // Example of dynamic template swapping on satellite click (if edit mode)
          if (e.detail.type === "more-options") {
            console.log(
              "Swapping to custom quick action template from templates folder!",
            );
            window
              .importIslandMenu(
                "/shared/components/island-menu/templates/app-edit.html",
              )
              .then(() => {
                // Re-setup listener since new elements were injected
                setupIslandListeners(document.getElementById("island"));
              });
          }
        });
        el.addEventListener("island-mode-change", (e) => {
          console.log("[admin binder] island-mode-change:", e.detail);
        });
        el.addEventListener("island-status-change", (e) => {
          console.log("[admin binder] island-status-change:", e.detail);
        });
      }
    </script>
