    <style>
      :root {
        --background-color: #efefef;
        --font-color: #111111;
        --w100: -webkit-fill-available;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background-color: #e6e6e6; /* Fondo gris claro exterior */
        color: var(--font-color);
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        scroll-behavior: smooth;
        transition: blur-start;
      }

      #app {
        width: var(--w100);
        display: flex;
        flex-direction: column;
        position: relative;
      }

      /* === HEADER (PIXEL PERFECT) === */
      .header__actions {
        display: flex;
        justify-content: space-between;
        align-items: center;
        width: var(--w100);
        margin: 50px 0px 30px 10px;
        box-sizing: border-box;
        position: sticky;
        top: 30px;
        transition: all 0.3s ease;
        transform: scale(var(--scale, 1));
        filter: blur(var(--blur, 0px));
      }

      .header__menu {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .header__back-btn {
        background: transparent;
        border: solid 1px #555 !important;
        color: #333;
        border: none;
        padding: 8px 16px 8px 8px;
        border-radius: 15px;
        font-size: 18px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
      }

      .header__back-btn svg {
        transform: rotate(90deg) translateX(3px);
        --wh: 24px;
        width: var(--wh);
        height: var(--wh);
      }

      .header__title-container {
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .header__title {
        font-size: 16px;
        font-weight: 400;
        color: #111;
      }

      .header__module-icon svg {
        width: 16px;
        height: 16px;
        opacity: 0.8;
        transform: translateY(3px);
      }

      .header__cta {
        background: #06896c; /* Verde del botón publish */
        color: white;
        border: none;
        padding: 8px 18px 8px 14px;
        border-radius: 25px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 8px;
        transition: all 0.3s ease;
        min-height: 47px;
      }

      .header__cta svg {
        width: 18px;
        height: 18px;
      }

      .header__cta--cancel {
        display: none;
      }

      .header__cta-container:has(#publishBtn) {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 0px 9px 26px;
        font-size: 18px;
      }

      .header__cta-container:has(#publishBtn) svg {
        width: 24px;
        height: 24px;
        opacity: 0.8;
      }

      #publishBtn {
        min-width: 133px;
        z-index: 1;
        justify-content: center;
      }

      #completePublishBtn {
        position: absolute;
      }

      header {
        transition: all 0.3s ease;
        margin: 0 auto;
        width: var(--w100);
        max-width: 500px;
      }

      [data-top-menu="hidden"] + #app {
        header {
          margin-bottom: -50px;
          transform: translatey(-110px);
        }
      }

      .header__action.handler {
        display: flex;
        width: var(--w100);
        justify-content: center;
      }

      .handler--drag {
        padding: 8px 15px;
        border-radius: 100px;
        background-color: #fff;
        margin: 5px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        cursor: pointer;
        z-index: 1;
      }

      .handler--drag:before,
      .handler--drag:after {
        content: "";
        display: block;
        width: 18px;
        height: 4px;
        background: #ccc;
        border-radius: 2px;
        transition: all 0.2s;
      }

      .handler--drag:before {
        margin-right: -1px;
      }
      .handler--drag:after {
        margin-left: -1px;
      }

      [data-top-menu="hidden"] + #app .handler--drag:before {
        transform: rotate(16deg);
      }
      [data-top-menu="hidden"] + #app .handler--drag:after {
        transform: rotate(-16deg);
      }

      #data-status-storage:not([data-top-menu="hidden"])
        + #app
        .handler--drag:before {
        transform: rotate(-16deg);
      }
      #data-status-storage:not([data-top-menu="hidden"])
        + #app
        .handler--drag:after {
        transform: rotate(16deg);
      }

      /* === MAIN CONTENT (CARD) === */
      .main-content {
        background: var(--background-color);
        min-height: calc(100vh - 160px);
        position: relative;
        border-radius: 20px 20px 0px 0px;
        transition: all 0.5s ease;
        box-shadow: 0 0px 62px rgb(0 0 0 / 25%);
        z-index: 15;
        max-width: 500px;
        margin: 0 auto;
        width: 97%;
        height: var(--w100);
        overflow: clip;
      }

      .main-content__top-bar {
        display: flex;
        width: var(--w100);
        justify-content: space-between;
        margin-bottom: 5px;
        transition: all 0.5s ease;
        position: absolute;
        top: 20px;
        padding: 20px;
        padding-bottom: 0px;
        z-index: 10;
        pointer-events: none;
        top: 0px;
      }

      .logo-chip {
        --wh: 30px;
        height: var(--wh);
        width: calc(var(--wh) * 2);
        border-radius: 40px;
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #00000055;
        color: #fff;
        min-height: 44px;
        --blur: blur(18px);
        backdrop-filter: var(--blur);
        -webkit-backdrop-filter: var(--blur);
      }

      .logo-chip__icon {
        width: 24px;
        height: 24px;
        fill: white;
      }

      /* === SKELETON LOADERS === */
      h1:empty,
      h2:empty {
        width: fit-content;
        min-width: 200px;
        height: 24px;
        background-color: #e0e0e0;
        margin: 10px 0;
        border-radius: 100px;
        background-image: linear-gradient(
          90deg,
          #00000005 0%,
          #00000015 50%,
          #00000005 100%
        );
        background-size: 400% 100%;
        animation: skel-shimmer 2s infinite linear;
      }

      @keyframes skel-shimmer {
        0% {
          background-position: 100% 0;
        }
        100% {
          background-position: -100% 0;
        }
      }

      /* === BOTTOM SHEET: CONTROLS === */
      .controls {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        z-index: 3000;
        background: #fff;
        border-radius: 16px 16px 0 0;
        box-shadow: 0 -8px 24px rgba(0, 0, 0, 0.18);
        padding: 8px 16px 16px;
        box-sizing: border-box;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        max-height: 48px; /* collapsed state - only handle visible */
        overflow: hidden;
        transition: max-height 0.35s cubic-bezier(0.32, 0.72, 0, 1);
        border-top: 1px solid #e5e5e5;
      }

      .controls.expanded {
        max-height: 320px; /* enough for all fields + textarea */
        overflow: auto;
      }

      .controls__handle {
        width: 100%;
        height: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        margin-bottom: 4px;
        flex: 0 0 100%;
      }

      /* Hide all controls content except the handle when collapsed */
      .controls:not(.expanded) > *:not(.controls__handle) {
        display: none;
      }

      .controls__handle::after {
        content: "";
        width: 36px;
        height: 4px;
        background: #ccc;
        border-radius: 2px;
        transition: all 0.2s;
      }

      .controls:hover .controls__handle::after {
        background: #999;
      }

      .controls__input,
      .controls__select,
      .controls__button {
        border: solid 1px #bbb;
        padding: 6px 12px;
        border-radius: 8px;
        background: white;
      }

      .controls__editor {
        width: 100%;
        height: 70px;
        margin-top: 4px;
        border: 1px solid #bbb;
        border-radius: 8px;
        padding: 8px;
        font-family: monospace;
        flex: 1 1 100%;
      }

      /**/
      .main-content__user-card {
        display: flex;
        flex-direction: column;
        align-items: center;
        height: 100vh;
        max-height: var(--w100);
        background-color: var(--card-background);
      }

      .main-content__user-card:not(:has([data-status="skel"])) > div {
        height: var(--w100);
      }

      /* === COVER & PROFILE PIC === */
      .cover {
        position: relative;
        width: 100%;
        margin-bottom: 50px;
      }

      .cover__box {
        width: 100%;
        height: 180px;
        overflow: hidden;
        border-top-left-radius: 20px;
        border-top-right-radius: 20px;
      }

      .cover__image {
        width: 100%;
        height: 100%;
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
      }

      .cover__avatar {
        position: absolute;
        bottom: -40px;
        left: 50%;
        transform: translateX(-50%);
        width: 100px;
        height: 100px;
        border-radius: 50%;
        border: 4px solid var(--background-color);
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
        overflow: hidden;
        background-color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .cover__avatar-img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      #card * {
        max-width: var(--w100);
      }

      .header__action.handler:before {
        content: "";
        width: var(--w100);
        position: absolute;
        min-height: 70px;
        background-image: linear-gradient(transparent 1%, #e6e6e6 60%, #e6e6e6);
        border-radius: 19px;
        transform: translateY(var(--translate));
      }

      #app:has(.edit-mode-active) header {
        margin-bottom: -50px;
        transform: translatey(-110px);
        height: 85px;
      }

      #app:has(.edit-mode-active) .handler--drag {
        transform: scale(0);
      }

      [data-bottom-sheet="showing"] + #app main {
        transform: scale(0.9) translate(0px, -50px);
      }

      h1:empty,
      h2:empty {
        width: fit-content;
        min-width: 13ch;
        max-height: 30px;
        background-color: #efefef;
        margin: 20px auto 0px auto;
        border-radius: 100px;
        background-image: linear-gradient(
          90deg,
          #00000010 0%,
          #00000035 50%,
          #00000010 100%
        );
        background-size: 400% 100%;
        animation: skel-shimmer 2s infinite linear;
      }
      @keyframes skel-shimmer {
        0% {
          background-position: 100% 0;
        }
        100% {
          background-position: -100% 0;
        }
      }

      #card * {
        max-width: var(--w100);
      }
    </style>
  </head>

  <body>
    <div id="data-status-storage">
      <!-- 
    INSTRUCCIONES.
    ESTE ELEMENTO HTML SE USARA PARA ALMACENAR ESTADOS DE JS EN ATRIBUTOS data-*something
    de esta manera permitiremos a la UI cambiar su aspecto dependiendo del atributo y estado designado por medio de cadena de clases css

    ejemplo:

    #data-status-storage[data-status="offline"] + #app{
        --background-color: #efefef;
    }
    #data-status-storage[data-status="online"] + #app{
        --background-color: #00ff00;
    }

    ESTADO GLOBAL DE UI (State-Driven CSS)

    Este elemento actúa como un "observador de estado". La lógica de negocio 
    en JS actualiza únicamente los atributos data-* de este nodo, y el CSS 
    reacciona de forma declarativa mediante selectores de atributos.

    Mantenimiento:
    - Evitar lógica compleja aquí; solo estados de alto nivel (ej: auth, theme, status).

    <div id="app">

                <span class="header__title">Main hub</span>

      <main class="main-content profile-section" data-style="classic">
        <div class="main-content__top-bar">
          <div class="logo-chip">
            <svg class="logo-chip__icon" viewBox="0 0 24 24" fill="none">
              <use href="#logo"></use>
            </svg>
          </div>
        </div>
        <div
          id="card"
          class="main-content__user-card"
          data-object="binder-area"
          data-hydrated=""
        >
          <!-- unnmamed template test -->
          <style>
            /* =========================================
Variables base y diseño
========================================= */
            :root {
              --bg-color: #f3f4f6;
              --text-color: #1f2937;
              --primary: #3b82f6;
              --profile-pic: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="150" height="150"><rect width="150" height="150" fill="%23cccccc"/></svg>');
              font-family:
                system-ui,
                -apple-system,
                sans-serif;
            }

            body {
              background-color: var(--bg-color);
              color: var(--text-color);
              display: flex;
              justify-content: center;
              align-items: center;
              min-height: 100vh;
              margin: 0;
            }

            /* Contenedor principal que maneja el estado visual en cascada */
            .status-storage {
              width: 100%;
              max-width: 400px;
              background: white;
              border-radius: 1rem;
              overflow: hidden;
              box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
              transition: all 0.3s ease;
            }

            .cover-block {
              height: 120px;
              /* La imagen de fondo la toma de la variable CSS que hidrataremos */
              background-image: var(--cover-pic, var(--primary));
              background-size: cover;
              background-position: center;
            }

            .profile-image-container {
              position: relative;
              margin-top: -50px;
              text-align: center;
            }

            .profile-image {
              width: 100px;
              height: 100px;
              border-radius: 50%;
              border: 4px solid white;
              background-color: #eee;
              object-fit: cover;
            }

            .user-info {
              text-align: center;
            }

            .username {
              margin: 0.5rem 0 0.2rem;
              font-size: 1.25rem;
            }

            .tagline {
              margin: 0;
              color: #6b7280;
              font-size: 0.875rem;
            }

            .description {
              margin-top: 1rem;
              font-size: 0.95rem;
              line-height: 1.5;
              color: #4b5563;
            }

            /* =========================================
Estados de Skeleton Loading (Cascada)
========================================= */

            /* Animación de pulso */
            @keyframes pulse {
              0%,
              100% {
                opacity: 1;
              }
              50% {
                opacity: 0.5;
              }
            }

            /* Aplicar skeleton cuando el contenedor tenga data-general-status="skel-loading" */
            .status-storage[data-general-status="skel-loading"]
              .skeleton-target {
              background-color: #e5e7eb;
              color: transparent !important; /* Oculta el texto real si lo hay */
              border-radius: 200px;
              animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
            }

            .status-storage[data-general-status="skel-loading"]
              img.profile-image {
              opacity: 0; /* Oculta la imagen real mientras carga */
            }

            .status-storage[data-general-status="skel-loading"]
              .profile-image-container::after {
              content: "";
              position: absolute;
              top: 4px;
              left: 50%;
              transform: translateX(-50%);
              width: 100px;
              height: 100px;
              border-radius: 50%;
              background-color: #e5e7eb;
              animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
            }
          </style>
          <!-- 
      STATUS STORAGE
      Envolvemos el perfil para que las variables CSS y el estado "skel-loading"
      afecten a todos los elementos hijos en cascada.
    -->

          <div
            class="status-storage"
            data-general-status="skel-loading"
            data-bind="user.avatar.url"
            data-bind-type="css-var"
            data-bind-var="--profile-pic"
            data-bind-format="url('{value}')"
          >
            <section class="profile-head">
              <div class="cover-block"></div>

              <div class="profile-image-container">
                <!-- Hidratación directa del SRC -->
                <img
                  src=""
                  class="profile-image skeleton-target"
                  alt="Profile"
                  data-bind="user.avatar.url"
                  data-bind-type="src"
                  onerror="
                    this.onerror = null;
                    this.src =
                      'data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 24 24\' width=\'100\' height=\'100\'><circle cx=\'12\' cy=\'8\' r=\'4\' fill=\'%23ccc\'/><path d=\'M12 14c-6.1 0-8 4-8 4v2h16v-2s-1.9-4-8-4z\' fill=\'%23ccc\'/></svg>';
                  "
                />
              </div>

              <div class="user-info">
                <!-- Hidratación de texto e innerHTML -->
                <h1
                  class="username skeleton-target"
                  style="width: 60%; margin-left: auto; margin-right: auto"
                  data-bind="user.firstName"
                  data-bind-type="text"
                ></h1>

                <p
                  class="tagline skeleton-target"
                  style="width: 40%; margin-left: auto; margin-right: auto"
                  data-bind="user.role"
                  data-bind-type="text"
                ></p>

                <p
                  class="description skeleton-target"
                  data-bind="user.description"
                  data-bind-type="inner_html"
                ></p>
              </div>
            </section>
          </div>
        </div>
      </main>
    </div>
