    <style>
      :root {
        --background-color: #efefef;
        --font-color: #111111;
      }
      /* Estilos generales */
      body {
        background-color: var(--background-color);
        color: var(--font-color);
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f5f5f5;
        min-height: 100vh;
        position: relative;
        overflow-x: hidden;
        transition: all 0.3s ease;
      }

      h1:empty,
      h2:empty {
        width: fit-content;
        min-width: 13ch;
        max-height: 30px;
        background-color: #efefef;
        margin: 20px auto 0px auto;
        border-radius: 100px;
        background-image: linear-gradient(
          90deg,
          #00000010 0%,
          #00000035 50%,
          #00000010 100%
        );
        background-size: 400% 100%;
        animation: skel-shimmer 2s infinite linear;
      }
      @keyframes skel-shimmer {
        0% {
          background-position: 100% 0;
        }
        100% {
          background-position: -100% 0;
        }
      }
      h1,
      h2 {
        text-align: center;
      }

      /* Controles */
      .controls {
        position: fixed;
        bottom: 0px;
        left: 0px;
        padding: 1rem;
        background-color: #ffffff;
        box-shadow: 0 0 30px 10px #00000030;
        width: 100%;
        box-sizing: border-box;
        display: flex;
        flex-wrap: wrap;
        gap: 5px;
      }
      .controls input,
      .controls select,
      .controls button {
        border: solid 1px grey;
        padding: 5px 1rem;
        border-radius: 10px;
      }
      #js-editor {
        width: 100%;
        height: 60px;
        margin-top: 10px;
        border: 1px solid #ccc;
      }

      .component-wrapper {
        position: relative;
      }

      .bottom-bar {
        padding: 16px 24px;
        border-top: 1px solid #e5e7eb;
        background: white;
      }

      .more-content {
        display: flex;
        gap: 12px;
        align-items: center;
        justify-content: center;
        background: transparent;
        background-image: linear-gradient(135deg, #4facfe99 0%, #00f2fe99 100%);

        backdrop-filter: blur(10px);
        border-top-style: ridge;
        border-top-color: #b7d1d9;
      }

      .top-cta {
        background: #06896c;
        color: white;
        border: none;
        padding: 9px 32px;
        border-radius: 25px;
        font-size: 18px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
      }

      #publishBtn {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 32px 9px 26px;
      }

      .cancel.top-cta {
        display: none;
      }

      button#backBtn.back-btn {
        background: transparent;
        border: solid 1px #555 !important;
        color: #333;
        border: none;
        padding: 8px 16px 8px 8px;
        border-radius: 15px;
        font-size: 18px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
      }

      #backBtn svg {
        transform: rotate(90deg) translateX(3px);
      }

      .module-icon svg {
        transform: translateY(3px);
      }

      .header-menu .title {
        margin-left: 10px;
      }

      .header {
        display: flex;
        width: -webkit-fill-available;
        justify-content: space-between;
        margin: 50px 10px;
        margin-bottom: 30px;
        align-items: flex-end;
        top: 0px;
        position: relative;
        transition: all 0.3s ease;
      }

      .header-menu {
        display: flex;
        align-items: center;
        gap: 5px;
      }

      .header svg {
        width: 24px;
        height: 24px;
        opacity: 0.8;
        transition: all 0.2s ease;
      }

      #app {
        background-color: #efefef;
        position: sticky;
        top: 0px;
        left: 0px;
        width: -webkit-fill-available;
        height: fit-content;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 1000;
        flex-direction: column;
      }

      .main-content {
        background: var(--background-color);
        min-height: calc(100vh - 160px);
        position: relative;
        border-radius: 20px 20px 0px 0px;
        transition: all 0.5s ease;
        box-shadow: 0 0px 62px rgb(0 0 0 / 25%);
        z-index: 15;
        max-width: 500px;
        margin: 0 auto;
        width: 97%;
        height: -webkit-fill-available;
      }
      main .top-bar {
        display: flex;
        width: -webkit-fill-available;
        justify-content: space-between;
        margin-bottom: 5px;
        transition: all 0.5s ease;
        position: absolute;
        top: 20px;
        padding: 20px;
        padding-bottom: 0px;
        z-index: 10;
        pointer-events: none;
        top: 0px;
      }

      .chip.logo {
        --wh: 30px;
        height: var(--wh);
        width: calc(var(--wh) * 2);
        border-radius: 40px;
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #00000055;
        color: #fff;
        min-height: 44px;
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
      }

      .logo {
        font-size: 1.5rem;
        font-weight: 800;
        letter-spacing: -0.5px;
      }
      .top-controls * {
        pointer-events: auto;
      }
      .chip-icon {
        --wh: 24px;
        height: var(--wh);
        width: var(--wh);
        fill: white;
        position: absolute;
      }
    </style>
  </head>

  <body>
    <div id="data-status-storage">
      <!-- 
    INSTRUCCIONES.
    ESTE ELEMENTO HTML SE USARA PARA ALMACENAR ESTADOS DE JS EN ATRIBUTOS data-*something
    de esta manera permitiremos a la UI cambiar su aspecto dependiendo del atributo y estado designado por medio de cadena de clases css

    ejemplo:

    #data-status-storage[data-status="offline"] + #app{
        --background-color: #efefef;
    }
    #data-status-storage[data-status="online"] + #app{
        --background-color: #00ff00;
    }

    ESTADO GLOBAL DE UI (State-Driven CSS)

    Este elemento actúa como un "observador de estado". La lógica de negocio 
    en JS actualiza únicamente los atributos data-* de este nodo, y el CSS 
    reacciona de forma declarativa mediante selectores de atributos.

    Mantenimiento:
    - Evitar lógica compleja aquí; solo estados de alto nivel (ej: auth, theme, status).
    - Selector: Se usa el adyacente (+) para encapsular cambios en #app.
    - Ejemplo: 
    #data-status-storage[data-status="online"] + #app { --color: green; }
    
--->
    </div>
    <div id="app">
      <header class="header">
        <div class="header-menu">
          <button
            class="back-btn"
            id="backBtn"
            data-action="nav:back"
            aria-label="Atrás"
          >
            <svg><use href="#back-arrow"></use></svg>
          </button>
          <span class="title">Main hub</span>
          <div class="module-icon">
            <svg><use href="#chevron-arrow"></use></svg>
          </div>
        </div>
        <button
          id="cancelBtn"
          data-action="content:cancel"
          class="cancel top-cta"
        >
          Cancel
        </button>
        <span class="top-cta-container">
          <button id="publishBtn" data-action="content:publish" class="top-cta">
            <svg><use href="#share"></use></svg>
            <span class="btn-text">Publish</span>
          </button>
        </span>
      </header>
      <main class="main-content profile-section" data-style="classic">
        <div class="top-bar">
          <div class="chip logo">
            <svg class="chip-icon" viewBox="0 0 24 24" fill="none">
              <use href="#logo"></use>
            </svg>
          </div>
        </div>
      </main>
    </div>

    <h1 id="title" contenteditable="true"></h1>
    <h2 id="subtitle" contenteditable="true"></h2>

    <div class="controls">
      <input type="text" id="binder" placeholder="Escribe algo aquí..." />
      <select id="selector"></select>
      <button id="btn-bind">Bind</button>
      <button id="btn-clear">Vaciar</button>
      <button id="run-btn">Run JS</button>
      <textarea
        id="js-editor"
        placeholder="Escribe JS aquí (ej: loadStyles(styles.style1, 'set'))"
      ></textarea>
    </div>

    <div id="root-styles-loader"></div>

    <script>
      // --- CONSTANTES Y CONFIGURACIÓN ---
      const STORAGE_PREFIX = "APP_BIND_";
      const DOM = {
        TARGETS: {
          title: "#title",
          subtitle: "#subtitle",
          styles_loader: "#root-styles-loader",
        },
        INPUTS: { main: "#binder", selector: "#selector" },
        ACTIONS: { bind: "#btn-bind", clear: "#btn-clear", run: "run-btn" },
      };

      const BINDING_MAP = {
        TITLE: { label: "Título Principal", selector: DOM.TARGETS.title },
        SUBTITLE: { label: "Subtítulo", selector: DOM.TARGETS.subtitle },
      };

      const styles = {
        style1: `:root { --background-color: #0082ca; --font-color: #ffffff; }`,
        reset: `:root { --background-color: #efefef; --font-color: #111111; }`,
        style2: `:root { --background-color: #222222; --font-color: #ffffff; }`,
      };

      // --- LÓGICA ---
      function loadStyles(data, action) {
        const container = document.querySelector(DOM.TARGETS.styles_loader);
        container.innerHTML = action === "set" ? `<style>${data}</style>` : "";
      }

      const BindingManager = {
        init() {
          this.input = document.querySelector("#binder");
          this.select = document.querySelector("#selector");

          Object.values(BINDING_MAP).forEach(({ label, selector }) => {
            const opt = document.createElement("option");
            opt.value = selector;
            opt.textContent = label;
            this.select.appendChild(opt);
          });

          // Cargar persistencia
          Object.values(BINDING_MAP).forEach(({ selector }) => {
            const saved = localStorage.getItem(STORAGE_PREFIX + selector);
            if (saved) document.querySelector(selector).textContent = saved;
          });

          document.querySelector(DOM.ACTIONS.bind).onclick = () => {
            const target = document.querySelector(this.select.value);
            target.textContent = this.input.value;
            localStorage.setItem(
              STORAGE_PREFIX + this.select.value,
              this.input.value,
            );
          };

          document.querySelector(DOM.ACTIONS.clear).onclick = () => {
            document.querySelector(this.select.value).textContent = "";
            localStorage.removeItem(STORAGE_PREFIX + this.select.value);
          };

          document.getElementById(DOM.ACTIONS.run).onclick = () => {
            try {
              eval(document.getElementById("js-editor").value);
            } catch (e) {
              console.error(e);
            }
          };
        },
      };

      document.addEventListener("DOMContentLoaded", () =>
        BindingManager.init(),
      );
    </script>
  </body>
