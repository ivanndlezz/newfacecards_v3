<section class="ctrl-page ctrl-page--avatar" data-control-page="avatar">
  <div
    class="ctrl-group"
    data-control-sync="ctrl-size"
    data-target="#avatarContainer"
    data-css-var="--avatar-size"
    data-unit="px"
    data-value-attr="value"
    data-active-status="active"
    data-inactive-status="unset"
    data-values='{"sm":80,"md":109,"lg":140}'
  >
    <div class="ctrl-group__header">
      <span class="ctrl-group__label">
        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M8 3H3v5M16 3h5v5M8 21H3v-5M16 21h5v-5" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M3 3l6.5 6.5M21 3l-6.5 6.5M3 21l6.5-6.5M21 21l-6.5-6.5" stroke="currentColor" stroke-width="2.3" stroke-linecap="round"/>
        </svg>
        Tamaño Avatar
      </span>
      <span class="ctrl-group__value" id="ctrl-size-val"></span>
    </div>

    <div
      class="option-chips"
      data-control-view="ctrl-size"
      data-value-attr="value"
      data-active-status="active"
      data-inactive-status="unset"
      data-unit="px"
      data-values='{"sm":80,"md":109,"lg":140}'
    >
      <button class="option-chip" type="button" data-value="sm" data-status="unset" aria-label="Avatar pequeño">
        <svg class="option-chip__icon" viewBox="0 0 40 28" fill="none" aria-hidden="true">
          <path d="M11 5h-4v4M29 5h4v4M11 23h-4v-4M29 23h4v-4" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
          <circle cx="20" cy="14" r="2.7" stroke="currentColor" stroke-width="2.7"/>
        </svg>
        <span class="option-chip__label">pequeño</span>
      </button>

      <button class="option-chip" type="button" data-value="md" data-status="unset" aria-label="Avatar mediano">
        <svg class="option-chip__icon" viewBox="0 0 40 28" fill="none" aria-hidden="true">
          <path d="M10 4.5h-3.5v3.5M30 4.5h3.5v3.5M10 23.5h-3.5v-3.5M30 23.5h3.5v-3.5" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
          <circle cx="20" cy="14" r="5.2" stroke="currentColor" stroke-width="2.7"/>
        </svg>
        <span class="option-chip__label">mediano</span>
      </button>

      <button class="option-chip" type="button" data-value="lg" data-status="unset" aria-label="Avatar grande">
        <svg class="option-chip__icon" viewBox="0 0 40 28" fill="none" aria-hidden="true">
          <path d="M9 4h-3v3M31 4h3v3M9 24h-3v-3M31 24h3v-3" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
          <circle cx="20" cy="14" r="8.2" stroke="currentColor" stroke-width="2.7"/>
        </svg>
        <span class="option-chip__label">grande</span>
      </button>

      <button class="option-chip option-chip--tool" type="button" data-fine-toggle="ctrl-size" aria-label="Ajuste fino de tamaño" aria-expanded="false">
        <svg class="option-chip__icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M4 7h9M17 7h3M4 12h4M12 12h8M4 17h11M19 17h1" stroke="currentColor" stroke-width="2.1" stroke-linecap="round"/>
          <circle cx="15" cy="7" r="1.9" stroke="currentColor" stroke-width="2.1"/>
          <circle cx="10" cy="12" r="1.9" stroke="currentColor" stroke-width="2.1"/>
          <circle cx="17" cy="17" r="1.9" stroke="currentColor" stroke-width="2.1"/>
        </svg>
      </button>
    </div>

    <div class="fine-control" data-fine-panel="ctrl-size" hidden>
      <input
        type="range"
        class="fine-control__range"
        min="40"
        max="160"
        value=""
        data-control-view="ctrl-size"
        data-unit="px"
      />
    </div>
  </div>

  <div
    class="ctrl-group"
    data-control-sync="ctrl-radius"
    data-target="#avatarContainer"
    data-css-var="--avatar-radius"
    data-unit="px"
    data-value-attr="value"
    data-active-status="active"
    data-inactive-status="unset"
    data-values='{"0":0,"8":8,"16":16}'
  >
    <div class="ctrl-group__header">
      <span class="ctrl-group__label">
        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M4 20v-8a8 8 0 0 1 8-8h8" stroke="currentColor" stroke-width="2.3" stroke-linecap="round"/>
        </svg>
        Redondear
      </span>
      <span class="ctrl-group__value" id="ctrl-radius-val"></span>
    </div>

    <div
      class="option-chips"
      data-control-view="ctrl-radius"
      data-value-attr="value"
      data-active-status="active"
      data-inactive-status="unset"
      data-unit="px"
      data-values='{"0":0,"8":8,"16":16}'
    >
      <input type="radio" name="avatar_radius" id="rd-none" value="0" class="chip-radio" checked>
      <label class="option-chip" for="rd-none" data-value="0" data-status="unset">
        <svg class="option-chip__icon" width="32" height="28" viewBox="0 0 36 32" fill="none" aria-hidden="true">
          <rect x="8" y="7" width="20" height="18" rx="0" stroke="currentColor" stroke-width="1.6"></rect>
        </svg>
      </label>

      <input type="radio" name="avatar_radius" id="rd-md" value="8" class="chip-radio">
      <label class="option-chip" for="rd-md" data-value="8" data-status="unset">
        <svg class="option-chip__icon" width="32" height="28" viewBox="0 0 36 32" fill="none" aria-hidden="true">
          <rect x="8" y="7" width="20" height="18" rx="5" stroke="currentColor" stroke-width="1.6"></rect>
        </svg>
      </label>

      <input type="radio" name="avatar_radius" id="rd-full" value="16" class="chip-radio">
      <label class="option-chip" for="rd-full" data-value="16" data-status="unset">
        <svg class="option-chip__icon" width="32" height="28" viewBox="0 0 36 32" fill="none" aria-hidden="true">
          <rect x="8" y="7" width="20" height="18" rx="9" stroke="currentColor" stroke-width="1.6"></rect>
        </svg>
      </label>

      <button type="button" class="option-chip__sliders-btn" data-fine-toggle="ctrl-radius" aria-label="Personalizar redondez" aria-expanded="false">
        <svg width="18" height="18" viewBox="0 0 20 20" fill="none" aria-hidden="true">
          <path d="M3 5H17M6 10H14M9 15H11" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"></path>
        </svg>
      </button>
    </div>

    <div class="fine-control" data-fine-panel="ctrl-radius" hidden>
      <input
        type="range"
        class="fine-control__range"
        min="0"
        max="100"
        value=""
        data-control-view="ctrl-radius"
        data-unit="px"
      />
    </div>
  </div>

  <div
    class="ctrl-group"
    data-control-sync="ctrl-mock-border-scale"
    data-target="#avatarContainer"
    data-css-var="--mock-border-scale"
    data-value-attr="value"
    data-active-status="active"
    data-inactive-status="unset"
    data-values='{"0":1,"2":1.05,"4":1.14}'
  >
    <div class="ctrl-group__header">
      <span class="ctrl-group__label">
        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M4 7h16M4 12h16M4 17h16" stroke="currentColor" stroke-width="2.3" stroke-linecap="round"/>
        </svg>
        Borde
      </span>
      <span class="ctrl-group__value ctrl-group__value--scale" id="ctrl-mock-border-scale-val"></span>
    </div>

    <div
      class="option-chips"
      data-control-view="ctrl-mock-border-scale"
      data-value-attr="value"
      data-active-status="active"
      data-inactive-status="unset"
      data-values='{"0":1,"2":1.05,"4":1.14}'
    >
      <input type="radio" name="avatar_border" id="bd-none" value="0" class="chip-radio" checked>
      <label class="option-chip" for="bd-none" data-value="0" data-status="unset">
        <svg class="option-chip__icon" width="32" height="28" viewBox="0 0 36 32" fill="none" aria-hidden="true">
          <line x1="8" y1="24" x2="28" y2="8" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"></line>
          <circle cx="18" cy="16" r="9" stroke="currentColor" stroke-width="1.6" stroke-opacity="0.2"></circle>
        </svg>
      </label>

      <input type="radio" name="avatar_border" id="bd-sm" value="2" class="chip-radio">
      <label class="option-chip" for="bd-sm" data-value="2" data-status="unset">
        <svg class="option-chip__icon" width="32" height="28" viewBox="0 0 36 32" fill="none" aria-hidden="true">
          <circle cx="18" cy="16" r="9" stroke="currentColor" stroke-width="1.6"></circle>
          <text x="18" y="20" text-anchor="middle" font-size="7" fill="currentColor" font-family="sans-serif" font-weight="700">x1</text>
        </svg>
      </label>

      <input type="radio" name="avatar_border" id="bd-lg" value="4" class="chip-radio">
      <label class="option-chip" for="bd-lg" data-value="4" data-status="unset">
        <svg class="option-chip__icon" width="32" height="28" viewBox="0 0 36 32" fill="none" aria-hidden="true">
          <circle cx="18" cy="16" r="9" stroke="currentColor" stroke-width="3"></circle>
          <text x="18" y="20" text-anchor="middle" font-size="7" fill="currentColor" font-family="sans-serif" font-weight="700">x2</text>
        </svg>
      </label>

      <button type="button" class="option-chip__sliders-btn" data-fine-toggle="ctrl-mock-border-scale" aria-label="Personalizar borde" aria-expanded="false">
        <svg width="18" height="18" viewBox="0 0 20 20" fill="none" aria-hidden="true">
          <path d="M3 5H17M6 10H14M9 15H11" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"></path>
        </svg>
      </button>
    </div>

    <div class="fine-control" data-fine-panel="ctrl-mock-border-scale" hidden>
      <input
        type="range"
        class="fine-control__range"
        min="1"
        max="1.14"
        step="0.01"
        value=""
        data-control-view="ctrl-mock-border-scale"
      />
    </div>
  </div>
</section>
