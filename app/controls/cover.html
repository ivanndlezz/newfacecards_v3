<section class="ctrl-page ctrl-page--cover" data-control-page="cover">
  <div class="ctrl-group" data-cover-preset-picker>
    <div class="ctrl-group__header">
      <span class="ctrl-group__label">
        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <rect x="4" y="5" width="16" height="9" rx="2.5" stroke="currentColor" stroke-width="2"/>
          <circle cx="12" cy="17" r="3" stroke="currentColor" stroke-width="2"/>
        </svg>
        Posición de avatar
      </span>
    </div>

    <div class="option-chips option-chips--position">
      <button class="option-chip" type="button" data-cover-preset="preset-centered" data-status="unset" aria-label="Avatar centrado">
        <svg class="option-chip__icon" viewBox="0 0 46 30" fill="none" aria-hidden="true">
          <rect x="7" y="4" width="32" height="13" rx="4" fill="currentColor" fill-opacity=".08" stroke="currentColor" stroke-width="1.7"/>
          <circle cx="23" cy="21" r="4.5" fill="currentColor" fill-opacity=".14" stroke="currentColor" stroke-width="1.7"/>
        </svg>
        <span class="option-chip__label">Centrado</span>
      </button>

      <button class="option-chip" type="button" data-cover-preset="preset-horizontal" data-status="unset" aria-label="Avatar lateral">
        <svg class="option-chip__icon" viewBox="0 0 46 30" fill="none" aria-hidden="true">
          <rect x="7" y="4" width="32" height="12" rx="4" fill="currentColor" fill-opacity=".08" stroke="currentColor" stroke-width="1.7"/>
          <circle cx="14" cy="22" r="4.5" fill="currentColor" fill-opacity=".14" stroke="currentColor" stroke-width="1.7"/>
          <path d="M22 21h14M22 25h10" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" opacity=".55"/>
        </svg>
        <span class="option-chip__label">Lateral</span>
      </button>

      <button class="option-chip" type="button" data-cover-preset="preset-cover" data-status="unset" aria-label="Avatar sobre portada">
        <svg class="option-chip__icon" viewBox="0 0 46 30" fill="none" aria-hidden="true">
          <rect x="7" y="4" width="32" height="18" rx="4" fill="currentColor" fill-opacity=".08" stroke="currentColor" stroke-width="1.7"/>
          <circle cx="23" cy="21" r="4.5" fill="currentColor" fill-opacity=".14" stroke="currentColor" stroke-width="1.7"/>
        </svg>
        <span class="option-chip__label">Superior</span>
      </button>

      <button class="option-chip" type="button" data-cover-preset="free" data-status="unset" aria-label="Avatar libre">
        <svg class="option-chip__icon" viewBox="0 0 46 30" fill="none" aria-hidden="true">
          <rect x="7" y="4" width="32" height="18" rx="4" fill="currentColor" fill-opacity=".08" stroke="currentColor" stroke-width="1.7"/>
          <path d="M15 22h16M23 14v16" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          <circle cx="23" cy="22" r="4.5" fill="currentColor" fill-opacity=".14" stroke="currentColor" stroke-width="1.7"/>
        </svg>
        <span class="option-chip__label">Libre</span>
      </button>
    </div>
  </div>

  <div
    class="ctrl-group"
    data-control-sync="cover.style"
    data-target="#mainCard"
    data-state-path="coverStyle"
    data-value-attr="value"
    data-event="click"
    data-active-status="active"
    data-inactive-status="unset"
    data-values='{"full":"full","framed":"inset"}'
  >
    <div class="ctrl-group__header">
      <span class="ctrl-group__label">
        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <rect x="4" y="6" width="16" height="12" rx="3" stroke="currentColor" stroke-width="2.1"/>
          <path d="M4 11h16" stroke="currentColor" stroke-width="1.8" opacity=".45"/>
        </svg>
        Aspecto de portada
      </span>
    </div>

    <div
      class="option-chips option-chips--cover"
      data-control-view="cover.style"
      data-state-path="coverStyle"
      data-value-attr="value"
      data-active-status="active"
      data-inactive-status="unset"
      data-values='{"full":"full","framed":"inset"}'
    >
      <input type="radio" name="cover_style" id="cs-full" value="full" class="chip-radio" checked>
      <label class="option-chip" for="cs-full" data-value="full" data-status="unset">
        <svg class="option-chip__icon" width="40" height="28" viewBox="0 0 44 30" fill="none" aria-hidden="true">
          <rect x="3" y="3" width="38" height="24" rx="4" fill="currentColor" fill-opacity="0.1" stroke="currentColor" stroke-width="1.4"></rect>
          <path d="M3 12 Q11 6 19 11 Q27 16 41 9" stroke="currentColor" stroke-width="1.2" stroke-opacity="0.4" fill="none"></path>
          <circle cx="22" cy="18" r="5" fill="currentColor" fill-opacity="0.15" stroke="currentColor" stroke-width="1.4"></circle>
        </svg>
        <span class="option-chip__label">Completa</span>
      </label>

      <input type="radio" name="cover_style" id="cs-framed" value="framed" class="chip-radio">
      <label class="option-chip" for="cs-framed" data-value="framed" data-status="unset">
        <svg class="option-chip__icon" width="40" height="28" viewBox="0 0 44 30" fill="none" aria-hidden="true">
          <rect x="7" y="3" width="30" height="18" rx="4" fill="currentColor" fill-opacity="0.1" stroke="currentColor" stroke-width="1.4"></rect>
          <path d="M7 12 Q15 7 22 11 Q29 15 37 9" stroke="currentColor" stroke-width="1.2" stroke-opacity="0.4" fill="none"></path>
          <circle cx="22" cy="24" r="5" fill="currentColor" fill-opacity="0.15" stroke="currentColor" stroke-width="1.4"></circle>
        </svg>
        <span class="option-chip__label">Encuadrada</span>
      </label>
    </div>
  </div>
</section>
