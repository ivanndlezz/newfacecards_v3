        // ── Handlers ──────────────────────────────────────────────────────────────

        function _rsAnimateIn(el) {
          if (!el) return;
          el.classList.remove("animate-in");
          requestAnimationFrame(() => el.classList.add("animate-in"));
        }

        function _rsShowCards() {
          const dropdownView = document.getElementById(_RS_DROPDOWN_VIEW_ID);
          const cardsView = document.getElementById(_RS_CARDS_VIEW_ID);
          const dropdownBtn = document.getElementById(_RS_DROPDOWN_BTN_ID);

          if (!dropdownView || !cardsView) return;
          dropdownView.hidden = true;
          cardsView.hidden = false;
          dropdownBtn?.setAttribute("aria-expanded", "true");
          _rsAnimateIn(cardsView);

          // Hide controllers while browsing aspects
          document
            .getElementById("styleEditorTabs")
            ?.setAttribute("data-browsing", "true");
          document
            .getElementById("inlineEditorControls")
            ?.setAttribute("data-browsing", "true");
        }

        function _rsShowDropdown(value) {
          const cfg = _RS_STYLE_CONFIG[value] || _RS_STYLE_CONFIG.classic;
          const dropdownView = document.getElementById(_RS_DROPDOWN_VIEW_ID);
          const cardsView = document.getElementById(_RS_CARDS_VIEW_ID);
          const dropdownBtn = document.getElementById(_RS_DROPDOWN_BTN_ID);
          const miniPreview = document.getElementById(_RS_MINI_PREVIEW_ID);
          const dropdownLabel = document.getElementById(_RS_DROPDOWN_LABEL_ID);

          if (miniPreview) {
            miniPreview.className = `mini-preview ${cfg.cls}`;
            miniPreview.innerHTML = cfg.html;
          }
          if (dropdownLabel) dropdownLabel.textContent = cfg.label;
          if (cardsView) cardsView.hidden = true;
          if (dropdownView) {
            dropdownView.hidden = false;
            _rsAnimateIn(dropdownView);
          }
          dropdownBtn?.setAttribute("aria-expanded", "false");

          // Restore controllers after an aspect was chosen
          document
            .getElementById("styleEditorTabs")
            ?.removeAttribute("data-browsing");
          document
            .getElementById("inlineEditorControls")
            ?.removeAttribute("data-browsing");
        }

        window.syncStyleDropdown = _rsShowDropdown;

        function _rsOnRadioChange(e) {
          const preset = STYLE_PRESET_MAP[e.target.value] ?? PRESET_DEFAULT;
          window.setPreset?.(preset);
          _rsShowDropdown(e.target.value);
        }

        function _rsOnStyleCardClick(e) {
          const card = e.target.closest(".image-style-card");
          if (!card) return;
          const radioId = card.getAttribute("for");
          const radio = radioId ? document.getElementById(radioId) : null;
          if (radio?.checked) _rsShowDropdown(radio.value);
        }

        function _rsOnHeroFitChange(e) {
          window.syncEngine?.store.set("hero-fit", e.target.value);
        }

        // ── Public API ────────────────────────────────────────────────────────────

        function mountRadioStyleHandler() {
          document
            .querySelectorAll(`input[name="${_RS_RADIO_NAME}"]`)
            .forEach((radio) =>
              radio.addEventListener("change", _rsOnRadioChange),
            );

          document
            .getElementById(_RS_DROPDOWN_BTN_ID)
            ?.addEventListener("click", _rsShowCards);

          document
            .getElementById(_RS_CARDS_VIEW_ID)
            ?.addEventListener("click", _rsOnStyleCardClick);

          document
            .getElementById(_RS_HERO_FIT_SEL_ID)
            ?.addEventListener("change", _rsOnHeroFitChange);

          const checkedStyle = document.querySelector(
            `input[name="${_RS_RADIO_NAME}"]:checked`,
          );
          _rsShowDropdown(checkedStyle?.value || "classic");
        }

        // ── Dynamic template rendering helper ─────────────────────────────────────
        function getControlAssetBase(route) {
          if (route.endsWith("/index.html")) {
            return route.replace(/\/index\.html$/, "");
          }
          return route.replace(/\.html$/, "");
        }

        async function renderOnSheet(routes) {
          const container = document.getElementById("dynamicControlsContainer");
          if (!container) return;

          // Unregister existing controls from the syncEngine to prevent memory leaks and collision
          if (window.syncEngine) {
            container.querySelectorAll("[data-control-sync]").forEach((el) => {
              const id = el.dataset.controlSync;
              if (id) window.syncEngine.controls.delete(id);
            });
          }

          // Fetch and combine all specified template HTML files
          let combinedHtml = "";
          for (const route of routes) {
            const baseRoute = getControlAssetBase(route);
            const cssRoute = `${baseRoute}/controls.css`;
            const cssId = `control-css:${cssRoute}`;
            if (!document.querySelector(`link[data-control-css="${cssId}"]`)) {
              const link = document.createElement("link");
              link.rel = "stylesheet";
              link.href = cssRoute;
              link.dataset.controlCss = cssId;
              document.head.appendChild(link);
            }

            const resp = await fetch(route);
            if (resp.ok) {
              combinedHtml += await resp.text();
            }
          }
          container.innerHTML = combinedHtml;

          // Scan and register the new inputs dynamically with SyncEngine
          if (window.syncEngine) {
            const { ControlFactory } =
              await import("../assets/js/core/controls/ControlFactory.js");
            container
              .querySelectorAll("[data-control-sync]")
              .forEach((rootEl) => {
                const ctrl = ControlFactory.create(rootEl, window.syncEngine);
                if (ctrl) window.syncEngine.register(ctrl);
              });
          }

          for (const route of routes) {
            const jsRoute = `${getControlAssetBase(route)}/controls.js`;
            try {
              const mod = await import(`${jsRoute}?v=${Date.now()}`);
              mod.init?.(container, {
                storage: window.appBipartiteStorage,
                syncEngine: window.syncEngine,
                renderOnSheet,
              });
            } catch (err) {
              console.warn(
                "[controls] controls.js no disponible:",
                jsRoute,
                err,
              );
            }
          }
        }
        window.renderOnSheet = renderOnSheet;

        // ═══════════════════════════════════════════════════════════════════════════
        // EDIT ELEMENT HANDLER  (modules/EditElementHandler.js)
        // SRP: delegated click handler for .edit-element overlays.
        //
        // Scope routing is purely data-driven via SCOPE_TEMPLATE_MAP.
        // ═══════════════════════════════════════════════════════════════════════════

        const _EE_EDIT_ELEM_SELECTOR = ".edit-element";
        const _EE_DATA_SCOPE_ATTR = "data-scope";

        async function _eeHandleClick(e) {
          console.log("[_eeHandleClick] Click target:", e.target);
          const editBtn = e.target.closest(_EE_EDIT_ELEM_SELECTOR);
          console.log("[_eeHandleClick] Closest edit-element:", editBtn);
          if (!editBtn) return;

          e.preventDefault();
          e.stopPropagation();

          const scope = editBtn.getAttribute(_EE_DATA_SCOPE_ATTR);
          console.log("[_eeHandleClick] Scope:", scope);
          const routeInfo = SCOPE_TEMPLATE_MAP[scope];
          console.log("[_eeHandleClick] RouteInfo:", routeInfo);
          if (!routeInfo) return;

          // 1. Render template dynamically
          await renderOnSheet(routeInfo.templates);

          // 2. Update custom settings title
          const titleEl = document.getElementById("custom-settings-title");
          if (titleEl) titleEl.textContent = routeInfo.title;

          // 3. Open on the parent Profile settings panel (MAIN_SETTINGS)
          const { UI_ELEMS, UI_STATUS } =
            await import("../assets/js/core/config/uiConfig.js");
          const setPanel = (id, status) => {
            const el = document.getElementById(id);
            if (el) el.dataset.status = status;
          };
          setPanel(UI_ELEMS.MAIN_SETTINGS, UI_STATUS.ACTIVE);
          setPanel(UI_ELEMS.CUSTOM_SETTINGS, UI_STATUS.HIDDEN);

          const headerLeft = document.getElementById(
            UI_ELEMS.SHEET_HEADER_LEFT,
          );
          if (headerLeft) headerLeft.dataset.status = UI_STATUS.READY;

          // 4. Open bottom sheet
          window.appBottomSheet?.open();
        }

        function mountEditElementHandler() {
          document.addEventListener("click", _eeHandleClick);
          return () => document.removeEventListener("click", _eeHandleClick);
        }

        // ═══════════════════════════════════════════════════════════════════════════
        // SHEET NAVIGATOR  (modules/SheetNavigator.js)
        // SRP: sheet panel transitions — main settings ↔ custom settings.
        //
        // NOTE: uiConfig is a project-wide external module — imported at runtime.
        // ═══════════════════════════════════════════════════════════════════════════

        async function mountSheetNavigator() {
          const { UI_ELEMS, UI_STATUS, SELECTORS, UI_DEFAULTS } =
            await import("../assets/js/core/config/uiConfig.js");

          // ── Private helpers ────────────────────────────────────────────────────

          function setPanel(panelId, status) {
            const el = document.getElementById(panelId);
            if (el) el.dataset.status = status;
          }

          function setHeaderStatus(status) {
            const el = document.getElementById(UI_ELEMS.SHEET_HEADER_LEFT);
            if (el) el.dataset.status = status;
          }

          function resolveRadioValue() {
            return (
              document.querySelector(SELECTORS.IMAGE_STYLE_CHECKED)?.value ??
              UI_DEFAULTS.IMAGE_STYLE
            );
          }

          // ── Handlers ──────────────────────────────────────────────────────────

          function onPersonalizar() {
            window.updateCustomPanelControls?.(resolveRadioValue());

            setPanel(UI_ELEMS.MAIN_SETTINGS, UI_STATUS.HIDDEN);
            setPanel(UI_ELEMS.CUSTOM_SETTINGS, UI_STATUS.ACTIVE);
            setHeaderStatus(UI_STATUS.CUSTOM);
          }

          function onBreadcrumbBack() {
            setPanel(UI_ELEMS.CUSTOM_SETTINGS, UI_STATUS.HIDDEN);
            setPanel(UI_ELEMS.MAIN_SETTINGS, UI_STATUS.ACTIVE);
            setHeaderStatus(UI_STATUS.READY);
          }

          // ── Register listeners ─────────────────────────────────────────────────

          document
            .getElementById(UI_ELEMS.BTN_PERSONALIZAR)
            ?.addEventListener("click", onPersonalizar);

          document
            .querySelector(SELECTORS.BREADCRUMB_BACK)
            ?.addEventListener("click", onBreadcrumbBack);
        }

        // ═══════════════════════════════════════════════════════════════════════════
        // ORCHESTRATOR  (index.js)
        // Mounts all modules in dependency order.
        //
        // Contains zero logic of its own. If you find yourself adding
        // conditionals here, extract a new module instead.
        // ═══════════════════════════════════════════════════════════════════════════

        const _PILL_ELEM_ID = "mi-pildora";

        // 1. BottomSheet must be ready before anything that calls constructBottomSheet
        await loadBottomSheet();

        // 2. Pill state machine (edit / done / satellite)
        const pillEl = document.getElementById(_PILL_ELEM_ID);
        if (pillEl) new PillController(pillEl).mount();

        // 3. Dev credential check — runs synchronously after sheet is available
        ensureDevCredentials();

        // 4. SyncEngine bridge — polls until engine is ready; intentionally non-blocking
        mountSyncBridge().catch(console.error);

        // 5. Radio style → preset + hero-fit select
        mountRadioStyleHandler();

        // 6. Sheet panel navigation (Personalizar ↔ breadcrumb back)
        mountSheetNavigator();

        // 7. Delegated .edit-element click handler with scope-map routing
        mountEditElementHandler();
      })();
    </script>
    <script type="module">
      import { UI_DEFAULTS } from "../assets/js/core/config/uiConfig.js";
      import { StyleSelector } from "./controls/StyleSelector.js";

      const PRESET_REGISTRY = window.PresetRegistry;
      const PRESET_DEFAULT_CLASS = PRESET_REGISTRY.defaultClassName;

      // ==========================================
      // klef-profile-controller.js
      // Arquitectura declarativa — Klef Agency
      // ==========================================

      /*
       * ==========================================================================
       * REGLAS DE ARQUITECTURA UI
       *
       * Patrones:
       * - JS expresa estado con atributos data-*.
       * - CSS decide como se ve cada estado.
       * - Las variables CSS son validas para valores vivos de controles
       *   como --avatar-size o --avatar-radius.
       * - El display base de un componente pertenece al CSS.
       *
       * Antipatrones:
       * - No usar estilos inline hardcoded para comportamiento.
       * - No colocar ningún valor inline en el atributo style="" del HTML (hardcodear aspecto) a menos que sean variables de paso/almacenamiento de datos de runtime (ej. style="--avt-size: var(--avatar-size)"). Todos los aspectos deben ser definidos desde data-aspect o desde variables.
       * - No usar el.style.display = "block" para mostrar componentes.
       *   Si el componente es flex/grid, eso rompe su layout interno.
       * - No esconder/mostrar paneles con style="" cuando puede usarse
       *   data-status="hidden|active|ready".
       * - No mezclar estado en class="" si ya existe un atributo data-*.
       *
       * Ejemplo:
       * Correcto: panel.dataset.status = "active"
       * Incorrecto: panel.style.display = "block"
       * ==========================================================================
       */

      // ==========================================
      // 1. DECLARATIVE CONTROLS REFACTOR
      //    All control parameters (sizes, boundaries, strategies)
      //    are defined directly on the HTML elements in the DOM.
      //    The SyncEngine automatically discovers and binds them on boot.
      // ==========================================

      // ==========================================
      // 3. CONDITIONAL PANEL MANAGER
      //    Decides visibility of control groups statically on load.
      // ==========================================
      const ConditionalPanelManager = {
        init() {
          const controller = document.getElementById("main-sheet");
          const card = document.getElementById("mainCard");
          if (!controller || !card) return;

          const isMasterActive = !!document.querySelector(
            '[data-master-bind="true"]',
          );
          if (!isMasterActive) {
            controller.dataset.status = "hidden";
            return;
          }
          controller.dataset.status = "ready";

          const hasCover = !!document.querySelector(
            '[data-bind="user.umCoverUrl"]',
          );

          if (!hasCover) {
            card.classList.remove("cover-style-full", "cover-style-inset");
            card.classList.add("cover-style-none");
          }
        },
      };

      // ==========================================
      // 4. LÓGICA DE UI E INTERACCIÓN
      // ==========================================
      function handleControllerClick() {
        if (window.appBottomSheet) window.appBottomSheet.open();
      }

      function toggleController(event) {
        if (event) event.stopPropagation();
        if (window.appBottomSheet) window.appBottomSheet.close();
      }

      function getPresetConfig(presetName) {
        if (presetName === PRESET_REGISTRY.free.className) {
          return PRESET_REGISTRY.free;
        }
        return (
          PRESET_REGISTRY.getByClassName(presetName) ||
          PRESET_REGISTRY.getByClassName(PRESET_DEFAULT_CLASS)
        );
      }

      function syncPresetGliderConfig() {
        PRESET_REGISTRY.hydrateGlider();
      }

      function setPositionControlsEnabled(isEnabled) {
        const posGlider = document.getElementById("posGlider");
        if (!posGlider) return;
        posGlider.style.opacity = isEnabled ? "1" : "0.5";
        posGlider.style.pointerEvents = isEnabled ? "auto" : "none";
      }

      function syncRadioSelector(presetName, requestedTab = null) {
        const preset = getPresetConfig(presetName);
        const radioVal = preset?.imageStyle || UI_DEFAULTS.IMAGE_STYLE;
        const radio = document.querySelector(
          `input[name="image_style"][value="${radioVal}"]`,
        );
        if (radio) {
          radio.checked = true;
        }
        if (window.styleSelector) {
          window.styleSelector.updateAspect(radioVal, {
            tab: requestedTab || undefined,
            emit: false,
          });
          return;
        }
        window.syncStyleDropdown?.(radioVal);
        window.updateCustomPanelControls?.(radioVal, requestedTab);
      }

      function updateCustomSettingsTitle(styleName) {
        const titleEl = document.getElementById("custom-settings-title");
        if (!titleEl) return;

          PRESET_REGISTRY.getStyleConfig(styleName)?.title ||
          PRESET_REGISTRY.getStyleConfig(UI_DEFAULTS.IMAGE_STYLE).title;
      }

      const STYLE_EDITOR_FLOW = Object.freeze({

        "with-cover": {
          defaultTab: "avatar",
          tabs: [
            { id: "avatar", label: "Avatar", icon: "user" },
            { id: "cover", label: "Portada", icon: "photo" },
          ],
          routes: {
            avatar: ["controls/avatar.html"],
            cover: ["controls/cover.html"],
          },
        },
        hero: {
          defaultTab: "hero",
          tabs: [{ id: "hero", label: "Hero", icon: "sparkles" }],
          routes: { hero: ["controls/hero.html"] },

      });

      const STYLE_EDITOR_ICONS = Object.freeze({

        photo: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="m2.25 15.75 5.159-5.159a2.25 2.25 0 0 1 3.182 0l5.159 5.159m-1.5-1.5 1.409-1.409a2.25 2.25 0 0 1 3.182 0l2.909 2.909m-18 3.75h16.5a1.5 1.5 0 0 0 1.5-1.5V6a1.5 1.5 0 0 0-1.5-1.5H3.75A1.5 1.5 0 0 0 2.25 6v12a1.5 1.5 0 0 0 1.5 1.5Zm10.5-11.25h.008v.008h-.008V8.25Z"/></svg>`,
        sparkles: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904 9 18.75l-.813-2.846a4.5 4.5 0 0 0-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 0 0 3.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 0 0 3.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 0 0-3.09 3.09Zm8.446-7.189L18 9.75l-.259-1.035a3.375 3.375 0 0 0-2.456-2.456L14.25 6l1.035-.259a3.375 3.375 0 0 0 2.456-2.456L18 2.25l.259 1.035a3.375 3.375 0 0 0 2.456 2.456L21.75 6l-1.035.259a3.375 3.375 0 0 0-2.456 2.456Z"/></svg>`,
      });

      function getEditorFlow(activeStyle) {
        return STYLE_EDITOR_FLOW[activeStyle] || STYLE_EDITOR_FLOW.classic;
      }

      function renderEditorTabs(flow, activeTab, activeStyle) {
        const tabsEl = document.getElementById("styleEditorTabs");
        if (!tabsEl) return;
        tabsEl.innerHTML = flow.tabs
          .map(
            (tab) => `
              <button
                class="editor-pill-tab"
                type="button"
                data-editor-style="${activeStyle}"
                data-editor-tab="${tab.id}"
                data-status="${tab.id === activeTab ? "active" : "unset"}"
              >
                ${STYLE_EDITOR_ICONS[tab.icon] || ""}
                <span>${tab.label}</span>
              </button>
            `,
          )
          .join("");
      }

      function mountEditorTabs() {
        const tabsEl = document.getElementById("styleEditorTabs");
        if (!tabsEl || tabsEl.dataset.bound === "true") return;
        tabsEl.dataset.bound = "true";
        tabsEl.addEventListener("click", (event) => {
          const tab = event.target.closest("[data-editor-tab]");
          if (!tab || !tabsEl.contains(tab)) return;
          window.updateCustomPanelControls?.(
            tab.dataset.editorStyle,
            tab.dataset.editorTab,
          );
        });
      }

      async function updateCustomPanelControls(
        activeStyle,
        requestedTab = null,
      ) {
        if (window.styleSelector) {
          window.styleSelector.updateAspect(activeStyle, {
            tab: requestedTab || undefined,
            emit: false,
          });
          return;
        }

        const flow = getEditorFlow(activeStyle);
        const activeTab = requestedTab || flow.defaultTab;
        const routes = flow.routes[activeTab] || [];
        updateCustomSettingsTitle(activeStyle);
        renderEditorTabs(flow, activeTab, activeStyle);

        const presetRow = document.getElementById("customPresetRow");
        const posRow = document.getElementById("customPosRow");

        if (presetRow) presetRow.dataset.status = "hidden";
        if (posRow) posRow.dataset.status = "hidden";

        if (typeof window.renderOnSheet === "function") {
          await window.renderOnSheet(routes);
        }
      }

      function setPreset(presetName, options = {}) {
        const card = document.getElementById("mainCard");
        const content = document.getElementById("profileContent");
        if (!card || !content) return;

        const preset = getPresetConfig(presetName);

        // NOTA: La clase .active en .glider-option la maneja data-control-sync
        // No modificar clases manualmente aquí.
        content.style.setProperty("--profile-flex-direction", "");
        content.style.setProperty("--profile-text-align", "");
        content.style.setProperty("--profile-align-items", "");
        card.classList.remove(...PRESET_REGISTRY.classNames);

        if (preset.className !== PRESET_REGISTRY.free.className) {
          card.classList.add(preset.className);
          setPositionControlsEnabled(!preset.lockPositionControls);
        } else {
          setPositionControlsEnabled(true);
          setPos("left");
        }

        if (!options.fromStyleSelector) {
          syncRadioSelector(preset.className, options.editorTab || null);
        }

        if (window.appBipartiteStorage) {
          window.appBipartiteStorage.updatePreset(preset.className);
        }
      }

        // la maneja data-control-sync. Aquí solo aplicamos el posicionamiento.
        const freeOption = document.querySelector(
          '#presetGlider .glider-option[data-val="free"]',
        );
        if (!freeOption || !freeOption.classList.contains("active")) return;

        // NOTA: La clase .active en .glider-option la maneja data-control-sync
        // No modificar clases manualmente aquí.
        const content = document.getElementById("profileContent");
        if (!content) return;

          "--profile-flex-direction",
          direction === "left"
            ? "row"
            : direction === "right"
              ? "row-reverse"
              : "column",

        content.style.setProperty(
          "--profile-text-align",
          direction === "top" ? "center" : "left",
        );
        content.style.setProperty("--profile-align-items", "center");

        if (window.appBipartiteStorage) {
          window.appBipartiteStorage.updatePosition(direction);
        }
      }

      function setCoverStyle(styleName) {
        const card = document.getElementById("mainCard");
        if (!card) return;

        document
          .querySelectorAll("#coverGlider .glider-option")
          .forEach((el) => el.classList.remove("active"));
        const activeOption = document.querySelector(
          `#coverGlider .glider-option[data-val="${styleName}"]`,

        card.classList.remove(
          "cover-style-none",
          "cover-style-full",
          "cover-style-inset",

        card.classList.add(`cover-style-${styleName}`);

        const insetControls = document.getElementById("insetControlsContainer");
        const coverWrap = document.getElementById("coverWrap");
        if (coverWrap) {
          coverWrap.style.removeProperty("--cover-width");
          coverWrap.style.removeProperty("--cover-height");
          coverWrap.style.removeProperty("--cover-radius");
          coverWrap.style.removeProperty("--cover-shadow");
          coverWrap.style.removeProperty("margin");
        }

        if (insetControls) {
          if (styleName === "inset") {
            insetControls.dataset.status = "active";
          } else {
            insetControls.dataset.status = "hidden";

        if (window.appBipartiteStorage) {
          window.appBipartiteStorage.updateCoverStyle(styleName);

      function writeStyleSelectorControl(
        controlId,
        targetSelector,
        cssVar,
        value,
        unit = "",
      ) {
        window.syncEngine?.store.set(`controls.${controlId}`, value);
        const target = document.querySelector(targetSelector);
        if (target) target.style.setProperty(cssVar, `${value}${unit}`);

        const storage = window.appBipartiteStorage;
        if (storage && !storage.isApplyingState) {
          storage.state.controls[controlId] = value;
          storage.saveLocal?.();

      function getStyleSelectorInitialState() {

        const size = Number(controls["ctrl-size"]);
        const radius = controls["ctrl-radius"];
        const border = Number(controls["ctrl-mock-border-scale"]);
        const coverStyle =
          storageState?.coverStyle === "inset"
            ? "framed"
            : storageState?.coverStyle;

        return {
          aspect:
            preset?.imageStyle ||
            document.querySelector('input[name="image_style"]:checked')
              ?.value ||
            UI_DEFAULTS.IMAGE_STYLE,
          tab: preset?.imageStyle === "hero" ? "hero" : "avatar",
          avatarSize:
            size === 80
              ? "sm"
              : size === 140
                ? "lg"
                : size
                  ? String(size)
                  : "md",
          avatarRadius:
            radius !== undefined && radius !== "" ? String(radius) : "8",
          avatarBorder:
            border === 1.05
              ? "2"
              : border === 1.14
                ? "4"
                : border
                  ? String(border)
                  : "0",
          coverPreset:
            storageState?.preset || preset?.className || "preset-cover",
          coverStyle: coverStyle || "full",
        };
      }

      function handleStyleSelectorChange(state, change) {
        window.dispatchEvent(
          new CustomEvent("style-selector:state-change", {
            detail: { state, change },
          }),
        );

        if (change.type === "aspect") {
          const presetName =
            PRESET_REGISTRY.stylePresetMap[state.aspect] ||
            PRESET_DEFAULT_CLASS;
          setPreset(presetName, {
            fromStyleSelector: true,
            editorTab: state.tab,
          });
          return;
        }

        if (change.type !== "control") return;

        if (change.control === "coverPreset") {
          setPreset(change.value, {
            fromStyleSelector: true,
            editorTab: "cover",
          });
          return;
        }

        if (change.control === "coverStyle") {
          setCoverStyle(change.value === "framed" ? "inset" : change.value);
          return;
        }

        if (change.control === "avatarSize") {
          const sizes = { sm: 80, md: 109, lg: 140 };
          const value = sizes[change.value] || Number(change.value);
          writeStyleSelectorControl(
            "ctrl-size",
            "#avatarContainer",
            "--avatar-size",
            value,
            "px",
          );
          return;
        }

        if (change.control === "avatarRadius") {
          writeStyleSelectorControl(
            "ctrl-radius",
            "#avatarContainer",
            "--avatar-radius",
            Number(change.value),
            "px",
          );
          return;
        }

        if (change.control === "avatarBorder") {
          const scale =
            { 0: 1, 2: 1.05, 4: 1.14 }[change.value] || Number(change.value);
          writeStyleSelectorControl(
            "ctrl-mock-border-scale",
            "#avatarContainer",
            "--mock-border-scale",
            scale,
          );
        }
      }

      function mountStyleSelectorComponent() {
        const host = document.getElementById("styleSelectorHost");
        if (!host) return null;
        const selector = new StyleSelector("#styleSelectorHost", {
          ...getStyleSelectorInitialState(),
          onStateChange: handleStyleSelectorChange,
        });
        selector.render();
        window.styleSelector = selector;
        return selector;

      const BindingStrategies = {
        text: (el, value) => {
          el.textContent = value;
        },
        innerhtml: (el, value) => {
          el.innerHTML = value;
        },
        src: (el, value) => {
          if (value) el.setAttribute("src", value);
        },
        href: (el, value) => {
          if (value) el.setAttribute("href", value);
        },
        alt: (el, value) => {
          if (value) el.setAttribute("alt", value);
        },
        title: (el, value) => {
          if (value) el.setAttribute("title", value);
        },
        value: (el, value) => {
          if (value) el.setAttribute("value", value);
        },
        class: (el, value) => {
          if (value) el.classList.add(value);
        },
        "css-var": (el, value, config) => {
          if (config.cssVar && value)
            el.style.setProperty(config.cssVar, value);
        },
        "bg-image": (el, value) => {
          if (value) el.style.backgroundImage = `url('${value}')`;
        },
      };

      const DataUtils = {
        getNestedValue(obj, path) {
          if (!path || !obj) return undefined;
          return path.split(".").reduce((acc, part) => acc && acc[part], obj);
        },
        formatValue(value, format) {
          if (!format || value === null || value === undefined || value === "")
            return value;
          return format.replace("{value}", value);
        },
      };

      class HydrationEngine {
        constructor(strategies) {
          this.strategies = strategies;
        }

        hydrate(rootElement, data) {
          rootElement.querySelectorAll("[data-bind]").forEach((el) => {
            const config = this._extractConfig(el);
            let rawValue = DataUtils.getNestedValue(data, config.path);
            if (rawValue === null || rawValue === undefined) rawValue = "";
            const finalValue = DataUtils.formatValue(rawValue, config.format);
            const strategy = this.strategies[config.bindType];
            if (strategy) strategy(el, finalValue, config);
            this._cleanupSkeleton(el);
          });
        }

        _extractConfig(el) {
          return {
            path: el.getAttribute("data-bind"),
            bindType: (
              el.getAttribute("data-bind-type") || "text"
            ).toLowerCase(),
            cssVar: el.getAttribute("data-bind-var"),
            format: el.getAttribute("data-bind-format"),
          };
        }

        _cleanupSkeleton(el) {
          el.classList.remove("skeleton-target");
          // Solo limpia el width si fue puesto por el skeleton placeholder,
          // no inyecta --wh en elementos que no son el avatar.
          if (!el.dataset.bindType || el.dataset.bindType !== "src") {
            el.style.width = "";
          }
        }
      }

      class BipartiteStorage {
        constructor(options = {}) {
          this.storageKey = options.storageKey || "nfc_app_corpus";
          this.userId =
            localStorage.getItem("devUserId") ||
            localStorage.getItem("user id") ||
            options.userId ||
            1;
          this.apiUrl =
            options.apiUrl ||
            "https://my.newfacecards.com/nfc/gateway-profile.php";
          this.apiKey =
            localStorage.getItem("devApiKey") ||
            localStorage.getItem("apiToken") ||
            options.apiKey ||
            "";
          this.debounceMs = options.debounceMs || 1500;
          this.statusStorageEl = document.getElementById("data-status-storage");

          this.debounceTimer = null;
          this.abortController = null;
          this.lastSyncedHash = null;
          this.isApplyingState = false;
          this.syncState = "synced";

          // Local memory state
          this.state = {
            preset: "preset-horizontal",
            position: "top",
            coverStyle: "full",
            cover: "",
            avatar: "",
            name: "",
            lastname: "",
            controls: {
              "ctrl-size": "",
              "ctrl-padding": 0,
              "ctrl-mock-border-scale": "",
              "ctrl-cover-width": 100,
              "ctrl-cover-height": "150",
              "ctrl-cover-radius": 12,
              "ctrl-cover-fit": "cover",
              "ctrl-cover-shadow": false,
              "ctrl-radius": "",
              preset: {
                layout: "preset-centered",
              },
              "hero-blur": 12,
              "hero-fit": "cover",
              "hero-height": 50,
            },
          };

          // Bind offline/online recovery
          window.addEventListener("online", () =>
            this.handleNetworkChange(true),
          );
          window.addEventListener("offline", () =>
            this.handleNetworkChange(false),
          );

          // Initial network state check
          this.handleNetworkChange(navigator.onLine);

          // Add click listener to sync status badge
          const badgeEl = document.getElementById("syncStatusBadge");
          if (badgeEl) {
            badgeEl.addEventListener("click", () =>
              this.showSyncDetailsSheet(),
            );

          this.setSyncState(this.syncState);

        handleNetworkChange(isOnline) {
          if (this.statusStorageEl) {
            this.statusStorageEl.setAttribute(
              "data-status",
              isOnline ? "online" : "offline",
            );
            if (!isOnline) {
              this.setSyncState("offline", "Sin conexión");
            } else {
              this.setSyncState("synced", "Sincronizado");
              this.syncPending();
            }
          }
        }

        setSyncState(status, text) {
          const statusConfig = SYNC_STATUS[status] || SYNC_STATUS.error;
          this.syncState = status;
          if (this.statusStorageEl) {
            this.statusStorageEl.setAttribute("data-sync-status", status);
          }
          const badgeEl = document.getElementById("syncStatusBadge");
          const badgeIcon = badgeEl?.querySelector(".sync-status-icon");
          const label = text || statusConfig.label;

          if (badgeEl) {
            badgeEl.style.setProperty(
              "--sync-status-bg",
              statusConfig.background,

            badgeEl.style.setProperty(
              "--sync-status-color",

            );
            badgeEl.style.setProperty("--sync-status-ring", statusConfig.ring);
            badgeEl.setAttribute("aria-label", label);
            badgeEl.setAttribute("title", label);
          }

          if (badgeIcon) {
            badgeIcon.className = `sync-status-icon ti ${statusConfig.icon}`;

        applyCorpusToProfile() {
          const nameEl = document.getElementById("profileName");
          const taglineEl = document.getElementById("profileRole");
          const avatarEl = document.getElementById("profileImg");
          const coverEl = document.getElementById("profileCover");

          if (nameEl && this.state.name) nameEl.textContent = this.state.name;
          if (taglineEl && this.state.lastname)
            taglineEl.textContent = this.state.lastname;
          if (avatarEl && this.state.avatar) avatarEl.src = this.state.avatar;
          if (coverEl && this.state.cover) coverEl.src = this.state.cover;

          // Sync state controls with DOM elements (backward-compatible / startup application of controls)
          if (this.state && this.state.controls) {
            const staticControlsMap = [
              {
                id: "ctrl-size",
                target: "#avatarContainer",
                cssVar: "--avatar-size",
                unit: "px",
              },
              {
                id: "ctrl-radius",
                target: "#avatarContainer",
                cssVar: "--avatar-radius",
                unit: "px",
              },
              {
                id: "ctrl-mock-border-scale",
                target: "#avatarContainer",
                cssVar: "--mock-border-scale",
                unit: "",
              },
              {
                id: "hero-blur",
                target: "#profileContent",
                cssVar: "--hero-blur",
                unit: "px",
              },
              {
                id: "hero-fit",
                target: "#profileCover",
                cssVar: "--hero-fit",
                unit: "",
              },
              {
                id: "hero-height",
                target: "#mainCard",
                cssVar: "--hero-height",
                unit: "%",
              },
            ];

            staticControlsMap.forEach(
              ({ id, target, cssVar, unit, booleanMap }) => {
                const value = this.state.controls[id];
                const el = document.querySelector(target);
                if (!el) return;

                const hasValue =
                  value !== undefined && value !== "" && value !== null;
                if (hasValue) {
                  let finalValue = value;
                  if (typeof value === "boolean" && booleanMap) {
                    finalValue = value ? booleanMap.true : booleanMap.false;
                  }
                  const finalUnit =
                    finalValue === "none" || finalValue === "" ? "" : unit;
                  el.style.setProperty(cssVar, `${finalValue}${finalUnit}`);
                } else {
                  el.style.removeProperty(cssVar);
                }
              },
            );
          }
        }

        mergeCorpusState(next, options = {}) {
          const includeIdentity = options.includeIdentity === true;
          const merged = {
            preset: next.preset,
            position: next.position,
            coverStyle: next.coverStyle,
            controls: next.controls,
          };

          if (includeIdentity) {
            ["name", "lastname", "avatar", "cover"].forEach((key) => {
              if (next[key]) merged[key] = next[key];
            });
          }

          this.state = {
            ...this.state,
            ...merged,
            controls: {
              ...this.state.controls,
              ...(next.controls || {}),
              preset: {
                ...this.state.controls.preset,
                ...(next.controls?.preset || {}),
              },
            },
          };
        }

        ingestServerUser(user = {}) {
          const avatarUrl = user.avatar?.url || user.avatar || "";
          const coverUrl = user.umCoverUrl || user.cover || "";
          this.state.name =
            user.name ||
            user.firstName ||
            user.first_name ||
            user.displayName ||
            user.display_name ||
            this.state.name;
          this.state.lastname =
            user.lastname ||
            user.lastName ||
            user.last_name ||
            user.role ||
            this.state.lastname;
          this.state.avatar = avatarUrl || this.state.avatar;
          this.state.cover = coverUrl || this.state.cover;
        }

        // Apply loaded state back to UI controls and DOM elements
        applyStateToUI() {
          this.isApplyingState = true;
          console.log("Aplicando estado cargado a la interfaz:", this.state);

          try {
            // 1. Preset
            if (this.state.preset) {
              setPreset(this.state.preset);
            }

            // 2. Position (only applies if free)
            if (this.state.position) {
              setPos(this.state.position);
            }

            // 3. Cover style
            if (this.state.coverStyle) {
              setCoverStyle(this.state.coverStyle);
            }

            // 4. Corpus fields
            this.applyCorpusToProfile();

            // 5. Sync controls via registry
            if (window.ControlSyncRegistry) {
              window.ControlSyncRegistry.applyAll(this.state);
            }
          } catch (e) {
            console.error("Error applying state to UI:", e);
          } finally {
            this.isApplyingState = false;
          }
        }

        // Load state from local storage or cloud
        loadState(cloudDescription = null) {
          let localState = null;
          try {
            const stored = localStorage.getItem(this.storageKey);
            if (stored) {
              localState = JSON.parse(stored);
            }
          } catch (e) {
            console.error("Error reading local aspect state:", e);
          }

          let cloudState = null;
          if (cloudDescription) {
            try {
              cloudState = JSON.parse(cloudDescription);
            } catch (e) {
              console.warn(
                "La descripción del usuario no es un JSON de aspecto válido:",
                e,
              );
            }
          }

          // Merge order: Cloud state (source of truth) -> Local storage (offline/in progress) -> Default state
          if (cloudState && cloudState.controls) {
            this.mergeCorpusState(cloudState, { includeIdentity: true });
            this.lastSyncedHash = JSON.stringify(this.state);
          }

          if (localState && localState.controls) {
            // If local state has pending unsynced changes, merge them
            const isPending =
              localStorage.getItem(`${this.storageKey}_pending`) === "true";
            if (isPending || !cloudState) {
              this.mergeCorpusState(localState, { includeIdentity: false });
            }
          }

          this.applyStateToUI();
        }

        updatePreset(presetName) {
          if (this.isApplyingState) return;
          if (this.state.preset === presetName) return;
          this.state.preset = presetName;

          // Apply preset default controls values if they exist in flat config
          const config = getPresetConfig(presetName);
          if (config) {
            const ctrls = PRESET_REGISTRY.getPresetControls(config);
            Object.entries(ctrls).forEach(([controlId, value]) => {
              this.state.controls[controlId] = value;
            });
          }

          this.saveLocal();
          this.applyStateToUI();
        }

        updatePosition(direction) {
          if (this.isApplyingState) return;
          if (this.state.position === direction) return;
          this.state.position = direction;
          this.saveLocal();
        }

        updateCoverStyle(styleName) {
          if (this.isApplyingState) return;
          if (this.state.coverStyle === styleName) return;
          this.state.coverStyle = styleName;
          this.saveLocal();
        }

        updateControlValue(id, value) {
          if (this.isApplyingState) return;
          if (this.state.controls[id] === value) return;
          this.state.controls[id] = value;
          if (window.ControlSyncRegistry) {
            window.ControlSyncRegistry.applyControl(id, value);
          }
          this.saveLocal();
        }

        // 1. Local Storage (Immediate)
        saveLocal() {
          try {
            localStorage.setItem(this.storageKey, JSON.stringify(this.state));
            localStorage.setItem(`${this.storageKey}_pending`, "true");

            // Trigger asynchronous debounced cloud sync
            this.scheduleSync();
          } catch (e) {
            console.error("Error saving aspect to LocalStorage:", e);
          }
        }

        // 2. Debounce Trigger
        async scheduleSync() {
          if (this.debounceTimer) {
            clearTimeout(this.debounceTimer);
          }
          this.debounceTimer = setTimeout(async () => {
            await this.syncCloud();
          }, this.debounceMs);
        }

        // 3. API Sync (Asynchronous & Idempotent)
        async syncCloud() {
          if (!navigator.onLine) {
            console.warn("Offline: Sincronización encolada.");
            this.setSyncState("offline", "Sin conexión");
            return;
          }

          const currentHash = JSON.stringify(this.state);
          if (currentHash === this.lastSyncedHash) {
            console.log(
              "Idempotencia: Sin cambios desde la última sincronización.",
            );
            localStorage.removeItem(`${this.storageKey}_pending`);
            this.setSyncState("synced", "Sincronizado");
            return;
          }

          if (this.abortController) {
            this.abortController.abort();
            console.log("Cancelando sincronización anterior.");
          }
          this.abortController = new AbortController();

          this.setSyncState("syncing", "Sincronizando...");

          try {
            const payload = {
              user_id: this.userId,
              description: currentHash,
              first_name: this.state.name,
              last_name: this.state.lastname,
            };

            const headers = {
              "Content-Type": "application/json",
            };
            if (this.apiKey) {
              headers["Authorization"] = `Bearer ${this.apiKey}`;
            }

            const response = await fetch(this.apiUrl, {
              method: "POST",
              headers: headers,
              body: JSON.stringify(payload),
              signal: this.abortController.signal,
            });

            if (!response.ok) {
              throw new Error(`HTTP Error ${response.status}`);
            }

            const resData = await response.json();
            if (!resData.success) {
              throw new Error(resData.message || "La API no devolvió éxito");
            }

            this.lastSyncedHash = currentHash;
            localStorage.removeItem(`${this.storageKey}_pending`);
            this.setSyncState("synced", "Sincronizado");
            console.log("Sincronización en la nube exitosa!");
          } catch (err) {
            if (err.name === "AbortError") {
              console.log("Sincronización abortada por nuevo cambio.");
              return;
            }
            console.error("Error sincronizando en la nube:", err);
            this.setSyncState("error", "Error de sincronización");
          } finally {
            this.abortController = null;
          }
        }

        syncPending() {
          const isPending =
            localStorage.getItem(`${this.storageKey}_pending`) === "true";
          if (isPending) {
            console.log(
              "Sincronizando cambios locales pendientes al volver online...",
            );
            this.syncCloud();
          }
        }
      }

      // ==========================================
      // 6. USER SERVICE
      // ==========================================
      class UserService {
        constructor(apiUrl) {
          this.apiUrl = apiUrl;
        }

        async getUserData() {
          try {
            const response = await fetch(this.apiUrl);
            if (!response.ok) throw new Error("HTTP " + response.status);
            const data = await response.json();
            console.log("[get_user.php raw]", data);
            console.log("[get_user.php data map]", data?.data || {});
            return this._normalizeData(data?.data || {});
          } catch {
            return this._getMockData();
          }
        }

        _normalizeData(data) {
          const corpus = this._parseCorpus(data?.user?.description);
          if (!data.user) data.user = {};
          const avatarValue =
            typeof data.user.avatar === "string"
              ? data.user.avatar
              : data.user.avatar?.url;

          // Save the original server avatar URL in a JS global and CSS variable on :root
          window.serverAvatarUrl = avatarValue;
          if (avatarValue) {
            document.documentElement.style.setProperty(
              "--server-avatar-url",
              `url('${avatarValue}')`,
            );
          }

          data.user.avatar = {};
          data.user.firstName =
            corpus?.name ||
            data.user.name ||
            data.user.firstName ||
            data.user.first_name ||
            data.user.displayName ||
            data.user.display_name ||
            "";
          data.user.role =
            corpus?.lastname ||
            data.user.lastname ||
            data.user.lastName ||
            data.user.last_name ||
            data.user.role ||
            "";
          data.user.avatar.url =
            corpus?.avatar ||
            avatarValue ||
            "https://app.newfacecards.com/nfc/profile-pic/recBOO8H0GO0RZlUU.jpg?timestamp=1723160426&size=1000x1000";
          data.user.umCoverUrl =
            corpus?.cover ||
            data.user.umCoverUrl ||
            data.user.cover ||
            "https://my.newfacecards.com/wp-content/uploads/ultimatemember/1/cover_photo.jpg";
          return data;
        }

        _parseCorpus(description) {
          if (!description) return null;
          try {
            return typeof description === "string"
              ? JSON.parse(description)
              : description;
          } catch {
            return null;
          }
        }

        async _getMockData() {
          await new Promise((resolve) => setTimeout(resolve, 300));
          return {
            user: {
              firstName: "Ivan",
              role: "Gonzalez",
              description: "Especialista en interfaces declarativas.",
              avatar: {
                url: "https://app.newfacecards.com/nfc/profile-pic/recBOO8H0GO0RZlUU.jpg?timestamp=1723160426&size=1000x1000",
              },
              umCoverUrl:
                "https://my.newfacecards.com/wp-content/uploads/ultimatemember/1/cover_photo.jpg",
            },
          };
        }
      }

      // ==========================================
      // 7. APP CONTROLLER — orquesta todo
      // ==========================================
      class AppController {
        constructor() {
          this.storageEl = document.querySelector(".status-storage");
          this.userService = new UserService(
            "https://my.newfacecards.com/nfc/front/get_user.php",
          );
          this.hydrator = new HydrationEngine(BindingStrategies);
        }

        setLoadingState(isLoading) {
          if (this.storageEl) {
            this.storageEl.setAttribute(
              "data-general-status",
              isLoading ? "skel-loading" : "loaded",
            );
          }
        }

        async init() {
          // 1. Inicializar los controles del panel condicional inmediatamente
          ConditionalPanelManager.init();

          // 2. Instanciar BipartiteStorage con ID por defecto e inicializar con LocalStorage de inmediato
          window.appBipartiteStorage = new BipartiteStorage({
            userId: 1,
            apiKey:
              "patMGuFVV5CBYL2TU.92aa853aaf30125e860bab7543358d01ef8632ad87081467d9d44e384f5e0ff5",
          });
          window.ControlSyncRegistry?.connectStorage(
            window.appBipartiteStorage,
          );
          window.appBipartiteStorage.loadState(null);

          // 3. Mostrar estado de carga (skeleton) para los datos del usuario e iniciar la consulta cloud
          this.setLoadingState(true);
          const data = await this.userService.getUserData();

          // 4. Hidratar los datos de usuario en el DOM y remover el skeleton
          this.hydrator.hydrate(document, data);
          this.setLoadingState(false);

          // 5. Actualizar identidad base desde server antes de aplicar corpus.
          window.appBipartiteStorage.ingestServerUser(data?.user);

          // 6. Actualizar el ID del usuario y priorizar/sincronizar la configuración desde la nube (descripción/biographical info)
          if (data?.user?.id) {
            window.appBipartiteStorage.userId = data.user.id;
          }
          window.appBipartiteStorage.loadState(data?.user?.description);
        }
      }

      // ==========================================
      // 8. INICIALIZACIÓN
      // ==========================================
      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", () => {
          const app = new AppController();
          app.init();
        });
      } else {
        const app = new AppController();
        app.init();
      }
    </script>
    <script type="module" src="../assets/js/core/bootSync.js"></script>
  </body>
</html>
