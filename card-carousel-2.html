<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Personalizador de Pantalla de Bloqueo</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons para elementos de interfaz -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@100;300;400&family=Playfair+Display:ital@0;1&family=Share+Tech+Mono&family=Cinzel:wght@400;600&display=swap"
      rel="stylesheet"
    />

    <style>
      /* Estilos globales ultra-optimizados */
      body {
        font-family: "Inter", sans-serif;
        user-select: none;
        -webkit-user-select: none;
        background-color: #000;
        overflow: hidden;
        -webkit-overflow-scrolling: touch;
      }

      /* Ocultar barra de scroll de forma nativa */
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }

      /* Contenedor del carrusel con perspectiva 3D */
      .carousel-container {
        perspective: 1200px;
        backface-visibility: hidden;
      }

      /* Transición de aceleración instantánea en GPU */
      .smooth-transition {
        transition:
          transform 0.3s cubic-bezier(0.16, 1, 0.3, 1),
          opacity 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        will-change: transform, opacity;
      }

      /* Tipografía del reloj */
      .ios-clock-font {
        font-family: "Outfit", sans-serif;
        font-weight: 100;
        letter-spacing: -0.05em;
      }

      /* Glassmorphism de alto rendimiento */
      .glassmorphism {
        background: rgba(255, 255, 255, 0.12);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.15);
      }

      .glassmorphism-dark {
        background: rgba(0, 0, 0, 0.6);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }

      /* Deslizamiento de snaps nativos */
      .snap-x-mandatory {
        scroll-snap-type: x mandatory;
        scroll-behavior: smooth;
      }
      .snap-center {
        scroll-snap-align: center;
        transform: translate3d(0, 0, 0);
        will-change: transform, opacity;
      }
    </style>
  </head>
  <body
    class="h-screen w-screen text-white overflow-hidden bg-black select-none"
  >
    <!-- CONTENEDOR PRINCIPAL -->
    <div
      id="mainViewport"
      class="relative w-full h-full overflow-hidden bg-black"
    >
      <!-- ======================================================= -->
      <!-- ESTADO 1: ELEGIDO (PANTALLA DE BLOQUEO ACTIVA) -->
      <!-- ======================================================= -->
      <div
        id="stateElegido"
        class="absolute inset-0 w-full h-full z-20 smooth-transition flex flex-col justify-between p-8 pb-16 md:pb-20"
      >
        <!-- Fondo de pantalla completo -->
        <div
          id="elegidoBg"
          class="absolute inset-0 w-full h-full z-0 bg-cover bg-center transition-opacity duration-300"
        >
          <!-- Fondo dinámico activo -->
        </div>

        <!-- Degradado superior -->
        <div
          class="absolute top-0 left-0 right-0 h-40 bg-gradient-to-b from-black/40 to-transparent z-1 pointer-events-none"
        ></div>

        <!-- Espaciador -->
        <div class="relative z-10 h-6"></div>

        <!-- CONTENIDO PRINCIPAL -->
        <div
          class="relative z-10 flex flex-col items-center mt-4 text-center pointer-events-none max-w-2xl mx-auto w-full"
        >
          <!-- Fecha -->
          <div
            class="flex items-center justify-center text-white/95 font-medium text-base md:text-lg drop-shadow-md tracking-wide"
          >
            <span id="lockScreenDate">Sáb 23</span>
          </div>

          <!-- Reloj estilizado gigante -->
          <h1
            id="lockScreenClock"
            class="ios-clock-font text-[10rem] md:text-[14rem] leading-[0.8] text-white/95 tracking-tighter drop-shadow-xl my-6 md:my-8"
          >
            08:51
          </h1>
        </div>

        <!-- BOTÓN PRINCIPAL: EDITAR -->
        <div class="relative z-20 w-full flex justify-center mt-auto">
          <button
            id="btnEditar"
            class="glassmorphism hover:scale-105 active:scale-95 transition-transform duration-200 text-white font-semibold text-sm md:text-base py-3.5 px-10 rounded-full shadow-2xl flex items-center gap-2.5 tracking-wide cursor-pointer"
          >
            <i data-lucide="sparkles" class="w-4.5 h-4.5"></i>
            Editar
          </button>
        </div>
      </div>

      <!-- ======================================================= -->
      <!-- ESTADO 2: SELECCIONANDO (MODO EDITOR EN CARRUSEL 3D) -->
      <!-- ======================================================= -->
      <div
        id="stateSeleccionando"
        class="absolute inset-0 w-full h-full z-10 opacity-0 pointer-events-none smooth-transition flex flex-col justify-between py-8 overflow-hidden"
      >
        <!-- Fondo oscuro -->
        <div class="absolute inset-0 bg-neutral-950 z-0"></div>

        <!-- Barra de navegación del editor -->
        <div
          class="relative z-10 w-full px-8 flex justify-between items-center text-center max-w-7xl mx-auto"
        >
          <button
            id="btnCancelarEdicion"
            class="text-sm md:text-base font-medium text-white/60 hover:text-white transition-colors duration-150"
          >
            Cancelar
          </button>
          <span
            class="text-md md:text-lg font-semibold tracking-widest text-white/80"
            >SELECCIONAR DISEÑO</span
          >
          <button
            id="btnListo"
            class="text-sm md:text-base font-semibold text-sky-400 hover:text-sky-300 transition-colors duration-150"
          >
            Listo
          </button>
        </div>

        <!-- CARRUSEL DE TARJETAS (H-SCROLL EXCLUSIVO SIN ZOOM) -->
        <div
          class="relative z-10 flex-1 w-full flex items-center justify-center overflow-hidden carousel-container"
        >
          <!-- Contenedor Deslizable Horizontal -->
          <div
            id="templatesScroller"
            class="w-full h-full flex items-center overflow-x-scroll overflow-y-hidden snap-x-mandatory no-scrollbar px-[calc(50vw-110px)] md:px-[calc(50vw-130px)] gap-6 py-12"
            style="touch-action: pan-x"
          >
            <!-- Generado dinámicamente -->
          </div>
        </div>

        <!-- CONTROLES INFERIORES -->
        <div
          class="relative z-10 w-full flex flex-col items-center gap-6 px-8 max-w-md mx-auto"
        >
          <!-- Puntos de página -->
          <div
            id="pageIndicator"
            class="flex items-center gap-2.5 justify-center"
          >
            <!-- Generado dinámicamente -->
          </div>

          <!-- Botones de Acción -->
          <div class="flex items-center justify-center gap-4 w-full">
            <!-- Botón Personalizar -->
            <button
              id="btnPersonalizar"
              class="flex-1 glassmorphism-dark hover:bg-neutral-900 active:scale-95 text-white/95 text-sm md:text-base font-semibold py-4 rounded-full tracking-wide transition-all duration-150 shadow-lg flex items-center justify-center gap-2 border border-white/10"
            >
              Personalizar
            </button>

            <!-- Botón Añadir (+) -->
            <button
              id="btnAddNew"
              class="w-14 h-14 rounded-full glassmorphism-dark hover:bg-neutral-900 active:scale-95 text-white flex items-center justify-center border border-white/10 transition-all duration-150 shadow-lg"
              title="Añadir Imagen Personalizada"
            >
              <i data-lucide="plus" class="w-7 h-7"></i>
            </button>
          </div>
        </div>

        <!-- Carga de archivos oculta -->
        <input type="file" id="imageUploader" accept="image/*" class="hidden" />
      </div>

      <!-- ======================================================= -->
      <!-- PANEL DE PERSONALIZACIÓN INFERIOR (TIPOGRAFÍA Y COLOR) -->
      <!-- ======================================================= -->
      <div
        id="personalizePanel"
        class="absolute bottom-0 left-0 right-0 h-[320px] bg-neutral-900/95 backdrop-blur-3xl rounded-t-[36px] border-t border-white/15 z-30 transform translate-y-full transition-transform duration-300 flex flex-col p-8 text-white justify-between max-w-xl mx-auto"
      >
        <!-- Cabecera -->
        <div
          class="flex justify-between items-center w-full border-b border-white/5 pb-4"
        >
          <span class="text-sm font-semibold text-neutral-300"
            >Estilo del reloj</span
          >
          <button
            id="btnClosePanel"
            class="w-8 h-8 rounded-full bg-neutral-800 flex items-center justify-center hover:bg-neutral-750 transition-colors duration-150"
          >
            <i data-lucide="x" class="w-4.5 h-4.5 text-white/70"></i>
          </button>
        </div>

        <!-- Selección de Tipografía -->
        <div class="flex flex-col gap-2.5">
          <span class="text-xs font-semibold text-neutral-400 tracking-wider"
            >FUENTE</span
          >
          <div class="grid grid-cols-4 gap-3">
            <button
              data-font="Outfit"
              class="font-button py-2.5 bg-neutral-800 hover:bg-neutral-750 border-2 border-sky-400 rounded-2xl text-center transition-all duration-150 font-sans text-xl"
            >
              Aa
            </button>
            <button
              data-font="Playfair Display"
              class="font-button py-2.5 bg-neutral-800 hover:bg-neutral-750 border-2 border-transparent rounded-2xl text-center transition-all duration-150 font-serif text-xl"
            >
              Aa
            </button>
            <button
              data-font="Share Tech Mono"
              class="font-button py-2.5 bg-neutral-800 hover:bg-neutral-750 border-2 border-transparent rounded-2xl text-center transition-all duration-150 font-mono text-xl"
            >
              Aa
            </button>
            <button
              data-font="Cinzel"
              class="font-button py-2.5 bg-neutral-800 hover:bg-neutral-750 border-2 border-transparent rounded-2xl text-center transition-all duration-150 font-semibold text-xl"
            >
              Aa
            </button>
          </div>
        </div>

        <!-- Color del Texto -->
        <div class="flex flex-col gap-2.5">
          <span class="text-xs font-semibold text-neutral-400 tracking-wider"
            >COLOR DEL TEXTO</span
          >
          <div class="flex justify-between items-center gap-3">
            <button
              data-color="rgba(255, 255, 255, 0.9)"
              class="color-button w-9 h-9 rounded-full border-2 border-white bg-white shadow-md transition-all duration-150"
            ></button>
            <button
              data-color="rgba(253, 186, 116, 0.9)"
              class="color-button w-9 h-9 rounded-full border-2 border-transparent bg-orange-300 transition-all duration-150"
            ></button>
            <button
              data-color="rgba(244, 114, 182, 0.9)"
              class="color-button w-9 h-9 rounded-full border-2 border-transparent bg-pink-400 transition-all duration-150"
            ></button>
            <button
              data-color="rgba(147, 197, 253, 0.9)"
              class="color-button w-9 h-9 rounded-full border-2 border-transparent bg-blue-300 transition-all duration-150"
            ></button>
            <button
              data-color="rgba(167, 243, 208, 0.9)"
              class="color-button w-9 h-9 rounded-full border-2 border-transparent bg-emerald-200 transition-all duration-150"
            ></button>

            <label
              class="relative w-9 h-9 rounded-full border-2 border-transparent bg-gradient-to-tr from-indigo-500 via-purple-500 to-pink-500 cursor-pointer overflow-hidden flex items-center justify-center shadow-md animate-none"
            >
              <input
                type="color"
                id="customColorPicker"
                class="absolute inset-0 opacity-0 cursor-pointer"
              />
              <i
                data-lucide="pipette"
                class="w-4 h-4 text-white drop-shadow"
              ></i>
            </label>
          </div>
        </div>
      </div>
    </div>

    <!-- NOTIFICACIÓN DE TOAST -->
    <div
      id="toast"
      class="fixed bottom-8 left-1/2 transform -translate-x-1/2 bg-neutral-900/95 border border-white/10 text-white px-6 py-3.5 rounded-2xl shadow-2xl translate-y-24 opacity-0 transition-all duration-200 flex items-center gap-3 text-sm z-50 whitespace-nowrap"
    >
      <i id="toastIcon" data-lucide="info" class="w-5 h-5 text-sky-400"></i>
      <span id="toastMessage">Información del sistema</span>
    </div>

    <!-- LÓGICA DE CONTROL DE LA INTERFAZ -->
    <script>
      lucide.createIcons();

      // =======================================================
      // CONTROL DE PLANTILLAS
      // =======================================================
      const DEFAULT_TEMPLATES = [
        {
          id: "plantilla-atardecer",
          name: "Atardecer Costero",
          bgType: "svg",
          bgContent: `
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 800" class="w-full h-full object-cover">
            <defs>
              <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#ebd4be" />
                <stop offset="25%" stop-color="#dfbcbc" />
                <stop offset="50%" stop-color="#b49dae" />
                <stop offset="70%" stop-color="#7389a0" />
                <stop offset="100%" stop-color="#556c80" />
              </linearGradient>
              <linearGradient id="seaGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#495a6c" />
                <stop offset="50%" stop-color="#344352" />
                <stop offset="100%" stop-color="#1b2530" />
              </linearGradient>
            </defs>
            <rect width="400" height="420" fill="url(#skyGrad)" />
            <path d="M 0,380 Q 80,375 160,378 T 320,380 T 400,375 L 400,390 L 0,390 Z" fill="#6e7485" opacity="0.3" />
            <path d="M 0,385 Q 120,380 240,386 T 400,383 L 400,390 L 0,390 Z" fill="#586375" opacity="0.4" />
            <rect y="388" width="400" height="412" fill="url(#seaGrad)" />
            <path d="M 0,420 Q 100,418 200,422 T 400,420" stroke="#718699" stroke-width="0.8" fill="none" opacity="0.4" />
            <path d="M 0,460 Q 150,455 300,462 T 400,458" stroke="#718699" stroke-width="0.8" fill="none" opacity="0.3" />
            <path d="M 0,510 Q 100,514 200,508 T 400,512" stroke="#ffffff" stroke-width="0.5" fill="none" opacity="0.2" />
            <path d="M 0,660 Q 150,650 400,670 L 400,800 L 0,800 Z" fill="#323337" />
            <ellipse cx="200" cy="740" rx="200" ry="60" fill="#202124" opacity="0.8"/>
            <path d="M 110,490 Q 150,480 200,482 Q 250,485 300,500 Q 290,520 220,525 Q 150,522 110,505 Z" fill="#1b1c1e" stroke="#000" stroke-width="2"/>
            <g fill="#0e0e10" opacity="0.95">
              <circle cx="125" cy="488" r="1.5" /><circle cx="135" cy="485" r="1.2" /><circle cx="145" cy="484" r="1.5" />
              <circle cx="160" cy="482" r="1.8" /><circle cx="170" cy="483" r="1.5" /><circle cx="195" cy="482" r="1.6" />
            </g>
            <path d="M 140,650 Q 210,610 280,630 Q 300,645 285,670 Q 230,685 140,660 Z" fill="#1f2022" />
          </svg>
        `,
          font: "Outfit",
          color: "rgba(255, 255, 255, 0.9)",
        },
        {
          id: "plantilla-neon",
          name: "Abstracción Neón",
          bgType: "gradient",
          bgContent:
            "linear-gradient(135deg, #090514 0%, #110924 40%, #2b043a 80%, #05010a 100%)",
          font: "Share Tech Mono",
          color: "rgba(167, 243, 208, 0.9)",
        },
        {
          id: "plantilla-minimal",
          name: "Minimalista Arena",
          bgType: "gradient",
          bgContent:
            "linear-gradient(180deg, #eae2d1 0%, #ded5be 50%, #bcae94 100%)",
          font: "Playfair Display",
          color: "rgba(70, 58, 48, 0.9)",
        },
        {
          id: "plantilla-noche",
          name: "Noche Profunda",
          bgType: "gradient",
          bgContent: "linear-gradient(180deg, #0b0f19 0%, #02040a 100%)",
          font: "Cinzel",
          color: "rgba(253, 186, 116, 0.9)",
        },
      ];

      let templates = [...DEFAULT_TEMPLATES];
      let selectedTemplateId = "plantilla-atardecer";
      let activeEditingIndex = 0;
      let observer = null;

      // Elementos DOM
      const stateElegido = document.getElementById("stateElegido");
      const stateSeleccionando = document.getElementById("stateSeleccionando");
      const elegidoBg = document.getElementById("elegidoBg");
      const lockScreenClock = document.getElementById("lockScreenClock");
      const lockScreenDate = document.getElementById("lockScreenDate");

      const btnEditar = document.getElementById("btnEditar");
      const btnCancelarEdicion = document.getElementById("btnCancelarEdicion");
      const btnListo = document.getElementById("btnListo");

      const templatesScroller = document.getElementById("templatesScroller");
      const pageIndicator = document.getElementById("pageIndicator");

      const btnPersonalizar = document.getElementById("btnPersonalizar");
      const personalizePanel = document.getElementById("personalizePanel");
      const btnClosePanel = document.getElementById("btnClosePanel");
      const fontButtons = document.querySelectorAll(".font-button");
      const colorButtons = document.querySelectorAll(".color-button");
      const customColorPicker = document.getElementById("customColorPicker");

      const btnAddNew = document.getElementById("btnAddNew");
      const imageUploader = document.getElementById("imageUploader");

      const toast = document.getElementById("toast");
      const toastMessage = document.getElementById("toastMessage");
      const toastIcon = document.getElementById("toastIcon");

      // =======================================================
      // ACTUALIZACIÓN DE HORA (TIEMPO REAL)
      // =======================================================
      function updateClock() {
        const now = new Date();
        const hours = String(now.getHours()).padStart(2, "0");
        const minutes = String(now.getMinutes()).padStart(2, "0");
        lockScreenClock.textContent = `${hours}:${minutes}`;

        const days = ["Dom", "Lun", "Mar", "Mié", "Jue", "Vie", "Sáb"];
        const dayName = days[now.getDay()];
        const dayNum = now.getDate();
        lockScreenDate.textContent = `${dayName} ${dayNum}`;
      }
      setInterval(updateClock, 1000);
      updateClock();

      // =======================================================
      // RENDERIZADOR DE FONDOS
      // =======================================================
      function applyBackground(element, template) {
        if (!element) return;
        if (template.bgType === "svg") {
          element.innerHTML = template.bgContent;
          element.style.background = "none";
        } else if (template.bgType === "gradient") {
          element.innerHTML = "";
          element.style.background = template.bgContent;
        } else if (template.bgType === "image") {
          element.innerHTML = "";
          element.style.background = `url(${template.bgContent}) center/cover no-repeat`;
        }
      }

      function showToast(message, iconName = "info") {
        toastMessage.textContent = message;
        toastIcon.setAttribute("data-lucide", iconName);
        lucide.createIcons();

        toast.classList.remove("translate-y-24", "opacity-0");
        toast.classList.add("translate-y-0", "opacity-100");

        setTimeout(() => {
          toast.classList.remove("translate-y-0", "opacity-100");
          toast.classList.add("translate-y-24", "opacity-0");
        }, 2000);
      }

      // =======================================================
      // CONSTRUCCIÓN DEL CARRUSEL (RÁPIDO - CON PRE-RENDERIZADO)
      // =======================================================
      function renderCarousel() {
        // Destruir observer anterior para evitar fugas de memoria
        if (observer) {
          observer.disconnect();
        }

        templatesScroller.innerHTML = "";
        pageIndicator.innerHTML = "";

        templates.forEach((template, index) => {
          // Tarjeta individual sin efectos de zoom al cambiar
          const item = document.createElement("div");
          item.className =
            "relative flex-shrink-0 w-[220px] md:w-[260px] h-[400px] md:h-[480px] rounded-[32px] overflow-hidden shadow-2xl snap-center transition-all duration-300 transform cursor-pointer border border-white/10";
          item.id = `carousel-item-${index}`;
          item.setAttribute("data-index", index);

          // Fondo de tarjeta
          const bgContainer = document.createElement("div");
          bgContainer.className =
            "absolute inset-0 w-full h-full z-0 pointer-events-none";
          applyBackground(bgContainer, template);
          item.appendChild(bgContainer);

          // Sombras
          const topShadow = document.createElement("div");
          topShadow.className =
            "absolute top-0 left-0 right-0 h-20 bg-gradient-to-b from-black/40 to-transparent pointer-events-none";
          item.appendChild(topShadow);

          const bottomShadow = document.createElement("div");
          bottomShadow.className =
            "absolute bottom-0 left-0 right-0 h-20 bg-gradient-to-t from-black/50 to-transparent pointer-events-none";
          item.appendChild(bottomShadow);

          // Previsualización de interfaz
          const contentContainer = document.createElement("div");
          contentContainer.className =
            "absolute inset-0 z-10 p-5 flex flex-col justify-start items-center text-center pointer-events-none";

          const dateSim = document.createElement("div");
          dateSim.className = "text-[11px] font-semibold opacity-90 mt-5";
          dateSim.style.color = template.color;
          dateSim.textContent = lockScreenDate.textContent;
          contentContainer.appendChild(dateSim);

          const clockSim = document.createElement("div");
          clockSim.className = "text-5xl md:text-6xl mt-2 tracking-tight";
          clockSim.style.color = template.color;
          clockSim.style.fontFamily = template.font;
          clockSim.style.fontWeight =
            template.font === "Outfit" ? "100" : "normal";
          clockSim.textContent = lockScreenClock.textContent;
          contentContainer.appendChild(clockSim);

          const label = document.createElement("div");
          label.className =
            "absolute bottom-5 left-1/2 transform -translate-x-1/2 bg-black/60 backdrop-blur-xl text-[10px] md:text-xs font-bold px-3 py-1.5 rounded-full text-white/95 uppercase tracking-widest whitespace-nowrap shadow-lg border border-white/5";
          label.textContent = template.name;
          item.appendChild(label);

          item.appendChild(contentContainer);

          item.addEventListener("click", () => {
            centerTemplate(index);
          });

          templatesScroller.appendChild(item);

          // Indicador dot
          const dot = document.createElement("div");
          dot.className = `w-2.5 h-2.5 rounded-full transition-all duration-300 cursor-pointer ${index === activeEditingIndex ? "bg-white w-5" : "bg-white/30"}`;
          dot.addEventListener("click", () => {
            centerTemplate(index);
          });
          pageIndicator.appendChild(dot);
        });

        setupIntersectionObserver();
      }

      // Centrado de la tarjeta activa de forma fluida
      function centerTemplate(index) {
        if (index < 0 || index >= templates.length) return;
        activeEditingIndex = index;

        const element = document.getElementById(`carousel-item-${index}`);
        if (element) {
          templatesScroller.scrollTo({
            left:
              element.offsetLeft -
              templatesScroller.offsetWidth / 2 +
              element.offsetWidth / 2,
            behavior: "smooth",
          });
        }
        updateIndicatorDots();
      }

      // Detector de foco de alta velocidad en viewport
      function setupIntersectionObserver() {
        const options = {
          root: templatesScroller,
          threshold: 0.6,
          rootMargin: "0px -50px 0px -50px",
        };

        observer = new IntersectionObserver((entries) => {
          entries.forEach((entry) => {
            if (entry.isIntersecting) {
              const index = parseInt(entry.target.getAttribute("data-index"));
              if (activeEditingIndex !== index) {
                activeEditingIndex = index;
                updateIndicatorDots();
                update3DEffects();
              }
            }
          });
        }, options);

        templates.forEach((_, index) => {
          const el = document.getElementById(`carousel-item-${index}`);
          if (el) observer.observe(el);
        });

        update3DEffects();
      }

      // Actualización instantánea de los puntos de páginas
      function updateIndicatorDots() {
        const dots = pageIndicator.children;
        for (let i = 0; i < dots.length; i++) {
          if (i === activeEditingIndex) {
            dots[i].className =
              "w-5 h-2.5 rounded-full bg-white transition-all duration-300 cursor-pointer";
          } else {
            dots[i].className =
              "w-2.5 h-2.5 rounded-full bg-white/30 transition-all duration-300 cursor-pointer";
          }
        }
      }

      // Efectos 3D limpios de escala (sin efecto de zoom al pasar)
      function update3DEffects() {
        templates.forEach((_, index) => {
          const item = document.getElementById(`carousel-item-${index}`);
          if (!item) return;

          const distance = index - activeEditingIndex;

          // Se mantiene scale(1) para todas las tarjetas, eliminando saltos de zoom
          if (distance === 0) {
            item.style.transform =
              "scale(1) translate3d(0, 0, 0) rotateY(0deg)";
            item.style.opacity = "1";
            item.style.zIndex = "10";
          } else if (distance === 1) {
            item.style.transform =
              "scale(1) translate3d(15px, 0, 0) rotateY(-12deg)";
            item.style.opacity = "0.6";
            item.style.zIndex = "5";
          } else if (distance === -1) {
            item.style.transform =
              "scale(1) translate3d(-15px, 0, 0) rotateY(12deg)";
            item.style.opacity = "0.6";
            item.style.zIndex = "5";
          } else if (distance > 1) {
            item.style.transform =
              "scale(1) translate3d(40px, 0, 0) rotateY(-20deg)";
            item.style.opacity = "0.2";
            item.style.zIndex = "1";
          } else {
            item.style.transform =
              "scale(1) translate3d(-40px, 0, 0) rotateY(20deg)";
            item.style.opacity = "0.2";
            item.style.zIndex = "1";
          }
        });
      }

      // =======================================================
      // CONTROL DE MÁQUINA DE ESTADOS (ENTRAR / SALIR)
      // =======================================================

      // Pre-construimos el carrusel de inmediato para que esté listo al abrir
      renderCarousel();

      btnEditar.addEventListener("click", () => {
        const currentIndex = templates.findIndex(
          (t) => t.id === selectedTemplateId,
        );
        activeEditingIndex = currentIndex >= 0 ? currentIndex : 0;

        // Sincronizar previsualización antes del zoom
        updateClock();

        // Transición rápida sin efectos de escala (solo fundido de opacidad)
        stateElegido.classList.add("opacity-0", "pointer-events-none");
        stateElegido.classList.remove("z-20");
        stateElegido.classList.add("z-10");

        stateSeleccionando.classList.remove("opacity-0", "pointer-events-none");
        stateSeleccionando.classList.add("z-20");
        stateSeleccionando.classList.remove("z-10");

        // Centrado inmediato libre de latencia
        setTimeout(() => {
          centerTemplate(activeEditingIndex);
        }, 30);
      });

      btnCancelarEdicion.addEventListener("click", () => {
        closeEditor(false);
      });

      btnListo.addEventListener("click", () => {
        selectedTemplateId = templates[activeEditingIndex].id;
        closeEditor(true);
      });

      function closeEditor(saveChanges) {
        personalizePanel.classList.add("translate-y-full");

        if (saveChanges) {
          const activeTemplate = templates[activeEditingIndex];
          applyBackground(elegidoBg, activeTemplate);

          lockScreenClock.style.fontFamily = activeTemplate.font;
          lockScreenClock.style.fontWeight =
            activeTemplate.font === "Outfit" ? "100" : "normal";
          lockScreenClock.style.color = activeTemplate.color;
          lockScreenDate.style.color = activeTemplate.color;

          showToast(`Diseño "${activeTemplate.name}" aplicado`, "check-circle");
        }

        stateSeleccionando.classList.add("opacity-0", "pointer-events-none");
        stateSeleccionando.classList.remove("z-20");
        stateSeleccionando.classList.add("z-10");

        stateElegido.classList.remove("opacity-0", "pointer-events-none");
        stateElegido.classList.add("z-20");
        stateElegido.classList.remove("z-10");
      }

      // =======================================================
      // PERSONALIZADOR DE ESTILOS (TIPOGRAFÍA Y COLOR DE RELOJ)
      // =======================================================
      btnPersonalizar.addEventListener("click", () => {
        const activeTemplate = templates[activeEditingIndex];

        fontButtons.forEach((btn) => {
          if (btn.getAttribute("data-font") === activeTemplate.font) {
            btn.classList.add("border-sky-400");
            btn.classList.remove("border-transparent");
          } else {
            btn.classList.remove("border-sky-400");
            btn.classList.add("border-transparent");
          }
        });

        colorButtons.forEach((btn) => {
          if (btn.getAttribute("data-color") === activeTemplate.color) {
            btn.classList.add("scale-110", "border-white");
            btn.classList.remove("border-transparent");
          } else {
            btn.classList.remove("scale-110", "border-white");
            btn.classList.add("border-transparent");
          }
        });

        personalizePanel.classList.remove("translate-y-full");
      });

      btnClosePanel.addEventListener("click", () => {
        personalizePanel.classList.add("translate-y-full");
      });

      fontButtons.forEach((button) => {
        button.addEventListener("click", () => {
          const selectedFont = button.getAttribute("data-font");
          templates[activeEditingIndex].font = selectedFont;

          fontButtons.forEach((b) =>
            b.classList.replace("border-sky-400", "border-transparent"),
          );
          button.classList.replace("border-transparent", "border-sky-400");

          const activeItem = document.getElementById(
            `carousel-item-${activeEditingIndex}`,
          );
          if (activeItem) {
            const clock = activeItem.querySelector(".text-5xl");
            if (clock) {
              clock.style.fontFamily = selectedFont;
              clock.style.fontWeight =
                selectedFont === "Outfit" ? "100" : "normal";
            }
          }
        });
      });

      colorButtons.forEach((button) => {
        button.addEventListener("click", () => {
          const selectedColor = button.getAttribute("data-color");
          templates[activeEditingIndex].color = selectedColor;

          colorButtons.forEach((b) => {
            b.classList.remove("scale-110", "border-white");
            b.classList.add("border-transparent");
          });
          button.classList.add("scale-110", "border-white");
          button.classList.remove("border-transparent");

          const activeItem = document.getElementById(
            `carousel-item-${activeEditingIndex}`,
          );
          if (activeItem) {
            const clock = activeItem.querySelector(".text-5xl");
            const date = activeItem.querySelector(".text-\\[11px\\]");
            if (clock) clock.style.color = selectedColor;
            if (date) date.style.color = selectedColor;
          }
        });
      });

      customColorPicker.addEventListener("input", (e) => {
        const selectedColor = e.target.value;
        const r = parseInt(selectedColor.slice(1, 3), 16);
        const g = parseInt(selectedColor.slice(3, 5), 16);
        const b = parseInt(selectedColor.slice(5, 7), 16);
        const rgbaColor = `rgba(${r}, ${g}, ${b}, 0.95)`;

        templates[activeEditingIndex].color = rgbaColor;

        colorButtons.forEach((b) => {
          b.classList.remove("scale-110", "border-white");
          b.classList.add("border-transparent");
        });

        const activeItem = document.getElementById(
          `carousel-item-${activeEditingIndex}`,
        );
        if (activeItem) {
          const clock = activeItem.querySelector(".text-5xl");
          const date = activeItem.querySelector(".text-\\[11px\\]");
          if (clock) clock.style.color = rgbaColor;
          if (date) date.style.color = rgbaColor;
        }
      });

      // =======================================================
      // SUBIDA DE NUEVAS IMÁGENES (+)
      // =======================================================
      btnAddNew.addEventListener("click", () => {
        imageUploader.click();
      });

      imageUploader.addEventListener("change", (e) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = function (event) {
            const imageUrl = event.target.result;

            const newTemplate = {
              id: `plantilla-custom-${Date.now()}`,
              name: `Nueva Foto ${templates.length - DEFAULT_TEMPLATES.length + 1}`,
              bgType: "image",
              bgContent: imageUrl,
              font: "Outfit",
              color: "rgba(255, 255, 255, 0.9)",
            };

            templates.push(newTemplate);
            renderCarousel();

            setTimeout(() => {
              centerTemplate(templates.length - 1);
              showToast("Foto añadida", "sparkles");
            }, 50);
          };
          reader.readAsDataURL(file);
        }
      });

      // =======================================================
      // INICIALIZACIÓN DE LA VISTA ACTIVA
      // =======================================================
      applyBackground(elegidoBg, templates[0]);
      lockScreenClock.style.fontFamily = templates[0].font;
      lockScreenClock.style.fontWeight =
        templates[0].font === "Outfit" ? "100" : "normal";
      lockScreenClock.style.color = templates[0].color;
      lockScreenDate.style.color = templates[0].color;
    </script>
  </body>
</html>
