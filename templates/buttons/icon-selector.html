<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Estación de Iconos</title>

    <!-- CDN de FontAwesome para el Set de Iconos de Redes e Interfaces -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <!-- CDN de Phosphor Icons para un diseño redondo y limpio -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/css/phosphor.css"
    />

    <!-- Tailwind CSS para diseño y utilidades rápidas premium -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
      /* Variables de diseño del entorno visual */
      :root {
        --bg-main: #f4f4f5;
        --surface: #ffffff;
        --border: #e4e4e7;
        --text-main: #09090b;
        --text-muted: #71717a;
        --primary: #18181b;
        --primary-hover: #27272a;
        --ring: rgba(24, 24, 27, 0.2);
      }

      body {
        background-color: var(--bg-main);
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          "Helvetica Neue",
          Arial,
          sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
      }

      /* Ocultar barra de scroll en los chips de categorías pero permitir deslizamiento táctil/rueda */
      .hide-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .hide-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }

      /* Estilos de scrollbar elegante para el contenedor vertical de iconos */
      .custom-scroll::-webkit-scrollbar {
        width: 6px;
      }
      .custom-scroll::-webkit-scrollbar-track {
        background: transparent;
      }
      .custom-scroll::-webkit-scrollbar-thumb {
        background-color: #d4d4d8;
        border-radius: 10px;
      }

      /* Estilos globales para los iconos nativos SVG */
      .svg-icon {
        width: 22px;
        height: 22px;
        fill: none;
        stroke: currentColor;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      /* Animaciones interactivas */
      .icon-btn {
        transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .icon-btn:active {
        transform: scale(0.92);
      }
    </style>
  </head>

      /**
       * MOTOR Y CONTROLADOR PRINCIPAL DEL COMPONENTE
       */
      const IconStation = {
        activeSet: "native",
        searchQuery: "",
        selectedIconId: "link", // Icono seleccionado por defecto

        nodes: {
          grid: document.getElementById("iconGrid"),
          search: document.getElementById("iconSearchInput"),
          counter: document.getElementById("iconCounter"),
          activeName: document.getElementById("activeIconName"),
          tabs: document.querySelectorAll(".tab-chip"),
          preview: document.getElementById("previewBox"),
        },

        init() {
          this.renderGrid();
          this.bindEvents();
        },

        bindEvents() {
          // Motor de búsqueda: Filtrado en tiempo real al escribir
          this.nodes.search.addEventListener("input", (e) => {
            this.searchQuery = e.target.value.toLowerCase().trim();
            this.renderGrid();
          });

          // Cambio de set de iconos dinámico mediante Tabs/Chips
          this.nodes.tabs.forEach((tab) => {
            tab.addEventListener("click", (e) => {
              const targetSet = e.currentTarget.getAttribute("data-set");
              this.switchSet(targetSet);
            });
          });
        },

        switchSet(setId) {
          this.activeSet = setId;

          // Mantener la caja de búsqueda limpia al cambiar de set
          this.searchQuery = "";
          this.nodes.search.value = "";

          // Actualizar la interfaz visual de las pestañas sin romper los SVGs internos
          this.nodes.tabs.forEach((tab) => {
            const currentSet = tab.getAttribute("data-set");
            if (currentSet === setId) {
              tab.className =
                "tab-chip px-3.5 py-1.5 rounded-full text-xs font-semibold whitespace-nowrap transition-all flex items-center bg-gray-900 text-white shadow-sm";
            } else {
              tab.className =
                "tab-chip px-3.5 py-1.5 rounded-full text-xs font-semibold whitespace-nowrap transition-all flex items-center bg-gray-100 text-gray-600 hover:bg-gray-200";
            }
          });

          this.renderGrid();
        },

        renderGrid() {
          const currentData = ICON_SETS[this.activeSet];
          let htmlOutput = "";
          let visibleCount = 0;

          currentData.forEach((iconObj) => {
            // Motor de búsqueda multidimensional (coincidencias por ID o tags del array)
            const matches =
              !this.searchQuery ||
              iconObj.id.toLowerCase().includes(this.searchQuery) ||
              iconObj.tags.some((tag) =>
                tag.toLowerCase().includes(this.searchQuery),
              );

            if (matches) {
              visibleCount++;
              const isSelected = this.selectedIconId === iconObj.id;

              // Render del botón con estilos de selección activa
              const btnClasses = isSelected
                ? "icon-btn aspect-square rounded-xl flex items-center justify-center text-xl cursor-pointer border-2 border-gray-900 bg-gray-100 text-gray-900"
                : "icon-btn aspect-square rounded-xl flex items-center justify-center text-xl cursor-pointer border border-gray-200 bg-white text-gray-600 hover:border-gray-400 hover:bg-gray-50";

              htmlOutput += `
              <div class="${btnClasses}" 
                   title="Etiquetas: ${iconObj.tags.join(", ")}"
                   onclick="IconStation.selectIcon('${iconObj.id}', '${this.activeSet}')">
                ${iconObj.html}
              </div>
            `;
            }
          });

          // Estado de búsqueda vacía o sin resultados
          if (visibleCount === 0) {
            htmlOutput = `
            <div class="col-span-5 flex flex-col items-center justify-center py-10 text-gray-400">
              <svg class="w-8 h-8 mb-2 opacity-40 animate-pulse" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
              </svg>
              <p class="text-[11px] font-medium">Sin resultados para esta búsqueda</p>
            </div>`;
          }

          this.nodes.grid.innerHTML = htmlOutput;
          this.nodes.counter.textContent = `${visibleCount} de ${currentData.length}`;
        },

        selectIcon(id, setOrigin) {
          this.selectedIconId = id;

          // Re-render del grid para repintar el marco del icono seleccionado
          this.renderGrid();

          // Obtener el HTML del icono o emoji y pintar la previsualización inferior
          const iconData = ICON_SETS[setOrigin].find((i) => i.id === id);
          if (iconData) {
            this.nodes.preview.innerHTML = iconData.html;
            this.nodes.activeName.textContent = id;

            // Punto de conexión para tu estado global:
            // S.icon = id;
            // S.iconType = setOrigin;
            // renderPreview();
          }
        },
      };

      // Inicializar el gestor de iconos al cargar el documento
      document.addEventListener("DOMContentLoaded", () => {
