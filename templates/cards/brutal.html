<!-- Plantilla: Brutal Card (Neo-Brutalist Tabs Casing) -->
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap');

  .card--brutal {
    display: block;
    width: 100%;
    max-width: 420px;
    background: #f0ece2;
    font-family: 'Space Mono', monospace;
  }

  /* HERO: cover full bleed */
  .brutal__hero {
    position: relative;
    height: 220px;
    overflow: visible;
  }
  .brutal__cover {
    width: 100%;
    height: 220px;
    object-fit: cover;
    display: block;
    filter: grayscale(1) contrast(1.1);
  }
  .brutal__hero::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 60%;
    background: linear-gradient(to bottom, transparent, #111111);
  }

  .brutal__identity {
    position: relative;
    background: #111111;
    padding: 0 20px 20px;
    z-index: 2;
  }
  .brutal__avatar-row {
    display: flex;
    align-items: flex-end;
    gap: 16px;
    margin-top: -30px;
    margin-bottom: 12px;
  }
  .brutal__avatar {
    width: 64px;
    height: 64px;
    object-fit: cover;
    border-radius: 0;
    border: 3px solid #f0ece2;
    filter: grayscale(1);
    flex-shrink: 0;
  }
  .brutal__label-stack { padding-bottom: 4px; }
  .brutal__role {
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    color: #888;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 2px;
  }
  .brutal__name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.4rem;
    color: #f0ece2;
    letter-spacing: 0.02em;
    line-height: 1;
  }
  .brutal__org {
    font-size: 0.65rem;
    color: #555;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  /* TAG strip */
  .brutal__tags {
    display: flex;
    gap: 6px;
    padding: 12px 20px;
    background: #111;
    overflow-x: auto;
  }
  .brutal__tag {
    padding: 4px 10px;
    background: transparent;
    border: 1px solid rgba(240,236,226,.2);
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    color: rgba(240,236,226,.5);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    white-space: nowrap;
  }

  /* NAV: big block buttons */
  .brutal__nav {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    border-top: 3px solid #111;
  }
  .brutal__nav-item {
    padding: 14px 8px;
    background: #f0ece2;
    border: none;
    border-right: 2px solid #111;
    cursor: pointer;
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #777;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    transition: background .15s, color .15s;
  }
  .brutal__nav-item:last-child { border-right: none; }
  .brutal__nav-item svg {
    width: 16px;
    height: 16px;
    stroke: currentColor;
    fill: none;
    stroke-width: 2;
  }
  .brutal__nav-item--active {
    background: #111;
    color: #f0ece2;
  }
  .brutal__nav-counter {
    font-size: 0.5rem;
    color: #ff3b30;
    font-family: 'Space Mono', monospace;
  }
  .brutal__nav-item--active .brutal__nav-counter { color: #ff6b6b; }

  /* BODY */
  .brutal__body { background: #f0ece2; }
  .brutal__tab { display: none; }
  .brutal__tab--active { display: block; }

  /* contact tab */
  .brutal__contact {
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 0;
  }
  .brutal__action {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 16px 0;
    border-bottom: 1px solid rgba(17,17,17,.12);
    text-decoration: none;
    cursor: pointer;
    background: transparent;
    border-top: none;
    border-left: none;
    border-right: none;
    font-family: 'Space Mono', monospace;
    width: 100%;
    text-align: left;
    transition: padding-left .2s;
  }
  .brutal__action:hover { padding-left: 6px; }
  .brutal__action:first-child { padding-top: 0; }
  .brutal__action-icon {
    width: 32px;
    height: 32px;
    background: #111;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .brutal__action-icon svg {
    width: 14px;
    height: 14px;
    stroke: #f0ece2;
    fill: none;
    stroke-width: 2;
  }
  .brutal__action-icon img {
    width: 16px;
    height: 16px;
    filter: brightness(0) invert(1);
  }
  .brutal__action-icon--cta { background: #ff3b30; }
  .brutal__action-label {
    font-size: 0.75rem;
    font-weight: 700;
    color: #111;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .brutal__action-sub {
    font-size: 0.6rem;
    color: #888;
    margin-top: 1px;
    letter-spacing: 0.04em;
  }
  .brutal__action-arrow {
    margin-left: auto;
    font-size: 0.9rem;
    color: #bbb;
  }

  /* empresa tab */
  .brutal__empresa { padding: 20px; }
  .brutal__section-head {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem;
    color: #111;
    letter-spacing: 0.03em;
    border-bottom: 3px solid #111;
    padding-bottom: 6px;
    margin-bottom: 16px;
  }
  .brutal__service-card {
    border: 2px solid #111;
    margin-bottom: 14px;
  }
  .brutal__service-img {
    width: 100%;
    height: 100px;
    object-fit: cover;
    filter: grayscale(.5);
    display: block;
  }
  .brutal__service-body { padding: 12px; }
  .brutal__service-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.2rem;
    color: #111;
    letter-spacing: 0.02em;
  }
  .brutal__service-desc {
    font-size: 0.65rem;
    color: #666;
    margin-top: 4px;
    line-height: 1.5;
    letter-spacing: 0.03em;
  }
  .brutal__service-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 10px;
  }
  .brutal__service-price {
    font-size: 0.8rem;
    font-weight: 700;
    color: #ff3b30;
  }
  .brutal__service-cta {
    padding: 6px 14px;
    background: #111;
    color: #f0ece2;
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    text-decoration: none;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .brutal__location-block {
    border: 2px solid #111;
    text-decoration: none;
    display: block;
  }
  .brutal__location-img {
    width: 100%;
    height: 80px;
    object-fit: cover;
    filter: grayscale(1);
    display: block;
  }
  .brutal__location-label {
    padding: 8px 12px;
    background: #111;
    color: #f0ece2;
    font-size: 0.62rem;
    font-family: 'Space Mono', monospace;
    display: flex;
    align-items: center;
    gap: 6px;
    letter-spacing: 0.06em;
  }
  .brutal__location-label svg {
    width: 12px;
    height: 12px;
    stroke: #ff3b30;
    fill: none;
    stroke-width: 2;
  }

  /* redes tab */
  .brutal__redes { padding: 20px; }
  .brutal__social-row {
    display: flex;
    align-items: center;
    padding: 14px 0;
    border-bottom: 1px solid rgba(17,17,17,.1);
    text-decoration: none;
    gap: 12px;
  }
  .brutal__social-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem;
    color: rgba(17,17,17,.12);
    width: 32px;
    text-align: right;
    line-height: 1;
  }
  .brutal__social-icon {
    width: 28px;
    height: 28px;
  }
  .brutal__social-name {
    font-size: 0.65rem;
    font-weight: 700;
    color: #111;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  .brutal__social-handle {
    font-size: 0.6rem;
    color: #888;
  }
  .brutal__social-arrow {
    margin-left: auto;
    color: #ccc;
    font-size: 0.8rem;
  }
</style>

<div class="card--brutal">
  <div class="brutal__hero">
    <!-- Cover bindeado automáticamente a la imagen cover -->
    <div class="brutal__cover" data-bind-bg="profile.cover" style="width: 100%; height: 220px; background-size: cover; background-position: center; filter: grayscale(1) contrast(1.1);"></div>
  </div>
  
  <div class="brutal__identity">
    <div class="brutal__avatar-row">
      <img
        class="brutal__avatar"
        data-bind-src="profile.photo"
        alt="Foto"
      />
      <div class="brutal__label-stack">
        <p class="brutal__role" data-bind="profile.title">Cargando Cargo...</p>
        <h1 class="brutal__name" data-bind="profile.name">Cargando Nombre</h1>
        <p class="brutal__org" data-bind="profile.org">Cargando Empresa</p>
      </div>
    </div>
  </div>

  <div class="brutal__tags">
    <span class="brutal__tag">Marketing</span>
    <span class="brutal__tag">Tecnología</span>
    <span class="brutal__tag">Lujo</span>
  </div>

  <nav class="brutal__nav">
    <button class="brutal__nav-item brutal__nav-item--active" data-brutal-tab="contacto">
      <svg viewBox="0 0 24 24">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
        <circle cx="12" cy="7" r="4" />
      </svg>
      Contacto
      <span class="brutal__nav-counter">01</span>
    </button>
    <button class="brutal__nav-item" data-brutal-tab="empresa">
      <svg viewBox="0 0 24 24">
        <rect x="2" y="7" width="20" height="14" rx="2" />
        <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16" />
      </svg>
      Empresa
      <span class="brutal__nav-counter">02</span>
    </button>
  </nav>

  <div class="brutal__body">
    <!-- Pestaña Contacto -->
    <div class="brutal__tab brutal__tab--active" id="brutal-contacto">
      <div class="brutal__contact">
        <button class="brutal__action" id="brutal-vcf">
          <div class="brutal__action-icon brutal__action-icon--cta">
            <svg viewBox="0 0 24 24">
              <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 1.27h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.37a16 16 0 0 0 5.73 5.73l1.48-1.48a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 14.92v2z" />
              <line x1="18" y1="2" x2="18" y2="8" />
              <line x1="15" y1="5" x2="21" y2="5" />
            </svg>
          </div>
          <div>
            <p class="brutal__action-label">Agregar contacto</p>
            <p class="brutal__action-sub">Guardar en móvil (.vcf)</p>
          </div>
          <span class="brutal__action-arrow">→</span>
        </button>

        <a class="brutal__action" data-bind-href="profile.website" target="_blank" rel="noopener">
          <div class="brutal__action-icon">
            <svg viewBox="0 0 24 24">
              <circle cx="12" cy="12" r="10" />
              <line x1="2" y1="12" x2="22" y2="12" />
              <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z" />
            </svg>
          </div>
          <div>
            <p class="brutal__action-label">Sitio Web</p>
            <p class="brutal__action-sub" data-bind="profile.website">sitio.com</p>
          </div>
          <span class="brutal__action-arrow">→</span>
        </a>
      </div>
    </div>

    <!-- Pestaña Empresa -->
    <div class="brutal__tab" id="brutal-empresa" style="display: none;">
      <div class="brutal__empresa">
        <p class="brutal__section-head" data-bind="empresa.name">Cargando...</p>
        <div class="brutal__service-card">
          <div class="brutal__service-body">
            <p class="brutal__service-name" data-bind="empresa.tagline">Tagline...</p>
            <p class="brutal__service-desc">Sitio corporativo y portafolio de servicios digitalizados.</p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
