<!-- Plantilla: Deco Card (Art Déco Casing with Tabs) -->
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=IBM+Plex+Mono:wght@300;400;500&display=swap');

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card--deco {
    display: block;
    width: 100%;
    max-width: 420px;
    background: #120f08;
    border: 1px solid rgba(212,168,67,.3);
    position: relative;
    box-shadow: 0 0 0 1px rgba(212,168,67,.15), 0 32px 80px rgba(0,0,0,.7);
    font-family: 'IBM Plex Mono', monospace;
    overflow: hidden;
  }
  .card--deco::before {
    content: '';
    position: absolute;
    inset: 6px;
    border: 1px solid rgba(212,168,67,.12);
    pointer-events: none;
    z-index: 1;
  }

  .deco__media {
    position: relative;
    height: 175px;
  }
  .deco__cover {
    width: 100%;
    height: 175px;
    object-fit: cover;
    display: block;
  }
  .deco__media::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, rgba(12,10,6,0), rgba(12,10,6,.65));
  }
  .deco__avatar {
    position: absolute;
    bottom: -45px;
    left: 50%;
    transform: translateX(-50%);
    width: 90px;
    height: 90px;
    clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
    border: none;
    object-fit: cover;
    outline: 2px solid #d4a843;
    outline-offset: 4px;
    z-index: 2;
  }

  .deco__profile {
    margin-top: 58px;
    padding: 0 28px 20px;
    text-align: center;
  }
  .deco__name {
    font-family: 'Cinzel Decorative', serif;
    font-size: 1.25rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #d4a843;
  }
  .deco__role {
    font-size: 0.65rem;
    font-weight: 400;
    text-transform: uppercase;
    letter-spacing: 0.22em;
    color: #d4a843;
    opacity: 0.7;
    margin-top: 4px;
  }
  .deco__org {
    font-size: 0.75rem;
    color: #8a7550;
    margin-top: 3px;
  }
  .deco__profile::after {
    content: '◆ ◇ ◆';
    display: block;
    margin-top: 12px;
    color: rgba(212,168,67,.35);
    font-size: 0.55rem;
    letter-spacing: 0.5em;
  }
  .deco__bio {
    font-size: 0.76rem;
    color: #8a7550;
    margin-top: 10px;
    line-height: 1.6;
  }

  .deco__nav {
    display: flex;
    background: rgba(12,10,6,.96);
    border-top: 1px solid rgba(212,168,67,.2);
    border-bottom: 1px solid rgba(212,168,67,.2);
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .deco__nav-item {
    flex: 1;
    padding: 13px 4px 10px;
    background: none;
    border: none;
    cursor: pointer;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.6rem;
    font-weight: 400;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #8a7550;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    border-bottom: 1px solid transparent;
    transition: color .2s, border-color .2s;
  }
  .deco__nav-item svg {
    width: 17px;
    height: 17px;
    stroke: currentColor;
    fill: none;
    stroke-width: 1.5;
  }
  .deco__nav-item--active {
    color: #d4a843;
    border-bottom-color: #d4a843;
  }

  .deco__body { min-height: 240px; }
  .deco__tab {
    display: none;
    padding: 24px;
    animation: fadeIn .2s ease;
  }
  .deco__tab--active { display: block; }

  .deco__btn {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 13px 16px;
    border: 1px solid rgba(212,168,67,.2);
    background: #1c1710;
    text-decoration: none;
    cursor: pointer;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.75rem;
    color: #f5e6c8;
    margin-bottom: 8px;
    transition: border-color .2s;
    width: 100%;
    text-align: left;
  }
  .deco__btn:hover { border-color: #d4a843; }
  .deco__btn--cta {
    background: rgba(212,168,67,.1);
    border-color: rgba(212,168,67,.4);
    color: #d4a843;
    font-weight: 700;
    letter-spacing: 0.08em;
  }
  .deco__btn svg {
    width: 16px;
    height: 16px;
    stroke: #d4a843;
    fill: none;
    stroke-width: 1.5;
    flex-shrink: 0;
    opacity: 0.8;
  }
  .deco__btn img {
    width: 18px;
    height: 18px;
    flex-shrink: 0;
    filter: brightness(.7) sepia(1) saturate(3) hue-rotate(10deg);
  }
  .deco__btn-label { flex: 1; }
  .deco__btn-arrow { color: rgba(212,168,67,.25); }

  .deco__company {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px;
    background: #1c1710;
    border: 1px solid rgba(212,168,67,.15);
    margin-bottom: 14px;
  }
  .deco__company img.logo {
    width: 44px;
    height: 44px;
    border: 1px solid rgba(212,168,67,.2);
  }
  .deco__company-name {
    font-family: 'Cinzel Decorative', serif;
    font-size: 0.85rem;
    font-weight: 700;
    color: #d4a843;
    letter-spacing: 0.06em;
  }
  .deco__company-tag {
    font-size: 0.65rem;
    color: #8a7550;
    font-style: italic;
    margin-top: 3px;
  }

  .deco__location {
    border: 1px solid rgba(212,168,67,.15);
    text-decoration: none;
    display: block;
  }
  .deco__location img {
    width: 100%;
    height: 80px;
    object-fit: cover;
    filter: sepia(.5) brightness(.6);
    display: block;
  }
  .deco__location-label {
    padding: 8px 12px;
    background: #1c1710;
    font-size: 0.7rem;
    color: #8a7550;
    display: flex;
    align-items: center;
    gap: 6px;
    letter-spacing: 0.04em;
  }
  .deco__location-label svg {
    width: 12px;
    height: 12px;
    stroke: #d4a843;
    fill: none;
    stroke-width: 2;
  }

  .deco__social {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 14px;
    border: 1px solid rgba(212,168,67,.15);
    background: #1c1710;
    text-decoration: none;
    margin-bottom: 8px;
    transition: border-color .15s;
  }
  .deco__social:hover { border-color: rgba(212,168,67,.4); }
  .deco__social img {
    width: 22px;
    height: 22px;
    filter: brightness(.6) sepia(1) saturate(2) hue-rotate(10deg);
  }
  .deco__social-net {
    font-size: 0.6rem;
    font-weight: 400;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: #d4a843;
  }
  .deco__social-handle {
    font-size: 0.75rem;
    color: #8a7550;
  }
  .deco__social-info { flex: 1; }
  .deco__social-arrow { color: rgba(212,168,67,.2); }
</style>

<div class="card--deco">
  <div class="deco__media">
    <div class="deco__cover" data-bind-bg="profile.cover" style="width: 100%; height: 155px; background-size: cover; background-position: center; filter: sepia(0.4) brightness(0.7);"></div>
    <img
      class="deco__avatar"
      data-bind-src="profile.photo"
      alt="Avatar"
    />
  </div>
  
  <div class="deco__profile">
    <h1 class="deco__name" data-bind="profile.name">Cargando...</h1>
    <p class="deco__role" data-bind="profile.title">Cargando...</p>
    <p class="deco__org" data-bind="profile.org">Cargando...</p>
    <p class="deco__bio" data-bind="profile.bio">Cargando bio...</p>
  </div>

  <nav class="deco__nav">
    <button class="deco__nav-item deco__nav-item--active" data-deco-tab="contacto">
      <svg viewBox="0 0 24 24">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
        <circle cx="12" cy="7" r="4" />
      </svg>
      Contacto
    </button>
    <button class="deco__nav-item" data-deco-tab="empresa">
      <svg viewBox="0 0 24 24">
        <rect x="2" y="7" width="20" height="14" rx="2" />
        <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16" />
      </svg>
      Empresa
    </button>
  </nav>

  <div class="deco__body">
    <!-- Pestaña Contacto -->
    <div class="deco__tab deco__tab--active" id="deco-contacto">
      <button class="deco__btn deco__btn--cta" id="deco-vcf" style="width: 100%; cursor: pointer;">
        <svg viewBox="0 0 24 24">
          <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 1.27h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.37a16 16 0 0 0 5.73 5.73l1.48-1.48a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 14.92v2z" />
          <line x1="18" y1="2" x2="18" y2="8" />
          <line x1="15" y1="5" x2="21" y2="5" />
        </svg>
        <span class="deco__btn-label">Agregar contacto al móvil</span>
        <span class="deco__btn-arrow">›</span>
      </button>
      
      <a class="deco__btn" data-bind-href="profile.website" target="_blank" rel="noopener" style="border-bottom: none;">
        <svg viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="10" />
          <line x1="2" y1="12" x2="22" y2="12" />
          <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z" />
        </svg>
        <span class="deco__btn-label">Página Web</span>
        <span class="deco__btn-arrow">›</span>
      </a>
    </div>

    <!-- Pestaña Empresa -->
    <div class="deco__tab" id="deco-empresa" style="display: none;">
      <div class="deco__company">
        <img class="logo" data-bind-src="empresa.logo" alt="Logo" />
        <div>
          <p class="deco__company-name" data-bind="empresa.name">Cargando...</p>
          <p class="deco__company-tag" data-bind="empresa.tagline">Cargando...</p>
        </div>
      </div>
    </div>
  </div>
</div>
