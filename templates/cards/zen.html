<!-- Plantilla: Zen Card (Japanese Minimalist Tabs) -->
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400&family=Josefin+Sans:wght@300;400;600&display=swap');

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card--zen {
    display: block;
    width: 100%;
    max-width: 420px;
    background: #fefcf8;
    border-radius: 4px;
    border-left: 2px solid #c0392b;
    box-shadow: 0 1px 0 rgba(28,24,17,.06), 0 12px 40px rgba(28,24,17,.07);
    font-family: 'Josefin Sans', sans-serif;
    overflow: hidden;
  }

  .zen__media {
    position: relative;
    height: 155px;
  }
  .zen__cover {
    width: 100%;
    height: 155px;
    object-fit: cover;
    filter: saturate(0.6);
    display: block;
  }
  .zen__avatar {
    position: absolute;
    bottom: -42px;
    left: 50%;
    transform: translateX(-50%);
    width: 84px;
    height: 84px;
    border-radius: 2px;
    border: 1px solid rgba(28,24,17,.18);
    object-fit: cover;
    z-index: 2;
  }

  .zen__profile {
    margin-top: 54px;
    padding: 0 24px 20px;
    text-align: center;
  }
  .zen__profile::before {
    content: '一';
    display: block;
    font-family: 'Noto Serif JP', serif;
    font-size: 1.5rem;
    color: rgba(192,57,43,.15);
    margin-bottom: -8px;
  }
  .zen__name {
    font-family: 'Noto Serif JP', serif;
    font-size: 1.5rem;
    font-weight: 300;
    letter-spacing: 0.12em;
    color: #1c1811;
  }
  .zen__role {
    font-size: 0.68rem;
    font-weight: 400;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: #c0392b;
    margin-top: 4px;
  }
  .zen__org {
    font-size: 0.78rem;
    color: #9a8e7e;
    margin-top: 2px;
  }
  .zen__bio {
    font-size: 0.76rem;
    color: #9a8e7e;
    margin-top: 10px;
    line-height: 1.7;
    letter-spacing: 0.04em;
  }

  .zen__nav {
    display: flex;
    background: rgba(254,252,248,.92);
    border-top: 1px solid rgba(28,24,17,.08);
    border-bottom: 1px solid rgba(28,24,17,.08);
    position: sticky;
    top: 0;
    z-index: 10;
    backdrop-filter: blur(12px);
  }
  .zen__nav-item {
    flex: 1;
    padding: 10px 4px 13px;
    background: none;
    border: none;
    cursor: pointer;
    font-family: 'Josefin Sans', sans-serif;
    font-size: 0.68rem;
    font-weight: 400;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #9a8e7e;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    border-top: 2px solid transparent;
    transition: color .2s, border-color .2s;
  }
  .zen__nav-item svg {
    width: 16px;
    height: 16px;
    stroke: currentColor;
    fill: none;
    stroke-width: 1.5;
  }
  .zen__nav-item--active {
    color: #c0392b;
    border-top-color: #c0392b;
  }

  .zen__body { min-height: 240px; }
  .zen__tab {
    display: none;
    padding: 24px;
    animation: fadeIn .2s ease;
  }
  .zen__tab--active { display: block; }

  .zen__btn {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 13px 0;
    border-bottom: 1px solid rgba(28,24,17,.07);
    text-decoration: none;
    cursor: pointer;
    font-family: 'Josefin Sans', sans-serif;
    font-size: 0.8rem;
    color: #1c1811;
    background: none;
    border-top: none;
    border-left: none;
    border-right: none;
    width: 100%;
    text-align: left;
    letter-spacing: 0.03em;
    transition: padding-left .2s;
  }
  .zen__btn:hover {
    padding-left: 4px;
    color: #c0392b;
  }
  .zen__btn:first-child { padding-top: 0; }
  .zen__btn--cta {
    color: #c0392b;
    font-weight: 600;
  }
  .zen__btn svg {
    width: 16px;
    height: 16px;
    stroke: currentColor;
    fill: none;
    stroke-width: 1.5;
    flex-shrink: 0;
  }
  .zen__btn img {
    width: 18px;
    height: 18px;
    flex-shrink: 0;
    opacity: 0.7;
  }
  .zen__btn-label { flex: 1; }
  .zen__btn-arrow {
    color: rgba(28,24,17,.2);
    font-size: 0.8rem;
  }

  .zen__company {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px;
    background: #f2ede5;
    border-radius: 3px;
    margin-bottom: 14px;
    border-left: 2px solid #c0392b;
  }
  .zen__company img.logo {
    width: 40px;
    height: 40px;
    border-radius: 3px;
  }
  .zen__company-name {
    font-family: 'Noto Serif JP', serif;
    font-size: 1rem;
    font-weight: 400;
    color: #1c1811;
  }
  .zen__company-tag {
    font-size: 0.7rem;
    color: #9a8e7e;
    font-style: italic;
    margin-top: 2px;
  }

  .zen__location {
    border: 1px solid rgba(28,24,17,.08);
    text-decoration: none;
    display: block;
  }
  .zen__location img {
    width: 100%;
    height: 80px;
    object-fit: cover;
    filter: saturate(.4);
    display: block;
  }
  .zen__location-label {
    padding: 8px 12px;
    background: #f2ede5;
    font-size: 0.72rem;
    color: #9a8e7e;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .zen__location-label svg {
    width: 12px;
    height: 12px;
    stroke: #c0392b;
    fill: none;
    stroke-width: 2;
  }

  .zen__social {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 0;
    border-bottom: 1px solid rgba(28,24,17,.07);
    text-decoration: none;
    transition: padding-left .15s;
  }
  .zen__social:hover { padding-left: 4px; }
  .zen__social:last-child { border-bottom: none; }
  .zen__social img {
    width: 22px;
    height: 22px;
    border-radius: 4px;
    opacity: 0.7;
  }
  .zen__social-net {
    font-size: 0.65rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #c0392b;
  }
  .zen__social-handle {
    font-size: 0.78rem;
    color: #9a8e7e;
  }
  .zen__social-info { flex: 1; }
  .zen__social-arrow { color: rgba(28,24,17,.15); }
</style>

<div class="card--zen">
  <div class="zen__media">
    <div class="zen__cover nfc_cover" data-bind-bg="profile.cover" style="width: 100%; height: 155px; background-size: cover; background-position: center; filter: saturate(0.6);"></div>
    <img
      class="zen__avatar"
      data-bind-src="profile.photo"
      alt="Avatar"
    />
  </div>
  
  <div class="zen__profile">
    <h1 class="zen__name" data-bind="profile.name">Cargando...</h1>
    <p class="zen__role" data-bind="profile.title">Cargando...</p>
    <p class="zen__org" data-bind="profile.org">Cargando...</p>
    <p class="zen__bio" data-bind="profile.bio">Cargando bio...</p>
  </div>

  <nav class="zen__nav">
    <button class="zen__nav-item zen__nav-item--active" data-zen-tab="contacto">
      <svg viewBox="0 0 24 24">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
        <circle cx="12" cy="7" r="4" />
      </svg>
      Contacto
    </button>
    <button class="zen__nav-item" data-zen-tab="empresa">
      <svg viewBox="0 0 24 24">
        <rect x="2" y="7" width="20" height="14" rx="2" />
        <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16" />
      </svg>
      Empresa
    </button>
  </nav>

  <div class="zen__body">
    <!-- Pestaña Contacto -->
    <div class="zen__tab zen__tab--active" id="zen-contacto">
      <button class="zen__btn zen__btn--cta" id="zen-vcf" style="width: 100%; border-top: none; border-left: none; border-right: none; cursor: pointer; background: none; padding-top: 0;">
        <svg viewBox="0 0 24 24">
          <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 1.27h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.37a16 16 0 0 0 5.73 5.73l1.48-1.48a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 14.92v2z" />
          <line x1="18" y1="2" x2="18" y2="8" />
          <line x1="15" y1="5" x2="21" y2="5" />
        </svg>
        <span class="zen__btn-label">Agregar contacto al móvil</span>
        <span class="zen__btn-arrow">›</span>
      </button>
      
      <a class="zen__btn" data-bind-href="profile.website" target="_blank" rel="noopener" style="border-bottom: none;">
        <svg viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="10" />
          <line x1="2" y1="12" x2="22" y2="12" />
          <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z" />
        </svg>
        <span class="zen__btn-label">Página Web</span>
        <span class="zen__btn-arrow">›</span>
      </a>
    </div>

    <!-- Pestaña Empresa -->
    <div class="zen__tab" id="zen-empresa" style="display: none;">
      <div class="zen__company">
        <img class="logo" data-bind-src="empresa.logo" alt="Logo" />
        <div>
          <p class="zen__company-name" data-bind="empresa.name">Cargando...</p>
          <p class="zen__company-tag" data-bind="empresa.tagline">Cargando...</p>
        </div>
      </div>
    </div>
  </div>
</div>
