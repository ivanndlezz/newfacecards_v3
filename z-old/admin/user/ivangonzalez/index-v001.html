    <script>
      const DOM_CONST = {
        statusStorage: "#data-status-storage",
      };

      document.addEventListener("DOMContentLoaded", () => {
        // Seleccionamos el contenedor principal
        const pildora = document.getElementById("mi-pildora");

        // Seleccionamos los botones de acción dentro de la píldora
        const btnEdit = pildora.querySelector(".btn-edit");
        const btnDone = pildora.querySelector(".btn-done");
        const btnSatellite = pildora.querySelector(".btn-satellite");

        // Instancia del Bottom Sheet global
        window.appBottomSheet = null;

        // Importar dinámicamente el componente Bottom Sheet
        import("/shared/components/bottom-sheet/bottom-sheet.js").then(
          (mod) => {
            window.appBottomSheet = new mod.BottomSheet(
              "main-sheet",
              "main-backdrop",
            ).hydrate();
            window.constructBottomSheet = mod.constructSheet;
            window.appBottomSheetClose = mod.closeSheet;
          },
        );

        // ------------------------------------------------------------
        // Credential validation – ensure both user ID and API token exist
        // ------------------------------------------------------------
        function ensureDevCredentials() {
          // Check both generic keys and dev‑specific keys
          const uid =
            localStorage.getItem("user id") ||
            localStorage.getItem("devUserId");
          const token =
            localStorage.getItem("apiToken") ||
            localStorage.getItem("devApiKey");
          if (!uid || !token) {
            // Build a simple bottom‑sheet content with inputs
            const sheetContent = `
              <div class="test-content">
                <label style="display:block;margin-bottom:8px;">User ID:
                  <input type="number" id="credUserId" value="${uid ?? ""}" style="width:100%;margin-top:4px;" />
                </label>
                <label style="display:block;margin-bottom:12px;">API Token:
                  <input type="text" id="credApiToken" value="${token ?? ""}" style="width:100%;margin-top:4px;" />
                </label>
                <button id="credSaveBtn" style="padding:8px 16px;background:#0f876c;color:white;border:none;border-radius:6px;cursor:pointer;">Guardar</button>
              </div>`;

            // Open the bottom sheet using the existing construct function
            if (typeof window.constructBottomSheet === "function") {
              window.constructBottomSheet({
                title: "Configuración de Credenciales",
                scope: "dev-credentials",
                content: sheetContent,
                bottom_actions: {
                  layout: "single",
                  primary: { label: "Cerrar", callback: "close" },
                },
              });
            }

            // Attach save handler after sheet is rendered
            setTimeout(() => {
              const saveBtn = document.getElementById("credSaveBtn");
              if (saveBtn) {
                saveBtn.addEventListener("click", () => {
                  const newUid = document
                    .getElementById("credUserId")
                    .value.trim();
                  const newToken = document
                    .getElementById("credApiToken")
                    .value.trim();
                  if (newUid && newToken) {
                    localStorage.setItem("devUserId", newUid);
                    localStorage.setItem("devApiKey", newToken);
                    // Update the running storage instance if present
                    if (window.appBipartiteStorage) {
                      window.appBipartiteStorage.userId = Number(newUid);
                      window.appBipartiteStorage.apiKey = newToken;
                    }
                    // Close the sheet
                    if (window.appBottomSheetClose)
                      window.appBottomSheetClose();
                  }
                });
              }
            }, 0);
          }
        }

        // Call the check once the bottom‑sheet module has loaded
        const maybeInitCredCheck = () => {
          if (typeof window.constructBottomSheet === "function") {
            ensureDevCredentials();
          } else {
            // Retry shortly if the module is still loading
            setTimeout(maybeInitCredCheck, 100);
          }
        };
        // Trigger after a short delay to give the import a chance to resolve
        setTimeout(maybeInitCredCheck, 200);
        // Evento para activar el modo edición
        btnEdit.addEventListener("click", () => {
          pildora.classList.add("is-active");
          document
            .querySelector(DOM_CONST.statusStorage)
            .setAttribute("data-card-status", "editing");
        });

        // Evento para finalizar la edición (Listo)
        btnDone.addEventListener("click", () => {
          pildora.classList.remove("is-active");
          document
            .querySelector(DOM_CONST.statusStorage)
            .setAttribute("data-card-status", "pasive");
        });

        // Evento para el botón satélite (puedes agregar tu lógica aquí)
        btnSatellite.addEventListener("click", () => {
          console.log("Botón satélite clickeado / Añadir");
        });

        // Evento para abrir el panel de edición al hacer clic en un .edit-element
        document.addEventListener("click", (e) => {
          const editBtn = e.target.closest(".edit-element");
          if (editBtn) {
            e.preventDefault();
            e.stopPropagation();

            const scope = editBtn.getAttribute("data-scope");

            if (window.appBottomSheet) {
              window.appBottomSheet.open();
            }

            const editorScroll = document.getElementById("editorScroll");
            if (editorScroll) {
              let targetEl = null;
              if (scope === "avt__edit") {
                targetEl = document.getElementById("ctrlGroupAvatar");
              } else if (scope === "mobile_cover_input") {
                targetEl = document.getElementById("ctrlGroupCover");
              }

              if (targetEl) {
                setTimeout(() => {
                  editorScroll.scrollTo({
                    top: targetEl.offsetTop - 10,
                    behavior: "smooth",
                  });
                }, 150);
              }
            }
          }
        });
      });
    </script>
    <script>
      // ==========================================
      // klef-profile-controller.js
      // Arquitectura declarativa — Klef Agency
      // ==========================================

      /*
       * ==========================================================================
       * REGLAS DE ARQUITECTURA UI
       *
       * Patrones:
       * - JS expresa estado con atributos data-*.
       * - CSS decide como se ve cada estado.
       * - Las variables CSS son validas para valores vivos de controles
       *   como --avatar-size o --avatar-radius.
       * - El display base de un componente pertenece al CSS.
       *
       * Antipatrones:
       * - No usar estilos inline hardcoded para comportamiento.
       * - No usar el.style.display = "block" para mostrar componentes.
       *   Si el componente es flex/grid, eso rompe su layout interno.
       * - No esconder/mostrar paneles con style="" cuando puede usarse
       *   data-status="hidden|active|ready".
       * - No mezclar estado en class="" si ya existe un atributo data-*.
       *
       * Ejemplo:
       * Correcto: panel.dataset.status = "active"
       * Incorrecto: panel.style.display = "block"
       * ==========================================================================
       */

      // ==========================================
      // 1. CONTROL SCHEMA — único lugar de verdad
      //    Agregar un control = un objeto en este array.
      //    El motor no necesita ningún cambio.
      // ==========================================
      const CONTROLS = [
        // --- Grupo: avatar ---
        {
          id: "ctrl-size",
          group: "avatar",
          label: "Tamaño Avatar",
          type: "range",
          targetId: "profileContent",
          unit: "px",
          min: 40,
          max: 160,
          initial: 100,
          onChange(val, target) {
            const container = document.getElementById("avatarContainer");
            if (container) {
              container.style.setProperty("--avatar-size", `${val}px`);
            }
            const radiusInput = document.getElementById("ctrl-radius-input");
            if (radiusInput) {
              radiusInput.max = val;
              if (Number(radiusInput.value) > Number(val)) {
                radiusInput.value = val;
                radiusInput.dispatchEvent(
                  new Event("input", { bubbles: true }),
                );
              }
            }
          },
        },

        {
          id: "ctrl-radius",
          group: "avatar",
          label: "Radio Avatar",
          type: "range",
          targetId: "avatarContainer",
          unit: "px",
          min: 0,
          max: 100,
          initial: 50,
          onChange(val, target) {
            target.style.setProperty("--avatar-radius", `${val}px`);
          },
        },

        {
          id: "ctrl-padding",
          group: "avatar",
          label: "Padding Avatar",
          type: "range",
          targetId: "avatarContainer",
          unit: "px",
          min: 0,
          max: 24,
          initial: 0,
          onChange(val, target) {
            target.style.padding = val + "px";
            target.style.boxSizing = "border-box";
          },
        },

        {
          id: "ctrl-mock-border-scale",
          group: "avatar",
          label: "Mock Border (escala)",
          type: "range",
          targetId: "avatarContainer",
          unit: "",
          min: 1,
          max: 1.2,
          step: 0.01,
          initial: 1.05,
          onChange(val, target) {
            target.style.setProperty("--mock-border-scale", val);
          },
        },

        // --- Grupo: cover-inset (solo visible cuando cover-style === 'inset') ---
        {
          id: "ctrl-cover-width",
          group: "cover-inset",
          label: "Ancho Portada",
          type: "range",
          targetId: "coverWrap",
          cssProp: "width",
          unit: "%",
          min: 50,
          max: 100,
          initial: 90,
        },

        {
          id: "ctrl-cover-height",
          group: "cover-inset",
          label: "Alto Portada",
          type: "range",
          targetId: "coverWrap",
          cssProp: "height",
          unit: "px",
          min: 60,
          max: 250,
          initial: 120,
        },

        {
          id: "ctrl-cover-radius",
          group: "cover-inset",
          label: "Redondeo Esquinas",
          type: "range",
          targetId: "coverWrap",
          cssProp: "borderRadius",
          unit: "px",
          min: 0,
          max: 40,
          initial: 12,
        },

        {
          id: "ctrl-cover-fit",
          group: "cover-inset",
          label: "Ajuste de imagen",
          type: "select",
          targetId: "profileCover",
          cssProp: "objectFit",
          initial: "cover",
          options: [
            { label: "Recortar (Cover)", value: "cover" },
            { label: "Contener (Contain)", value: "contain" },
            { label: "Rellenar (Fill)", value: "fill" },
          ],
        },

        {
          id: "ctrl-cover-shadow",
          group: "cover-inset",
          label: "Sombra de Portada",
          type: "checkbox",
          targetId: "coverWrap",
          cssProp: "boxShadow",
          trueValue: "0 8px 24px rgba(0,0,0,0.15)",
          falseValue: "none",
          initial: false,
        },
      ];

      // ==========================================
      // 2. CONTROL FACTORY — motor puro
      //    No conoce ningún control por nombre.
      //    Solo sabe leer la configuración y actuar.
      // ==========================================
      const ControlFactory = {
        /**
         * Construye todos los controles de un grupo e inyecta en el contenedor.
         * @param {string}      group     — nombre del grupo definido en CONTROLS
         * @param {HTMLElement} container — elemento donde se inyectarán los inputs
         */
        buildGroup(group, container) {
          if (!container) return;
          CONTROLS.filter((cfg) => cfg.group === group).forEach((cfg) => {
            const el = this._build(cfg);
            if (el) container.appendChild(el);
          });
        },

        /** Construye y vincula un control individual */
        _build(cfg) {
          const target = document.getElementById(cfg.targetId);
          if (!target) return null;

          const wrap = document.createElement("div");
          wrap.className = "control-row";

          if (cfg.type === "checkbox") {
            wrap.innerHTML = `
        <div class="checkbox-wrap">
          <span class="control-label" style="margin:0">${cfg.label}</span>
          ${this._renderInput(cfg)}
        </div>`;
          } else {
            const unit = cfg.unit || "";
            wrap.innerHTML = `
        <div class="control-label-wrap">
          <span class="control-label">${cfg.label}</span>
          <span class="control-value" id="${cfg.id}-val">
            ${cfg.type !== "select" ? cfg.initial + unit : ""}
          </span>
        </div>
        ${this._renderInput(cfg)}`;
          }

          const input = wrap.querySelector("input, select");
          input.addEventListener("input", (e) => {
            const raw =
              cfg.type === "checkbox" ? e.target.checked : e.target.value;
            this._applyCSS(cfg, target, raw);
            this._updateDisplay(wrap, cfg, raw);
            if (cfg.onChange) cfg.onChange(raw, target);
            if (window.appBipartiteStorage) {
              window.appBipartiteStorage.updateControlValue(cfg.id, raw);
            }
          });

          return wrap;
        },

        /** Aplica la propiedad CSS al target si está configurada */
        _applyCSS(cfg, target, val) {
          if (!cfg.cssProp) return;
          if (cfg.type === "checkbox") {
            target.style[cfg.cssProp] = val
              ? (cfg.trueValue ?? "")
              : (cfg.falseValue ?? "none");
          } else {
            target.style[cfg.cssProp] = val + (cfg.unit || "");
          }
        },

        /** Actualiza el span de valor visible junto al label */
        _updateDisplay(wrap, cfg, val) {
          if (cfg.type === "checkbox" || cfg.type === "select") return;
          const display = wrap.querySelector(`#${cfg.id}-val`);
          if (display) display.textContent = val + (cfg.unit || "");
        },

        /** Genera el HTML del input según el tipo */
        _renderInput(cfg) {
          const id = `${cfg.id}-input`;

          if (cfg.type === "select") {
            const opts = (cfg.options || [])
              .map(
                (o) =>
                  `<option value="${o.value}"${o.value === cfg.initial ? " selected" : ""}>${o.label}</option>`,
              )
              .join("");
            return `<select id="${id}" class="custom-input">${opts}</select>`;
          }

          if (cfg.type === "checkbox") {
            return `<input type="checkbox" id="${id}"${cfg.initial ? " checked" : ""}
        style="accent-color:#09090b;width:16px;height:16px;cursor:pointer">`;
          }

          if (cfg.type === "range") {
            return `<input type="range" class="range-input" id="${id}"
        min="${cfg.min ?? 0}"
        max="${cfg.max ?? 100}"
        step="${cfg.step ?? 1}"
        value="${cfg.initial}">`;
          }

          // Fallback: text, number, email, tel, etc.
          return `<input type="${cfg.type}" id="${id}" class="custom-input"
      placeholder="${cfg.placeholder || ""}"
      value="${cfg.initial || ""}">`;
        },
      };

      // ==========================================
      // 2.1 CONTROL SYNC REGISTRY
      //    Input Adapter -> SSOT -> Design Binder
      // ==========================================
      const ControlSyncRegistry = {
        defs: new Map(),
        storage: null,

        connectStorage(storage) {
          this.storage = storage;
        },

        define(def) {
          if (!def?.id) return;
          const normalized = {
            event: "click",
            valueAttr: "value",
            activeStatus: "active",
            inactiveStatus: "unset",
            statePath: `controls.${def.id}`,
            ...def,
          };
          this.defs.set(normalized.id, normalized);
          if (normalized.root) this.bindInput(normalized.id);
          return normalized;
        },

        bindInput(id) {
          const def = this.defs.get(id);
          const root = document.querySelector(def.root);
          if (!root || root.dataset.syncBound === "true") return;
          root.dataset.syncBound = "true";
          root.addEventListener(def.event, (e) => {
            const item = e.target.closest(`[data-${def.valueAttr}]`);
            if (!item || !root.contains(item)) return;
            const raw = item.dataset[this._dataKey(def.valueAttr)];
            this.setValue(id, this.resolveValue(def, raw));
          });
        },

        setValue(id, value) {
          const def = this.defs.get(id);
          if (!def) return;
          this.writeState(def, value);
          this.applyDesign(def, value);
          this.syncInput(def, value);
          this.syncDisplay(def, value);
        },

        applyControl(id, value) {
          const def = this.defs.get(id);
          if (!def) return;
          this.applyDesign(def, value);
          this.syncInput(def, value);
          this.syncDisplay(def, value);
        },

        applyAll(state) {
          this.defs.forEach((def) => {
            const value = this.readFromState(state, def.statePath);
            if (value !== undefined) this.applyControl(def.id, value);
          });
        },

        writeState(def, value) {
          if (this.storage?.state) {
            if (this.storage.isApplyingState) return;
            const current = this.readFromState(this.storage.state, def.statePath);
            if (String(current) === String(value)) return;
            this.writeToState(this.storage.state, def.statePath, value);
            this.storage.saveLocal();
            return;
          }
          const root = this.storage?.state || window.appState;
          if (!root) return;
          this.writeToState(root, def.statePath, value);
        },

        applyDesign(def, value) {
          const target = document.querySelector(def.target);
          if (!target) return;
          const designValue = this.resolveValue(def, value);
          if (def.cssVar) {
            target.style.setProperty(def.cssVar, `${designValue}${def.unit || ""}`);
          }
          if (def.cssProp) {
            target.style[def.cssProp] = `${designValue}${def.unit || ""}`;
          }
          if (typeof def.onApply === "function") def.onApply(designValue, target);
        },

        syncInput(def, value) {
          const root = document.querySelector(def.root);
          if (!root) return;
          root.querySelectorAll(`[data-${def.valueAttr}]`).forEach((item) => {
            const raw = item.dataset[this._dataKey(def.valueAttr)];
            const itemValue = this.resolveValue(def, raw);
            item.dataset.status =
              String(itemValue) === String(value)
                ? def.activeStatus
                : def.inactiveStatus;
          });
        },

        syncDisplay(def, value) {
          const display = document.getElementById(`${def.id}-val`);
          if (display) display.textContent = `${value}${def.unit || ""}`;
        },

        resolveValue(def, raw) {
          if (def.values && Object.hasOwn(def.values, raw)) return def.values[raw];
          return raw;
        },

        readFromState(state, path) {
          return path.split(".").reduce((acc, key) => acc?.[key], state);
        },

        writeToState(state, path, value) {
          const parts = path.split(".");
          const last = parts.pop();
          const owner = parts.reduce((acc, key) => {
            acc[key] = acc[key] || {};
            return acc[key];
          }, state);
          owner[last] = value;
        },

        _dataKey(attr) {
          return attr.replace(/-([a-z])/g, (_, char) => char.toUpperCase());
        },
      };
      window.ControlSyncRegistry = ControlSyncRegistry;

      // ==========================================
      // 3. CONDITIONAL PANEL MANAGER
      //    Decide qué grupos se renderizan y cuándo.
      //    Ya no crea controles — delega en ControlFactory.
      // ==========================================
      const ConditionalPanelManager = {
        // ---- helpers de construcción ----

        /** Crea un <div class="control-row"> con label + glider y lo devuelve */
        _buildGlider(id, label, options, initialVal) {
          const row = document.createElement("div");
          row.className = "control-row";

          const lbl = document.createElement("span");
          lbl.className = "control-label";
          lbl.textContent = label;
          row.appendChild(lbl);

          const glider = document.createElement("div");
          glider.className = "glider-container";
          glider.id = id;

          options.forEach(({ label: optLabel, val, handler }) => {
            const opt = document.createElement("div");
            opt.className =
              "glider-option" + (val === initialVal ? " active" : "");
            opt.dataset.val = val;
            opt.textContent = optLabel;
            opt.addEventListener("click", () => handler(val));
            glider.appendChild(opt);
          });

          row.appendChild(glider);
          return row;
        },

        /** Crea un <div class="divider"> */
        _divider() {
          const d = document.createElement("div");
          d.className = "divider";
          return d;
        },

        /** Crea un contenedor de grupo con label */
        _buildGroup(id, label) {
          const wrap = document.createElement("div");
          wrap.id = id;
          const lbl = document.createElement("span");
          lbl.className = "control-label";
          lbl.textContent = label;
          wrap.appendChild(lbl);
          return wrap;
        },

        // ---- init principal ----
        init() {
          const controller = document.getElementById("main-sheet");
          const card = document.getElementById("mainCard");
          const scroll = document.getElementById("editorScroll");
          if (!controller || !card || !scroll) return;

          const isMasterActive = !!document.querySelector(
            '[data-master-bind="true"]',
          );
          if (!isMasterActive) {
            controller.dataset.status = "hidden";
            return;
          }
          controller.dataset.status = "ready";

          const hasAvatar = !!document.querySelector(
            '[data-bind="user.avatar.url"]',
          );
          const hasCover = !!document.querySelector(
            '[data-bind="user.umCoverUrl"]',
          );

          // --- Sección: Preset de layout ---
          scroll.appendChild(
            this._buildGlider(
              "presetGlider",
              "Preset de layout",
              [
                { label: "Clásico", val: "preset-classic", handler: setPreset },
                {
                  label: "Centrado",
                  val: "preset-centered",
                  handler: setPreset,
                },
                {
                  label: "Horizontal",
                  val: "preset-horizontal",
                  handler: setPreset,
                },
                { label: "Libre", val: "free", handler: setPreset },
              ],
              "preset-classic",
            ),
          );

          // --- Sección: Posición libre ---
          const posRow = this._buildGlider(
            "posGlider",
            "Posición",
            [
              { label: "Izq", val: "left", handler: setPos },
              { label: "Der", val: "right", handler: setPos },
              { label: "Arriba", val: "top", handler: setPos },
            ],
            "left",
          );
          posRow.querySelector("#posGlider").style.opacity = "0.5";
          posRow.querySelector("#posGlider").style.pointerEvents = "none";
          scroll.appendChild(posRow);

          // --- Grupo: Avatar ---
          if (hasAvatar) {
            scroll.appendChild(this._divider());
            const avatarGroup = this._buildGroup("ctrlGroupAvatar", "Avatar");
            ControlFactory.buildGroup("avatar", avatarGroup);
            scroll.appendChild(avatarGroup);
          }

          // --- Grupo: Portada ---
          if (hasCover) {
            scroll.appendChild(this._divider());
            const coverGroup = this._buildGroup("ctrlGroupCover", "Portada");

            // Glider de estilo de portada
            coverGroup.appendChild(
              this._buildGlider(
                "coverGlider",
                "Estilo de portada",
                [
                  { label: "Sin portada", val: "none", handler: setCoverStyle },
                  { label: "Completa", val: "full", handler: setCoverStyle },
                  { label: "Encuadrada", val: "inset", handler: setCoverStyle },
                ],
                "full",
              ),
            );

            // Controles inset (ocultos hasta seleccionar "Encuadrada")
            const insetContainer = document.createElement("div");
            insetContainer.id = "insetControlsContainer";
            insetContainer.dataset.status = "hidden";
            insetContainer.appendChild(this._divider());
            ControlFactory.buildGroup("cover-inset", insetContainer);
            coverGroup.appendChild(insetContainer);

            scroll.appendChild(coverGroup);
          } else {
            // Sin portada → forzar cover-style-none
            card.classList.remove("cover-style-full", "cover-style-inset");
            card.classList.add("cover-style-none");
          }
        },
      };

      // ==========================================
      // 4. LÓGICA DE UI E INTERACCIÓN
      // ==========================================
      function handleControllerClick() {
        if (window.appBottomSheet) window.appBottomSheet.open();
      }

      function toggleController(event) {
        if (event) event.stopPropagation();
        if (window.appBottomSheet) window.appBottomSheet.close();
      }

      function setPreset(presetName) {
        const card = document.getElementById("mainCard");
        const content = document.getElementById("profileContent");
        if (!card || !content) return;

        document
          .querySelectorAll("#presetGlider .glider-option")
          .forEach((el) => el.classList.remove("active"));
        const activeOption = document.querySelector(
          `#presetGlider .glider-option[data-val="${presetName}"]`,
        );
        if (activeOption) activeOption.classList.add("active");

        content.style.flexDirection = "";
        content.style.textAlign = "";
        card.classList.remove(
          "preset-classic",
          "preset-centered",
          "preset-horizontal",
        );

        const posGlider = document.getElementById("posGlider");
        if (presetName !== "free") {
          card.classList.add(presetName);
          if (posGlider) {
            posGlider.style.opacity = "0.5";
            posGlider.style.pointerEvents = "none";
          }
        } else {
          if (posGlider) {
            posGlider.style.opacity = "1";
            posGlider.style.pointerEvents = "auto";
          }
          setPos("left");
        }

        if (window.appBipartiteStorage) {
          window.appBipartiteStorage.updatePreset(presetName);
        }
      }

      function setPos(direction) {
        const freeOption = document.querySelector(
          '#presetGlider .glider-option[data-val="free"]',
        );
        if (!freeOption || !freeOption.classList.contains("active")) return;

        document
          .querySelectorAll("#posGlider .glider-option")
          .forEach((el) => el.classList.remove("active"));
        const activeOption = document.querySelector(
          `#posGlider .glider-option[data-val="${direction}"]`,
        );
        if (activeOption) activeOption.classList.add("active");

        const content = document.getElementById("profileContent");
        if (!content) return;
        content.style.flexDirection =
          direction === "left"
            ? "row"
            : direction === "right"
              ? "row-reverse"
              : "column";
        content.style.textAlign = direction === "top" ? "center" : "left";

        if (window.appBipartiteStorage) {
          window.appBipartiteStorage.updatePosition(direction);
        }
      }

      function setCoverStyle(styleName) {
        const card = document.getElementById("mainCard");
        if (!card) return;

        document
          .querySelectorAll("#coverGlider .glider-option")
          .forEach((el) => el.classList.remove("active"));
        const activeOption = document.querySelector(
          `#coverGlider .glider-option[data-val="${styleName}"]`,
        );
        if (activeOption) activeOption.classList.add("active");

        card.classList.remove(
          "cover-style-none",
          "cover-style-full",
          "cover-style-inset",
        );
        card.classList.add(`cover-style-${styleName}`);

        const insetControls = document.getElementById("insetControlsContainer");
        const coverWrap = document.getElementById("coverWrap");

        if (insetControls) {
          if (styleName === "inset") {
            insetControls.dataset.status = "active";
          } else {
            insetControls.dataset.status = "hidden";
            if (coverWrap) {
              coverWrap.style.width = "";
              coverWrap.style.height = "";
              coverWrap.style.borderRadius = "";
            }
          }
        }

        if (window.appBipartiteStorage) {
          window.appBipartiteStorage.updateCoverStyle(styleName);
        }
      }

      // ==========================================
      // 5. MOTOR DECLARATIVO DE HIDRATACIÓN (SOLID)
      // ==========================================
      const BindingStrategies = {
        text: (el, value) => {
          el.textContent = value;
        },
        innerhtml: (el, value) => {
          el.innerHTML = value;
        },
        src: (el, value) => {
          if (value) el.setAttribute("src", value);
        },
        href: (el, value) => {
          if (value) el.setAttribute("href", value);
        },
        alt: (el, value) => {
          if (value) el.setAttribute("alt", value);
        },
        title: (el, value) => {
          if (value) el.setAttribute("title", value);
        },
        value: (el, value) => {
          if (value) el.setAttribute("value", value);
        },
        class: (el, value) => {
          if (value) el.classList.add(value);
        },
        "css-var": (el, value, config) => {
          if (config.cssVar && value)
            el.style.setProperty(config.cssVar, value);
        },
        "bg-image": (el, value) => {
          if (value) el.style.backgroundImage = `url('${value}')`;
        },
      };

      const DataUtils = {
        getNestedValue(obj, path) {
          if (!path || !obj) return undefined;
          return path.split(".").reduce((acc, part) => acc && acc[part], obj);
        },
        formatValue(value, format) {
          if (!format || value === null || value === undefined || value === "")
            return value;
          return format.replace("{value}", value);
        },
      };

      class HydrationEngine {
        constructor(strategies) {
          this.strategies = strategies;
        }

        hydrate(rootElement, data) {
          rootElement.querySelectorAll("[data-bind]").forEach((el) => {
            const config = this._extractConfig(el);
            let rawValue = DataUtils.getNestedValue(data, config.path);
            if (rawValue === null || rawValue === undefined) rawValue = "";
            const finalValue = DataUtils.formatValue(rawValue, config.format);
            const strategy = this.strategies[config.bindType];
            if (strategy) strategy(el, finalValue, config);
            this._cleanupSkeleton(el);
          });
        }

        _extractConfig(el) {
          return {
            path: el.getAttribute("data-bind"),
            bindType: (
              el.getAttribute("data-bind-type") || "text"
            ).toLowerCase(),
            cssVar: el.getAttribute("data-bind-var"),
            format: el.getAttribute("data-bind-format"),
          };
        }

        _cleanupSkeleton(el) {
          el.classList.remove("skeleton-target");
          // Solo limpia el width si fue puesto por el skeleton placeholder,
          // no inyecta --wh en elementos que no son el avatar.
          if (!el.dataset.bindType || el.dataset.bindType !== "src") {
            el.style.width = "";
          }
        }
      }

      // ==========================================
      // 5.1 BIPARTITE STORAGE UTILITY (SOLID / DRY)
      // ==========================================
      class BipartiteStorage {
        constructor(options = {}) {
          this.storageKey = options.storageKey || "nfc_profile_aspect";
          this.userId =
            localStorage.getItem("devUserId") ||
            localStorage.getItem("user id") ||
            options.userId ||
            1;
          this.apiUrl =
            options.apiUrl ||
            "https://my.newfacecards.com/nfc/gateway-profile.php";
          this.apiKey =
            localStorage.getItem("devApiKey") ||
            localStorage.getItem("apiToken") ||
            options.apiKey ||
            "";
          this.debounceMs = options.debounceMs || 1500;
          this.statusStorageEl = document.getElementById("data-status-storage");

          this.debounceTimer = null;
          this.abortController = null;
          this.lastSyncedHash = null;
          this.isApplyingState = false;
          this.syncState = "synced";

          // Local memory state
          this.state = {
            preset: "preset-classic",
            position: "left",
            coverStyle: "full",
            controls: {},
          };

          // Initialize default controls from schema
          CONTROLS.forEach((cfg) => {
            this.state.controls[cfg.id] = cfg.initial;
          });

          // Bind offline/online recovery
          window.addEventListener("online", () =>
            this.handleNetworkChange(true),
          );
          window.addEventListener("offline", () =>
            this.handleNetworkChange(false),
          );

          // Initial network state check
          this.handleNetworkChange(navigator.onLine);

          // Add click listener to sync status badge
          const badgeEl = document.getElementById("syncStatusBadge");
          if (badgeEl) {
            badgeEl.style.cursor = "pointer";
            badgeEl.addEventListener("click", () =>
              this.showSyncDetailsSheet(),
            );
          }
        }

        handleNetworkChange(isOnline) {
          if (this.statusStorageEl) {
            this.statusStorageEl.setAttribute(
              "data-status",
              isOnline ? "online" : "offline",
            );
            if (!isOnline) {
              this.setSyncState("offline", "Sin conexión");
            } else {
              this.setSyncState("synced", "Sincronizado");
              this.syncPending();
            }
          }
        }

        setSyncState(status, text) {
          this.syncState = status;
          if (this.statusStorageEl) {
            this.statusStorageEl.setAttribute("data-sync-status", status);
          }
          const badgeText = document.querySelector(
            "#syncStatusBadge .sync-text",
          );
          if (badgeText) {
            badgeText.textContent = text;
          }
        }

        showSyncDetailsSheet() {
          if (typeof window.constructBottomSheet !== "function") {
            console.error("constructBottomSheet helper is not available yet.");
            return;
          }

          let iconColor = "";
          let iconSVG = "";
          let titleText = "";
          let descriptionText = "";

          switch (this.syncState) {
            case "synced":
              iconColor = "synced";
              iconSVG = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width: 32px; height: 32px;"><path d="M20 6L9 17l-5-5"/></svg>`;
              titleText = "Sincronizado";
              descriptionText =
                "Tus cambios se guardaron de forma segura en la nube (WordPress) y están disponibles en todos tus dispositivos.";
              break;
            case "syncing":
              iconColor = "syncing";
              iconSVG = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width: 32px; height: 32px;"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"/></svg>`;
              titleText = "Sincronizando...";
              descriptionText =
                "Guardando tus cambios en el servidor cloud. Por favor espera un momento...";
              break;
            case "offline":
              iconColor = "offline";
              iconSVG = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width: 32px; height: 32px;"><path d="M1 1l22 22M16.72 11.06A10.94 10.94 0 0 1 19 12.5M5 12.5a10.94 10.94 0 0 1 5.83-2.84M8.5 16a5.5 5.5 0 0 1 7 0M12 20h.01"/></svg>`;
              titleText = "Modo Sin Conexión";
              descriptionText =
                "No tienes conexión a Internet. Las configuraciones están guardadas localmente (LocalStorage) y se sincronizarán automáticamente cuando vuelvas a tener conexión.";
              break;
            case "error":
            default:
              iconColor = "error";
              iconSVG = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width: 32px; height: 32px;"><path d="M18 6L6 18M6 6l12 12"/></svg>`;
              titleText = "Error de Sincronización";
              descriptionText =
                "Hubo un problema al conectar con el servidor cloud. Los cambios se mantienen seguros localmente en tu navegador.";
              break;
          }

          const hasPending =
            localStorage.getItem(`${this.storageKey}_pending`) === "true"
              ? "Sí"
              : "No";

          const sheetContent = `
            <div class="sync-details-container">
              <div class="sync-details-icon ${iconColor}">
                ${iconSVG}
              </div>
              <div class="sync-details-title">${titleText}</div>
              <div class="sync-details-desc">${descriptionText}</div>
              <div class="sync-details-grid">
                <div class="sync-detail-item">
                  <span class="sync-detail-label">Servidor Cloud:</span>
                  <span class="sync-detail-val">my.newfacecards.com</span>
                </div>
                <div class="sync-detail-item">
                  <span class="sync-detail-label">ID Usuario:</span>
                  <span class="sync-detail-val">${this.userId}</span>
                </div>
                <div class="sync-detail-item">
                  <span class="sync-detail-label">Cambios pendientes:</span>
                  <span class="sync-detail-val">${hasPending}</span>
                </div>
                <div class="sync-detail-item">
                  <span class="sync-detail-label">Endpoint de guardado:</span>
                  <span class="sync-detail-val">/nfc/gateway-profile.php</span>
                </div>
              </div>
            </div>
          `;

          const config = {
            title: "Detalles de sincronización",
            scope: "sync-details",
            content: sheetContent,
            bottom_actions: {
              layout: "dual",
              secondary: {
                label: "Cerrar",
                callback: "close",
              },
              primary: {
                label: "Sincronizar ahora",
                callback: () => {
                  window.appBipartiteStorage.syncCloud();
                  if (typeof window.appBottomSheetClose === "function") {
                    window.appBottomSheetClose();
                  } else {
                    const activeOverlay = document.querySelector(
                      ".bottom-sheet-overlay",
                    );
                    if (activeOverlay) {
                      const closeBtn = activeOverlay.querySelector(
                        "[data-bsheet-close]",
                      );
                      if (closeBtn) closeBtn.click();
                    }
                  }
                },
              },
            },
          };

          window.constructBottomSheet(config);
        }

        // Apply loaded state back to UI controls and DOM elements
        applyStateToUI() {
          this.isApplyingState = true;
          console.log("Aplicando estado cargado a la interfaz:", this.state);

          try {
            // 1. Preset
            if (this.state.preset) {
              setPreset(this.state.preset);
            }

            // 2. Position (only applies if free)
            if (this.state.position) {
              setPos(this.state.position);
            }

            // 3. Cover style
            if (this.state.coverStyle) {
              setCoverStyle(this.state.coverStyle);
            }

            // 4. Controls
            Object.entries(this.state.controls).forEach(([id, value]) => {
              const cfg = CONTROLS.find((c) => c.id === id);
              if (!cfg) return;

              // Update DOM element input value
              const inputEl = document.getElementById(`${cfg.id}-input`);
              if (inputEl) {
                if (cfg.type === "checkbox") {
                  inputEl.checked = !!value;
                } else {
                  inputEl.value = value;
                }
              }

              // Apply styling only if the group is relevant to the active layout!
              // For example, cover-inset controls should only apply inline style if coverStyle is "inset"
              const isRelevant =
                cfg.group !== "cover-inset" ||
                this.state.coverStyle === "inset";

              const target = document.getElementById(cfg.targetId);
              if (target) {
                if (cfg.cssProp) {
                  if (isRelevant) {
                    if (cfg.type === "checkbox") {
                      target.style[cfg.cssProp] = value
                        ? (cfg.trueValue ?? "")
                        : (cfg.falseValue ?? "none");
                    } else {
                      target.style[cfg.cssProp] = value + (cfg.unit || "");
                    }
                  } else {
                    // Clear the inline style so it falls back to stylesheet defaults
                    target.style[cfg.cssProp] = "";
                  }
                }
                if (cfg.onChange && isRelevant) {
                  cfg.onChange(value, target);
                }
              }

              // Update label display value
              const display = document.getElementById(`${cfg.id}-val`);
              if (display && cfg.type !== "checkbox" && cfg.type !== "select") {
                display.textContent = value + (cfg.unit || "");
              }
            });
            if (window.ControlSyncRegistry) {
              window.ControlSyncRegistry.applyAll(this.state);
            }
          } catch (e) {
            console.error("Error applying state to UI:", e);
          } finally {
            this.isApplyingState = false;
          }
        }

        // Load state from local storage or cloud
        loadState(cloudDescription = null) {
          let localState = null;
          try {
            const stored = localStorage.getItem(this.storageKey);
            if (stored) {
              localState = JSON.parse(stored);
            }
          } catch (e) {
            console.error("Error reading local aspect state:", e);
          }

          let cloudState = null;
          if (cloudDescription) {
            try {
              cloudState = JSON.parse(cloudDescription);
            } catch (e) {
              console.warn(
                "La descripción del usuario no es un JSON de aspecto válido:",
                e,
              );
            }
          }

          // Merge order: Cloud state (source of truth) -> Local storage (offline/in progress) -> Default state
          if (cloudState && cloudState.controls) {
            this.state = { ...this.state, ...cloudState };
            this.lastSyncedHash = JSON.stringify(this.state);
          }

          if (localState && localState.controls) {
            // If local state has pending unsynced changes, merge them
            const isPending =
              localStorage.getItem(`${this.storageKey}_pending`) === "true";
            if (isPending || !cloudState) {
              this.state = { ...this.state, ...localState };
            }
          }

          this.applyStateToUI();
        }

        updatePreset(presetName) {
          if (this.isApplyingState) return;
          if (this.state.preset === presetName) return;
          this.state.preset = presetName;
          this.saveLocal();
        }

        updatePosition(direction) {
          if (this.isApplyingState) return;
          if (this.state.position === direction) return;
          this.state.position = direction;
          this.saveLocal();
        }

        updateCoverStyle(styleName) {
          if (this.isApplyingState) return;
          if (this.state.coverStyle === styleName) return;
          this.state.coverStyle = styleName;
          this.saveLocal();
        }

        updateControlValue(id, value) {
          if (this.isApplyingState) return;
          if (this.state.controls[id] === value) return;
          this.state.controls[id] = value;
          if (window.ControlSyncRegistry) {
            window.ControlSyncRegistry.applyControl(id, value);
          }
          this.saveLocal();
        }

        // 1. Local Storage (Immediate)
        saveLocal() {
          try {
            localStorage.setItem(this.storageKey, JSON.stringify(this.state));
            localStorage.setItem(`${this.storageKey}_pending`, "true");

            // Trigger asynchronous debounced cloud sync
            this.scheduleSync();
          } catch (e) {
            console.error("Error saving aspect to LocalStorage:", e);
          }
        }

        // 2. Debounce Trigger
        async scheduleSync() {
          if (this.debounceTimer) {
            clearTimeout(this.debounceTimer);
          }
          this.debounceTimer = setTimeout(async () => {
            await this.syncCloud();
          }, this.debounceMs);
        }

        // 3. API Sync (Asynchronous & Idempotent)
        async syncCloud() {
          if (!navigator.onLine) {
            console.warn("Offline: Sincronización encolada.");
            this.setSyncState("offline", "Sin conexión");
            return;
          }

          const currentHash = JSON.stringify(this.state);
          if (currentHash === this.lastSyncedHash) {
            console.log(
              "Idempotencia: Sin cambios desde la última sincronización.",
            );
            localStorage.removeItem(`${this.storageKey}_pending`);
            this.setSyncState("synced", "Sincronizado");
            return;
          }

          if (this.abortController) {
            this.abortController.abort();
            console.log("Cancelando sincronización anterior.");
          }
          this.abortController = new AbortController();

          this.setSyncState("syncing", "Sincronizando...");

          try {
            const payload = {
              user_id: this.userId,
              description: currentHash,
            };

            const headers = {
              "Content-Type": "application/json",
            };
            if (this.apiKey) {
              headers["Authorization"] = `Bearer ${this.apiKey}`;
            }

            const response = await fetch(this.apiUrl, {
              method: "POST",
              headers: headers,
              body: JSON.stringify(payload),
              signal: this.abortController.signal,
            });

            if (!response.ok) {
              throw new Error(`HTTP Error ${response.status}`);
            }

            const resData = await response.json();
            if (!resData.success) {
              throw new Error(resData.message || "La API no devolvió éxito");
            }

            this.lastSyncedHash = currentHash;
            localStorage.removeItem(`${this.storageKey}_pending`);
            this.setSyncState("synced", "Sincronizado");
            console.log("Sincronización en la nube exitosa!");
          } catch (err) {
            if (err.name === "AbortError") {
              console.log("Sincronización abortada por nuevo cambio.");
              return;
            }
            console.error("Error sincronizando en la nube:", err);
            this.setSyncState("error", "Error de sincronización");
          } finally {
            this.abortController = null;
          }
        }

        syncPending() {
          const isPending =
            localStorage.getItem(`${this.storageKey}_pending`) === "true";
          if (isPending) {
            console.log(
              "Sincronizando cambios locales pendientes al volver online...",
            );
            this.syncCloud();
          }
        }
      }

      // ==========================================
      // 6. USER SERVICE
      // ==========================================
      class UserService {
        constructor(apiUrl) {
          this.apiUrl = apiUrl;
        }

        async getUserData() {
          try {
            const response = await fetch(this.apiUrl);
            if (!response.ok) throw new Error("HTTP " + response.status);
            const data = await response.json();
            return data?.data || {};
          } catch {
            return this._getMockData();
          }
        }

        async _getMockData() {
          await new Promise((resolve) => setTimeout(resolve, 2000));
          return {
            user: {
              firstName: "Alex Developer",
              role: "Software Engineer",
              description: "Especialista en interfaces declarativas.",
              avatar: {
                url: "https://app.newfacecards.com/nfc/profile-pic/recBOO8H0GO0RZlUU.jpg?timestamp=1723160426&size=1000x1000",
              },
              umCoverUrl:
                "https://my.newfacecards.com/wp-content/uploads/ultimatemember/1/cover_photo.jpg",
            },
          };
        }
      }

      // ==========================================
      // 7. APP CONTROLLER — orquesta todo
      // ==========================================
      class AppController {
        constructor() {
          this.storageEl = document.querySelector(".status-storage");
          this.userService = new UserService(
            "https://my.newfacecards.com/nfc/front/get_user.php",
          );
          this.hydrator = new HydrationEngine(BindingStrategies);
        }

        setLoadingState(isLoading) {
          if (this.storageEl) {
            this.storageEl.setAttribute(
              "data-general-status",
              isLoading ? "skel-loading" : "loaded",
            );
          }
        }

        async init() {
          // 1. Inicializar los controles del panel condicional inmediatamente
          ConditionalPanelManager.init();

          // 2. Instanciar BipartiteStorage con ID por defecto e inicializar con LocalStorage de inmediato
          window.appBipartiteStorage = new BipartiteStorage({
            userId: 1,
            apiKey:
              "patMGuFVV5CBYL2TU.92aa853aaf30125e860bab7543358d01ef8632ad87081467d9d44e384f5e0ff5",
          });
          window.ControlSyncRegistry?.connectStorage(window.appBipartiteStorage);
          window.ControlSyncRegistry?.define({
            id: "ctrl-size",
            root: "[data-control-sync='avatar-size']",
            target: "#avatarContainer",
            cssVar: "--avatar-size",
            unit: "px",
            values: { sm: 64, md: 100, lg: 140 },
          });
          window.appBipartiteStorage.loadState(null);

          // 3. Mostrar estado de carga (skeleton) para los datos del usuario e iniciar la consulta cloud
          this.setLoadingState(true);
          const data = await this.userService.getUserData();

          // 4. Hidratar los datos de usuario en el DOM y remover el skeleton
          this.hydrator.hydrate(document, data);
          this.setLoadingState(false);

          // 5. Actualizar el ID del usuario y priorizar/sincronizar la configuración desde la nube (descripción/biographical info)
          if (data?.user?.id) {
            window.appBipartiteStorage.userId = data.user.id;
          }
          window.appBipartiteStorage.loadState(data?.user?.description);
        }
      }

      // ==========================================
      // 8. INICIALIZACIÓN
      // ==========================================
      document.addEventListener("DOMContentLoaded", () => {
        const app = new AppController();
        app.init();
      });
    </script>
