<div class="divider"></div>
<span class="control-label" style="font-size: 16px; margin-bottom: 10px; display: block">Avatar</span>

<div class="control-row">
  <div class="control-label-wrap" style="display: flex; justify-content: space-between; align-items: center;">
    <span class="control-label">Tamaño Avatar</span>
    <span class="control-value" id="ctrl-size-val">100px</span>
  </div>
  <input type="range" class="range-input" id="ctrl-size-input" min="40" max="160" value="100" data-control-sync="ctrl-size" data-target="#avatarContainer" data-css-var="--avatar-size" data-unit="px">
</div>

<div class="control-row">
  <div class="control-label-wrap" style="display: flex; justify-content: space-between; align-items: center;">
    <span class="control-label">Radio Avatar</span>
    <span class="control-value" id="ctrl-radius-val">50px</span>
  </div>
  <input type="range" class="range-input" id="ctrl-radius-input" min="0" max="100" value="50" data-control-sync="ctrl-radius" data-target="#avatarContainer" data-css-var="--avatar-radius" data-unit="px">
</div>

<div class="control-row">
  <div class="control-label-wrap" style="display: flex; justify-content: space-between; align-items: center;">
    <span class="control-label">Padding Avatar</span>
    <span class="control-value" id="ctrl-padding-val">0px</span>
  </div>
  <input type="range" class="range-input" id="ctrl-padding-input" min="0" max="24" value="0" data-control-sync="ctrl-padding" data-target="#avatarContainer" data-css-prop="padding" data-unit="px">
</div>

<div class="control-row">
  <div class="control-label-wrap" style="display: flex; justify-content: space-between; align-items: center;">
    <span class="control-label">Mock Border (escala)</span>
    <span class="control-value" id="ctrl-mock-border-scale-val">1.05</span>
  </div>
  <input type="range" class="range-input" id="ctrl-mock-border-scale-input" min="1" max="1.2" step="0.01" value="1.05" data-control-sync="ctrl-mock-border-scale" data-target="#avatarContainer" data-css-var="--mock-border-scale">
</div>
