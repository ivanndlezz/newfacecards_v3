<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Digital Business Card - Dynamic Themes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@500;700&family=JetBrains+Mono:wght@400;700&display=swap");

      :root {
        --bg-color: #09090b; /* Zinc 950 */
      }

      body {
        background-color: var(--bg-color);
        color: #fff;
        font-family: "Inter", sans-serif;
        overflow: hidden;
        touch-action: pan-y; /* Previene scroll horizontal nativo en móviles */
      }

      /* Contenedor del Carrusel 3D */
      .carousel-viewport {
        perspective: 1200px;
        transform-style: preserve-3d;
      }

      .card-track {
        position: relative;
        width: 320px;
        height: 480px;
        transform-style: preserve-3d;
      }

      .card {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        border-radius: 24px;
        padding: 32px 24px;
        box-sizing: border-box;
        will-change: transform, opacity;
        transition:
          transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1),
          opacity 0.6s ease,
          filter 0.6s ease;
        display: flex;
        flex-direction: column;
        user-select: none;
      }

      /* ===========================================
       ESTADOS DEL MODO EDICIÓN (CARRUSEL)
     ===========================================
    */
      body.edit-mode .card.active {
        transform: translateX(0) translateZ(0) scale(1);
        opacity: 1;
        z-index: 10;
        filter: brightness(1);
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      }

      body.edit-mode .card.prev {
        transform: translateX(-70%) translateZ(-150px) scale(0.85);
        opacity: 0.4;
        z-index: 5;
        filter: brightness(0.5);
        cursor: pointer;
      }

      body.edit-mode .card.next {
        transform: translateX(70%) translateZ(-150px) scale(0.85);
        opacity: 0.4;
        z-index: 5;
        filter: brightness(0.5);
        cursor: pointer;
      }

      body.edit-mode .card.hidden-card {
        transform: translateX(0) translateZ(-300px) scale(0.6);
        opacity: 0;
        z-index: 1;
        pointer-events: none;
      }

      /* ===========================================
       ESTADOS DEL MODO VISTA (SELECCIONADO)
     ===========================================
    */
      body.view-mode .card.active {
        transform: translateX(0) translateZ(40px) scale(1.05);
        opacity: 1;
        z-index: 10;
        filter: brightness(1);
        box-shadow:
          0 35px 60px -15px rgba(0, 0, 0, 0.8),
          0 0 40px rgba(255, 255, 255, 0.05);
      }

      /* Ocultar absolutamente todas las demás tarjetas poniéndolas atrás y transparentes */
      body.view-mode .card:not(.active) {
        transform: translateX(0) translateZ(-200px) scale(0.8);
        opacity: 0;
        z-index: 1;
        pointer-events: none;
        filter: brightness(0);
      }

      /* Utilidades de Transición para los Dots */
      .dots-transition {
        transition:
          opacity 0.4s ease,
          transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      }

      body.view-mode #dots-container {
        opacity: 0;
        pointer-events: none;
        transform: translateY(15px);
      }

      body.edit-mode #dots-container {
        opacity: 1;
        pointer-events: auto;
        transform: translateY(0);
      }
    </style>
  </head>
  <body
    class="view-mode h-screen w-full flex flex-col items-center justify-center relative"
  >
    <!-- Fondo animado sutil -->
    <div class="absolute inset-0 z-0 overflow-hidden pointer-events-none">
      <div
        class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-indigo-600/10 blur-[120px]"
      ></div>
      <div
        class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] rounded-full bg-purple-600/10 blur-[120px]"
      ></div>
    </div>

    <!-- Contenedor Principal Carrusel -->
    <main
      class="w-full max-w-7xl mx-auto px-4 flex flex-col items-center justify-center relative z-10 flex-1"
    >
      <div
        class="carousel-viewport w-full flex justify-center items-center h-[550px]"
        id="carousel-viewport"
      >
        <div class="card-track" id="stage">
          <!-- Las tarjetas se inyectarán aquí por JS -->
        </div>
      </div>

      <!-- Puntos indicadores (Dots) -->
      <div
        id="dots-container"
        class="dots-transition flex items-center gap-3 mt-4 h-6"
      >
        <!-- Los dots se inyectan por JS -->
      </div>
    </main>

    <!-- Botón de Acción Persistente (Inferior central) -->
    <div class="absolute bottom-10 z-20 flex justify-center w-full px-6">
      <button
        id="action-btn"
        class="group relative px-8 py-3.5 rounded-full bg-white/10 text-white font-medium hover:bg-white/20 transition-all duration-300 border border-white/10 backdrop-blur-xl shadow-lg active:scale-95 flex items-center gap-3 overflow-hidden"
      >
        <!-- El contenido del botón cambia dinámicamente -->
        <span id="action-icon"><i class="fa-solid fa-pen text-sm"></i></span>
        <span id="action-text">Editar Diseño</span>
      </button>
    </div>

    <script>
      // 1. DATA: Origen de la verdad
      const BIO_PROFILE_DATA = {
        name: "Alex Rivera",
        role: "Creative Developer & UI/UX",
        avatar:
          "https://api.dicebear.com/7.x/notionists/svg?seed=Alex&backgroundColor=transparent",
        location: "Madrid, ES",
        links: [
          { title: "Portfolio", url: "#", icon: "fa-solid fa-globe" },
          { title: "GitHub", url: "#", icon: "fa-brands fa-github" },
          { title: "LinkedIn", url: "#", icon: "fa-brands fa-linkedin-in" },
        ],
      };

      // 2. TEMAS: Diferentes formas de presentar la misma Data
      const themesData = [
        {
          id: "theme-glass",
          name: "Glassmorphism",
          containerClass:
            "bg-white/10 border border-white/20 backdrop-blur-2xl shadow-xl",
          textMainClass: "text-white font-semibold",
          textSubClass: "text-zinc-300",
          btnClass:
            "bg-white/10 hover:bg-white/20 border border-white/10 text-white",
        },
        {
          id: "theme-cyber",
          name: "Cyberpunk",
          containerClass:
            "bg-zinc-900 border-2 border-yellow-400 shadow-[0_0_30px_rgba(250,204,21,0.2)] font-['Space_Grotesk']",
          textMainClass: "text-yellow-400 font-bold uppercase tracking-wide",
          textSubClass: "text-zinc-400",
          btnClass:
            "bg-yellow-400/10 hover:bg-yellow-400/20 border border-yellow-400/50 text-yellow-400",
        },
        {
          id: "theme-minimal",
          name: "Minimal Light",
          containerClass: "bg-zinc-100 border border-zinc-200 shadow-2xl",
          textMainClass: "text-zinc-900 font-bold",
          textSubClass: "text-zinc-500",
          btnClass:
            "bg-zinc-200 hover:bg-zinc-300 border border-transparent text-zinc-800",
        },
        {
          id: "theme-hacker",
          name: "Terminal",
          containerClass:
            "bg-black border border-green-500 shadow-[0_0_20px_rgba(34,197,94,0.1)] font-['JetBrains_Mono']",
          textMainClass: "text-green-500 font-bold",
          textSubClass: "text-green-700",
          btnClass:
            "bg-green-500/10 hover:bg-green-500/20 border border-green-500/50 text-green-500",
        },
        {
          id: "theme-sunset",
          name: "Sunset Gradient",
          containerClass:
            "bg-gradient-to-br from-orange-500 to-pink-600 border border-white/20 shadow-2xl shadow-orange-500/20",
          textMainClass: "text-white font-bold",
          textSubClass: "text-orange-100",
          btnClass:
            "bg-black/20 hover:bg-black/30 border border-white/20 text-white backdrop-blur-md",
        },
      ];

      // ==========================================
      // LÓGICA DE APLICACIÓN Y CARRUSEL
      // ==========================================

      const stage = document.getElementById("stage");
      const dotsContainer = document.getElementById("dots-container");
      let cards = [];
      let dots = [];
      let currentIndex = 0;
      let isTransitioning = false;

      // Estado Global (Falso = Modo Vista, Verdadero = Modo Edición)
      let isEditMode = false;

      // Renderizar las tarjetas
      function renderCards() {
        stage.innerHTML = "";
        dotsContainer.innerHTML = "";

        themesData.forEach((theme, index) => {
          // Crear Tarjeta
          const cardEl = document.createElement("div");
          cardEl.className = `card ${theme.containerClass}`;

          // Inyectar HTML combinando DATA y CLASES DEL TEMA
          cardEl.innerHTML = `
          <div class="flex flex-col items-center justify-center flex-1 text-center">
            <div class="w-24 h-24 rounded-full bg-black/20 mb-4 p-2 backdrop-blur-sm border border-white/10">
              <img src="${BIO_PROFILE_DATA.avatar}" alt="Avatar" class="w-full h-full object-cover rounded-full">
            </div>
            <h2 class="text-2xl ${theme.textMainClass} mb-1">${BIO_PROFILE_DATA.name}</h2>
            <p class="text-sm ${theme.textSubClass} font-medium mb-1">${BIO_PROFILE_DATA.role}</p>
            <p class="text-xs ${theme.textSubClass} opacity-80 flex items-center gap-1">
              <i class="fa-solid fa-location-dot"></i> ${BIO_PROFILE_DATA.location}
            </p>
          </div>
          <div class="w-full flex flex-col gap-3 mt-6">
            ${BIO_PROFILE_DATA.links
              .map(
                (link) => `
              <a href="${link.url}" class="w-full py-3 px-4 rounded-xl flex items-center justify-center gap-3 transition-colors ${theme.btnClass}">
                <i class="${link.icon}"></i>
                <span class="font-medium text-sm">${link.title}</span>
              </a>
            `,
              )
              .join("")}
          </div>
          <div class="absolute top-4 right-4 text-[10px] uppercase tracking-wider opacity-30 font-bold ${theme.textMainClass}">
            ${theme.name}
          </div>
        `;

          // Click lateral para cambiar de tarjeta (Solo si estamos en Edit Mode)
          cardEl.addEventListener("click", () => {
            if (!isEditMode || isTransitioning) return;
            if (cardEl.classList.contains("prev")) goToIndex(currentIndex - 1);
            if (cardEl.classList.contains("next")) goToIndex(currentIndex + 1);
          });

          stage.appendChild(cardEl);
          cards.push(cardEl);

          // Crear Dot (Punto indicador)
          const dot = document.createElement("div");
          dot.className = `w-2 h-2 rounded-full bg-white/30 transition-all duration-300 cursor-pointer`;
          dot.addEventListener("click", () => {
            if (isEditMode && !isTransitioning) goToIndex(index);
          });
          dotsContainer.appendChild(dot);
          dots.push(dot);
        });

        updateClasses();
      }

      // Actualizar clases de posiciones (prev, active, next, hidden)
      function updateClasses() {
        const length = cards.length;

        cards.forEach((card, index) => {
          card.className = card.className
            .replace(/\b(active|prev|next|hidden-card)\b/g, "")
            .trim();
          dots[index].className = dots[index].className.replace(
            "w-6 bg-white",
            "w-2 bg-white/30",
          );

          if (index === currentIndex) {
            card.classList.add("active");
            dots[index].className = dots[index].className.replace(
              "w-2 bg-white/30",
              "w-6 bg-white",
            );
          } else if (index === (currentIndex - 1 + length) % length) {
            card.classList.add("prev");
          } else if (index === (currentIndex + 1) % length) {
            card.classList.add("next");
          } else {
            card.classList.add("hidden-card");
          }
        });
      }

      // Navegar a un índice específico
      function goToIndex(newIndex) {
        if (isTransitioning) return;
        isTransitioning = true;
        const length = cards.length;
        currentIndex = (newIndex + length) % length;
        updateClasses();
        setTimeout(() => {
          isTransitioning = false;
        }, 600); // Coincide con la transición CSS
      }

      // Inicializar Render
      renderCards();

      // ==========================================
      // LÓGICA DE BOTÓN MODO VISTA/EDICIÓN
      // ==========================================
      const actionBtn = document.getElementById("action-btn");
      const actionIcon = document.getElementById("action-icon");
      const actionText = document.getElementById("action-text");

      actionBtn.addEventListener("click", () => {
        isEditMode = !isEditMode;
        const bodyCls = document.body.classList;

        if (isEditMode) {
          // Pasar a MODO EDICIÓN: Mostramos el carrusel y los dots
          bodyCls.remove("view-mode");
          bodyCls.add("edit-mode");

          // Cambiar estilo del botón a "Guardar"
          actionBtn.className =
            "group relative px-8 py-3.5 rounded-full bg-emerald-500 text-emerald-950 font-bold hover:bg-emerald-400 transition-all duration-300 shadow-[0_0_30px_rgba(16,185,129,0.3)] active:scale-95 flex items-center gap-3";
          actionIcon.innerHTML = '<i class="fa-solid fa-check text-sm"></i>';
          actionText.innerText = "Guardar Selección";
        } else {
          // Pasar a MODO VISTA: Ocultamos el resto de tarjetas
          bodyCls.remove("edit-mode");
          bodyCls.add("view-mode");

          // Volver estilo del botón a "Editar"
          actionBtn.className =
            "group relative px-8 py-3.5 rounded-full bg-white/10 text-white font-medium hover:bg-white/20 transition-all duration-300 border border-white/10 backdrop-blur-xl shadow-lg active:scale-95 flex items-center gap-3 overflow-hidden";
          actionIcon.innerHTML = '<i class="fa-solid fa-pen text-sm"></i>';
          actionText.innerText = "Editar Diseño";
        }
      });

      // ==========================================
      // CONTROLES DE NAVEGACIÓN (Solo activos en Edit Mode)
      // ==========================================
      const viewport = document.getElementById("carousel-viewport");

      // 1. Teclado
      document.addEventListener("keydown", (e) => {
        if (!isEditMode || isTransitioning) return;
        if (e.key === "ArrowRight") goToIndex(currentIndex + 1);
        if (e.key === "ArrowLeft") goToIndex(currentIndex - 1);
      });

      // 2. Scroll (Trackpad / Mouse Wheel)
      let wheelAccumulator = 0;
      let isWheelOnCooldown = false;

      viewport.addEventListener(
        "wheel",
        (e) => {
          if (!isEditMode) return; // Si no estamos editando, no hacer nada

          const delta =
            Math.abs(e.deltaX) > Math.abs(e.deltaY) ? e.deltaX : e.deltaY;
          if (Math.abs(delta) > 5) e.preventDefault();

          if (isWheelOnCooldown || isTransitioning) return;

          wheelAccumulator += delta;

          if (wheelAccumulator > 60) {
            goToIndex(currentIndex + 1);
            triggerWheelCooldown();
          } else if (wheelAccumulator < -60) {
            goToIndex(currentIndex - 1);
            triggerWheelCooldown();
          }
        },
        { passive: false },
      );

      function triggerWheelCooldown() {
        wheelAccumulator = 0;
        isWheelOnCooldown = true;
        setTimeout(() => {
          isWheelOnCooldown = false;
          wheelAccumulator = 0;
        }, 400);
      }

      // 3. Gestos (Swipe / Arrastre con mouse)
      let startX = 0;
      let isDragging = false;

      function getPositionX(e) {
        if (e.type.includes("mouse")) {
          return e.clientX;
        } else {
          return e.type.includes("end")
            ? e.changedTouches[0].clientX
            : e.touches[0].clientX;
        }
      }

      function touchStart(e) {
        if (!isEditMode) return; // Si estamos en modo vista, no permitir arrastre
        isDragging = true;
        startX = getPositionX(e);
      }

      function touchEnd(e) {
        if (!isDragging || !isEditMode) return;
        isDragging = false;
        const endX = getPositionX(e);
        const diffX = startX - endX;

        if (Math.abs(diffX) > 50 && !isTransitioning) {
          if (diffX > 0) goToIndex(currentIndex + 1);
          else goToIndex(currentIndex - 1);
        }
      }

      viewport.addEventListener("mousedown", touchStart);
      viewport.addEventListener("mouseup", touchEnd);
      viewport.addEventListener("mouseleave", () => (isDragging = false));

      viewport.addEventListener("touchstart", touchStart, { passive: true });
      viewport.addEventListener("touchend", touchEnd);
    </script>
  </body>
</html>
