<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Componente Estructural Mutable</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <!-- Usamos Phosphor Icons para los iconos -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
      :root {
        --bg-color: #f8fafc;
        --text-main: #0f172a;
        --text-muted: #64748b;
        --accent-color: #3b82f6;
        --accent-light: #eff6ff;
        --border-color: #e2e8f0;
        --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
        --shadow-md:
          0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Inter", sans-serif;
        background-color: var(--bg-color);
        color: var(--text-main);
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 2rem;
        min-height: 100vh;
      }

      /* Controles de la Demo (Solo para presentación) */
      .demo-controls {
        margin-bottom: 3rem;
        background: white;
        padding: 1.5rem;
        border-radius: 12px;
        box-shadow: var(--shadow-md);
        text-align: center;
        width: 100%;
        max-width: 600px;
      }

      .demo-controls h2 {
        font-size: 1.25rem;
        margin-bottom: 1rem;
        color: var(--text-main);
      }

      .demo-controls select {
        padding: 0.75rem 1rem;
        border-radius: 8px;
        border: 1px solid var(--border-color);
        font-size: 1rem;
        font-family: "Inter", sans-serif;
        width: 100%;
        cursor: pointer;
        outline: none;
        transition: border-color 0.2s;
      }

      .demo-controls select:focus {
        border-color: var(--accent-color);
        box-shadow: 0 0 0 3px var(--accent-light);
      }

      .component-preview-area {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 200px;
        width: 100%;
        max-width: 600px;
        padding: 2rem;
        background: white;
        border-radius: 12px;
        border: 1px dashed var(--border-color);
      }

      /* 
         =============================================================================
         ESTILOS DEL COMPONENTE BASE (INMUTABLE EN HTML)
         =============================================================================
        */

      .universal-component {
        /* Propiedades compartidas por todas las variantes */
        display: inline-flex;
        align-items: center;
        text-decoration: none;
        overflow: hidden; /* Para contener imágenes que se salgan */
        transition: all 0.3s ease;
      }

      /* Ocultar elementos por defecto para mostrar solo lo necesario en cada variante */
      .universal-component__media,
      .universal-component__desc,
      .universal-component__action {
        display: none;
      }

      .universal-component__content {
        display: flex;
        flex-direction: column;
      }

      .universal-component__title {
        font-weight: 500;
        color: inherit; /* Hereda el color del componente principal */
      }

      .universal-component__media {
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .universal-component__media img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .universal-component__media i {
        font-size: 1.2em;
      }

      .universal-component__action {
        background: none;
        border: none;
        cursor: pointer;
        color: inherit;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0;
        opacity: 0.6;
        transition: opacity 0.2s;
      }

      .universal-component__action:hover {
        opacity: 1;
      }

      /* 
         =============================================================================
         VARIANTES BASADAS EN data-variant
         =============================================================================
        */

      /* 1. Chip (Básico, fondo gris claro, texto oscuro) */
      .universal-component[data-variant="chip"] {
        background-color: #e2e8f0;
        color: #334155;
        padding: 4px 12px;
        border-radius: 6px;
        font-size: 0.875rem;
      }

      [data-variant="chip"] img,
      [data-variant="chip"] i {
        display: none;
      }

      [data-variant="pill"] .universal-component__media,
      [data-variant="pill"] i {
        display: none;
      }

      [data-variant="pill-icon"] .universal-component__media {
        display: none;
      }

      [data-variant="card-image"] i {
        display: none;
      }

      [data-variant="card-icon"] i {
        display: none;
      }

      /* En el chip simple, solo mostramos el título */
      .universal-component[data-variant="chip"] .universal-component__title {
        display: block;
      }

      /* 2. Pill (Totalmente redondeado, colores de acento) */
      .universal-component[data-variant="pill"] {
        background-color: var(--accent-light);
        color: var(--accent-color);
        padding: 6px 16px;
        border-radius: 9999px; /* Forma de píldora */
        font-size: 0.875rem;
        font-weight: 600;
        border: 1px solid #bfdbfe;
      }

      .universal-component[data-variant="pill"]:hover {
        background-color: #dbeafe;
      }

      /* 3. Pill with Icon (Píldora con botón de cierre/acción) */
      .universal-component[data-variant="pill-icon"] {
        background-color: #f1f5f9;
        color: #475569;
        padding: 4px 8px 4px 12px; /* Menos padding derecho para hacer espacio al icono */
        border-radius: 9999px;
        font-size: 0.875rem;
        gap: 8px; /* Espacio entre texto e icono */
        border: 1px solid var(--border-color);
      }

      /* Activamos la acción */
      .universal-component[data-variant="pill-icon"]
        .universal-component__action {
        display: flex;
        width: 20px;
        height: 20px;
        border-radius: 50%;
        background-color: #cbd5e1;
        color: white;
      }
      .universal-component[data-variant="pill-icon"]
        .universal-component__action:hover {
        background-color: #94a3b8;
      }

      /* 4. Mini Card with Image Left */
      .universal-component[data-variant="card-image"] {
        background-color: white;
        border-radius: 8px;
        box-shadow: var(--shadow-sm);
        border: 1px solid var(--border-color);
        padding-right: 16px;
        gap: 12px;
        height: 64px; /* Altura fija para la tarjeta */
        min-width: 250px;
      }

      .universal-component[data-variant="card-image"]:hover {
        box-shadow: var(--shadow-md);
        transform: translateY(-1px);
      }

      /* Activamos contenedor de media y configuramos imagen */
      .universal-component[data-variant="card-image"]
        .universal-component__media {
        display: flex;
        width: 64px; /* Cuadrado perfecto a la izquierda */
        height: 100%;
        background-color: #e2e8f0;
      }

      /* Ocultamos icono, forzamos imagen */
      .universal-component[data-variant="card-image"]
        .universal-component__media
        i {
        display: none;
      }
      .universal-component[data-variant="card-image"]
        .universal-component__media
        img {
        display: block;
      }

      /* Activamos descripción y estructuramos texto */
      .universal-component[data-variant="card-image"]
        .universal-component__desc {
        display: block;
        font-size: 0.75rem;
        color: var(--text-muted);
        margin-top: 2px;
      }

      .universal-component[data-variant="card-image"]
        .universal-component__title {
        font-size: 0.9rem;
        font-weight: 600;
      }

      /* 5. Mini Card with Icon */
      .universal-component[data-variant="card-icon"] {
        background-color: white;
        border-radius: 12px;
        padding: 12px 16px;
        gap: 16px;
        border: 1px solid var(--border-color);
        min-width: 220px;
      }

      /* Activamos media, pero lo hacemos circular y con fondo */
      .universal-component[data-variant="card-icon"]
        .universal-component__media {
        display: flex;
        width: 40px;
        height: 40px;
        border-radius: 50%; /* Icono circular */
        background-color: var(--accent-light);
        color: var(--accent-color);
      }

      /* Ocultamos imagen, forzamos icono grande */
      .universal-component[data-variant="card-icon"]
        .universal-component__media
        img {
        display: none;
      }
      .universal-component[data-variant="card-icon"]
        .universal-component__media
        i {
        display: block;
        font-size: 1.5rem;
      }

      /* Textos */
      .universal-component[data-variant="card-icon"]
        .universal-component__title {
        font-size: 0.875rem;
        font-weight: 600;
      }
      .universal-component[data-variant="card-icon"]
        .universal-component__desc {
        display: block;
        font-size: 0.75rem;
        color: var(--text-muted);
      }

      /* 6. Extra: Perfil Interactivo (Mini Row) */
      .universal-component[data-variant="profile-row"] {
        background: transparent;
        padding: 8px;
        border-radius: 8px;
        gap: 12px;
        width: 100%;
        max-width: 300px;
      }

      .universal-component[data-variant="profile-row"]:hover {
        background: #f1f5f9;
      }

      .universal-component[data-variant="profile-row"]
        .universal-component__media {
        display: flex;
        width: 36px;
        height: 36px;
        border-radius: 50%;
        overflow: hidden;
      }

      .universal-component[data-variant="profile-row"]
        .universal-component__media
        i {
        display: none;
      }
      .universal-component[data-variant="profile-row"]
        .universal-component__media
        img {
        display: block;
      }

      .universal-component[data-variant="profile-row"]
        .universal-component__content {
        flex-grow: 1; /* Ocupar espacio restante */
      }

      .universal-component[data-variant="profile-row"]
        .universal-component__title {
        font-size: 0.875rem;
      }
      .universal-component[data-variant="profile-row"]
        .universal-component__desc {
        display: block;
        font-size: 0.75rem;
        color: var(--text-muted);
      }

      /* Botón a la derecha */
      .universal-component[data-variant="profile-row"]
        .universal-component__action {
        display: flex;
        color: var(--accent-color);
        font-weight: 500;
        font-size: 0.875rem;
        opacity: 1;
        padding: 4px 8px;
      }
      .universal-component[data-variant="profile-row"]
        .universal-component__action
        i {
        display: none;
      } /* Ocultar icono por defecto del botón */
      .universal-component[data-variant="profile-row"]
        .universal-component__action::after {
        content: "Seguir";
      } /* Poner texto en el botón */
    </style>
  </head>
  <body>
    <!-- Selector de Variantes -->
    <div class="demo-controls">
      <h2>Selecciona una Variante</h2>
      <select id="variantSelector">
        <option value="chip">Chip Básico</option>
        <option value="pill">Pill (Píldora de color)</option>
        <option value="pill-icon">Pill con Acción (Cerrar)</option>
        <option value="card-image">Mini Card con Imagen Izquierda</option>
        <option value="card-icon">Mini Card con Icono</option>
        <option value="profile-row">Fila de Perfil (Extra)</option>
      </select>
      <p
        style="margin-top: 1rem; font-size: 0.875rem; color: var(--text-muted)"
      >
        El HTML de abajo <strong>nunca cambia</strong>. Solo cambia el atributo
        <code>data-variant</code> en la etiqueta principal.
      </p>
    </div>

    <!-- Contenedor para previsualizar -->
    <div class="component-preview-area">
      <!-- 
         =============================================================================
         ESTRUCTURA HTML INMUTABLE
         Esta es la estructura base que contiene todos los elementos posibles.
         Ningún tag se añade o elimina.
         =============================================================================
        -->
      <article class="universal-component" data-variant="chip" id="myComponent">
        <!-- Zona de Medios (Imagen o Icono) -->
        <div class="universal-component__media">
          <img
            src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&w=100&q=80"
            alt="Avatar"
            loading="lazy"
          />
          <i class="ph ph-lightning"></i>
        </div>

        <!-- Zona de Contenido (Textos) -->
        <div class="universal-component__content">
          <span class="universal-component__title">Sarah Jenkins</span>
          <span class="universal-component__desc">Desarrolladora Frontend</span>
        </div>

        <!-- Zona de Acción (Botón interactivo, cerrar, etc.) -->
        <button class="universal-component__action" aria-label="Acción">
          <i class="ph ph-x"></i>
        </button>
      </article>
    </div>

    <script>
      /**
       * Este JavaScript es MÍNIMO y ÚNICAMENTE sirve para hacer funcionar
       * el menú desplegable (select) de arriba, cambiando el atributo
       * data-variant del componente para que veas los diferentes estilos.
       */
      const selector = document.getElementById("variantSelector");
      const component = document.getElementById("myComponent");

      selector.addEventListener("change", (e) => {
        // Aquí es donde ocurre la magia: cambiamos el atributo en el DOM
        component.setAttribute("data-variant", e.target.value);
      });
    </script>
  </body>
</html>
