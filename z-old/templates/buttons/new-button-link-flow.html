    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        -webkit-tap-highlight-color: transparent;
      }

      :root {
        --bg: #f4f4f5;
        --sheet: #ffffff;
        --sheet2: #f4f4f5;
        --sheet3: #e4e4e7;
        --border: #e4e4e7;
        --text: #09090b;
        --text2: #71717a;
        --text3: #a1a1aa;
        --accent: #18181b;
        --radius: 16px;
        --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.04);
        --shadow-md: 0 10px 30px -10px rgba(9, 9, 11, 0.08);
      }

      html,
      body {
        height: 100%;
        background: var(--bg);
        font-family:
          "Inter",
          -apple-system,
          sans-serif;
        color: var(--text);
        overflow: hidden;
      }

      .svg-icon {
        width: 20px;
        height: 20px;
        stroke: currentColor;
        fill: none;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
        display: inline-block;
        vertical-align: middle;
        flex-shrink: 0;
      }

      #app {
        max-width: 430px;
        margin: 0 auto;
        height: 100dvh;
        display: flex;
        flex-direction: column;
        background: #fafafa;
        border-left: 1px solid var(--border);
        border-right: 1px solid var(--border);
        overflow: hidden;
        position: relative;
      }

      /* ── VIEWS ── */
      .view {
        display: none;
        flex-direction: column;
        flex: 1;
        overflow: hidden;
      }
      .view.active {
        display: flex;
      }

      /* ══════════════════════════
         VIEW A: SEARCH + LIST
         ══════════════════════════ */

      .search-header {
        padding: 24px 20px 16px;
        flex-shrink: 0;
        background: #fafafa;
      }
      .search-header-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 16px;
      }
      .main-title {
        font-size: 24px;
        font-weight: 700;
        letter-spacing: -0.6px;
      }
      .main-subtitle {
        font-size: 12px;
        color: var(--text3);
        font-weight: 500;
        margin-top: 2px;
      }

      .btn-close {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        background: var(--sheet3);
        border: none;
        color: var(--text2);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        text-decoration: none;
        transition:
          background 0.15s,
          transform 0.1s;
        flex-shrink: 0;
      }
      .btn-close:active {
        transform: scale(0.95);
      }

      /* Search Input */
      .search-box {
        position: relative;
        display: flex;
        align-items: center;
      }
      .search-ico {
        position: absolute;
        left: 14px;
        color: var(--text3);
        pointer-events: none;
      }
      .search-input {
        width: 100%;
        height: 48px;
        background: #ffffff;
        border: 1.5px solid var(--border);
        border-radius: 14px;
        padding: 0 44px 0 44px;
        font-size: 15px;
        font-family: inherit;
        color: var(--text);
        outline: none;
        transition:
          border-color 0.15s,
          box-shadow 0.15s;
      }
      .search-input::placeholder {
        color: var(--text3);
      }
      .search-input:focus {
        border-color: var(--text);
        box-shadow: 0 0 0 3px rgba(9, 9, 11, 0.05);
      }
      .search-clear {
        position: absolute;
        right: 10px;
        width: 28px;
        height: 28px;
        border-radius: 50%;
        background: var(--sheet3);
        border: none;
        color: var(--text2);
        display: none;
        align-items: center;
        justify-content: center;
        cursor: pointer;
      }
      .search-clear.vis {
        display: flex;
      }

      /* Category pills */
      .pills-row {
        padding: 0 20px 4px;
        flex-shrink: 0;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
      }
      .pills-row::-webkit-scrollbar {
        display: none;
      }
      .pills-inner {
        display: flex;
        gap: 6px;
        width: max-content;
        padding-bottom: 8px;
      }
      .pill {
        height: 30px;
        padding: 0 12px;
        border-radius: 15px;
        font-size: 12px;
        font-weight: 600;
        border: 1px solid var(--border);
        background: #fff;
        color: var(--text2);
        cursor: pointer;
        white-space: nowrap;
        display: flex;
        align-items: center;
        gap: 5px;
        transition: all 0.15s;
      }
      .pill-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: currentColor;
        opacity: 0.4;
        flex-shrink: 0;
      }
      .pill.active {
        background: var(--text);
        color: #fff;
        border-color: var(--text);
      }
      .pill.active .pill-dot {
        opacity: 1;
      }

      /* Section label */
      .section-label {
        padding: 8px 20px 6px;
        font-size: 11px;
        font-weight: 700;
        color: var(--text3);
        letter-spacing: 0.5px;
        text-transform: uppercase;
        flex-shrink: 0;
      }

      /* ── PRESET LIST ITEMS ── */
      .list-scroll {
        flex: 1;
        overflow-y: auto;
        padding: 4px 20px 32px;
        -webkit-overflow-scrolling: touch;
      }
      .preset-list {
        list-style: none;
        display: flex;
        flex-direction: column;
        gap: 2px;
      }

      .preset-row {
        display: flex;
        align-items: center;
        padding: 12px 14px;
        background: #ffffff;
        border-radius: 14px;
        cursor: pointer;
        gap: 14px;
        border: 1.5px solid transparent;
        transition:
          background 0.12s,
          border-color 0.12s,
          transform 0.1s;
        position: relative;
      }
      .preset-row:active {
        transform: scale(0.985);
        background: #f8f8f8;
      }
      .preset-row:hover {
        background: #f8f8f8;
      }

      /* Icon badge */
      .row-badge {
        width: 44px;
        height: 44px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        font-size: 0;
      }
      .row-badge .svg-icon {
        width: 20px;
        height: 20px;
      }

      /* Row text */
      .row-text {
        flex: 1;
        min-width: 0;
      }
      .row-name {
        font-size: 14px;
        font-weight: 600;
        color: var(--text);
        line-height: 1.2;
      }
      .row-desc {
        font-size: 12px;
        color: var(--text3);
        margin-top: 1px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      /* Arrow */
      .row-arrow {
        color: var(--text3);
        flex-shrink: 0;
      }

      /* Empty state */
      .empty-state {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 60px 20px;
        gap: 12px;
        text-align: center;
      }
      .empty-ico {
        width: 52px;
        height: 52px;
        border-radius: 16px;
        background: var(--sheet);
        border: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--text3);
      }
      .empty-txt {
        font-size: 14px;
        color: var(--text2);
        font-weight: 500;
      }
      .empty-hint {
        font-size: 12px;
        color: var(--text3);
      }

      /* ══════════════════════════════
         VIEW B: DETAIL / PREVIEW
         ══════════════════════════════ */

      .detail-header {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 18px 20px 14px;
        flex-shrink: 0;
        background: #fafafa;
      }
      .btn-back {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        background: var(--sheet3);
        border: none;
        color: var(--text2);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        flex-shrink: 0;
        transition:
          background 0.15s,
          transform 0.1s;
      }
      .btn-back:active {
        transform: scale(0.95);
      }
      .detail-title {
        font-size: 18px;
        font-weight: 700;
        letter-spacing: -0.3px;
        flex: 1;
      }
      .detail-cat {
        font-size: 11px;
        font-weight: 600;
        color: var(--text3);
        text-transform: uppercase;
        letter-spacing: 0.4px;
        padding: 4px 10px;
        border-radius: 20px;
        background: var(--sheet3);
      }

      .detail-scroll {
        flex: 1;
        overflow-y: auto;
        padding: 0 20px 140px;
        -webkit-overflow-scrolling: touch;
      }

      /* Hero preview */
      .hero-preview {
        background: #f0f0f1;
        border-radius: 20px;
        padding: 20px;
        margin-bottom: 20px;
        border: 1px solid var(--border);
      }
      .hero-preview-label {
        font-size: 10px;
        font-weight: 700;
        color: var(--text3);
        letter-spacing: 0.8px;
        text-transform: uppercase;
        margin-bottom: 14px;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .hero-preview-label .svg-icon {
        width: 12px;
        height: 12px;
      }
      .hero-preview-content {
        width: 100%;
      }

      /* Specs list */
      .specs-section {
        margin-bottom: 20px;
      }
      .specs-title {
        font-size: 11px;
        font-weight: 700;
        color: var(--text3);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 10px;
      }
      .specs-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }
      .spec-chip {
        background: #ffffff;
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 10px 12px;
      }
      .spec-label {
        font-size: 10px;
        font-weight: 700;
        color: var(--text3);
        text-transform: uppercase;
        letter-spacing: 0.3px;
        display: block;
        margin-bottom: 2px;
      }
      .spec-val {
        font-size: 13px;
        font-weight: 600;
        color: var(--text);
      }

      /* Variants strip — same preset, other style variants */
      .variants-section {
        margin-bottom: 20px;
      }
      .variants-title {
        font-size: 11px;
        font-weight: 700;
        color: var(--text3);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 10px;
      }
      .variants-row {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .variant-option {
        background: #f8f8f8;
        border-radius: 12px;
        padding: 12px;
        border: 1.5px solid transparent;
        cursor: pointer;
        transition:
          border-color 0.15s,
          background 0.15s;
      }
      .variant-option.sel {
        border-color: var(--text);
        background: #ffffff;
      }
      .variant-option:active {
        transform: scale(0.99);
      }

      /* ── BIO-BTN (exact copy from builder) ── */
      .bio-btn {
        display: flex;
        align-items: center;
        width: 100%;
        min-height: 58px;
        padding: 12px 18px;
        background: var(--btn-bg, #ffffff);
        border-radius: var(--btn-radius, 14px);
        border-top: var(--btn-border-top, 0) solid
          var(--btn-border-color, var(--border));
        border-bottom: var(--btn-border-bottom, 0) solid
          var(--btn-border-color, var(--border));
        border-left: var(--btn-border-left, 0) solid
          var(--btn-border-color, var(--border));
        border-right: var(--btn-border-right, 0) solid
          var(--btn-border-color, var(--border));
        color: var(--btn-text-color, var(--text));
        text-decoration: none;
        position: relative;
      }
      .bio-btn__media {
        display: none;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      .bio-btn__content {
        display: flex;
        flex-direction: column;
        flex: 1;
        width: 100%;
        justify-content: center;
        text-align: var(--btn-text-align, left);
        align-items: var(--btn-align-items, flex-start);
      }
      .bio-btn__title {
        font-size: 14px;
        font-weight: 600;
        line-height: 1.2;
      }
      .bio-btn__desc {
        display: none;
        font-size: 11px;
        margin-top: 3px;
      }
      .bio-btn--has-desc .bio-btn__desc {
        display: block;
      }
      .bio-btn[data-variant="left"] {
        flex-direction: row;
      }
      .bio-btn[data-variant="left"] .bio-btn__media {
        display: flex;
        margin-right: var(--btn-media-margin, 14px);
      }
      .bio-btn[data-variant="right"] {
        flex-direction: row-reverse;
      }
      .bio-btn[data-variant="right"] .bio-btn__media {
        display: flex;
        margin-left: var(--btn-media-margin, 14px);
      }
      .bio-btn[data-variant="top"] {
        flex-direction: column;
        align-items: center;
        text-align: center;
        padding: 16px;
      }
      .bio-btn[data-variant="top"] .bio-btn__media {
        display: flex;
        margin-bottom: var(--btn-media-margin, 10px);
      }
      .bio-btn[data-variant="image"] .bio-btn__media {
        display: flex;
        background: linear-gradient(
          135deg,
          var(--btn-color, var(--text)),
          #cbd5e1
        );
        color: #fff;
        margin-right: var(--btn-media-margin, 14px);
      }
      .bio-btn[data-shape="circled"] .bio-btn__media {
        border-radius: 50%;
      }
      .bio-btn[data-shape="squircle"] .bio-btn__media {
        border-radius: 10px;
      }
      .bio-btn[data-shape="square"] .bio-btn__media {
        border-radius: 0;
      }
      .bio-btn[data-variant="none"] .bio-btn__media {
        display: none !important;
      }

      /* ── STICKY BOTTOM BAR ── */
      .detail-bottom {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        padding: 14px 20px calc(14px + env(safe-area-inset-bottom));
        background: #ffffff;
        border-top: 1px solid var(--border);
        z-index: 50;
        display: none;
      }
      .detail-bottom.vis {
        display: block;
      }
      .btn-use {
        width: 100%;
        height: 52px;
        border: none;

        color: #fff;

        box-shadow: var(--shadow-md);
      }
      .toast.show {
        transform: translateX(-50%) translateY(0);
        opacity: 1;
      }

      /* ── TRANSITION ANIMATIONS ── */
      @keyframes slideInRight {
        from {
          transform: translateX(24px);
          opacity: 0;
        }
        to {
          transform: translateX(0);
          opacity: 1;
        }
      }
      @keyframes slideInLeft {
        from {

          opacity: 0;
        }
        to {
          transform: translateX(0);
          opacity: 1;
        }
      }
      .view-enter-right {
        animation: slideInRight 0.24s cubic-bezier(0.16, 1, 0.3, 1) both;

        },
        {

          name: "Apoyo / Donación",
          category: "minimal",
          tags: ["corazon", "apoyo", "donacion", "calido", "fans", "comunidad"],
          badgeBg: "#fff1f2",
          badgeColor: "#f43f5e",
          shortDesc: "Rosa suave, corazón, sensación cálida",
          specs: {
            Posición: "Izquierda",
            Fondo: "Rosa suave",
            Bordes: "1px rosa",
            Radio: "16px",
          },
          variants: ["heart-warm"],
          label: "Apóyame",
          desc: "Comparte o dona",
          url: "https://",
          linkType: "url",
          variant: "left",
          shape: "circled",
          icon: "heart",
          color: "#f43f5e",
          textAlign: "left",
          marginMedia: 14,
          paddingMedia: 0,
          titleFont: "'Inter', sans-serif",
          titleColor: "#09090b",
          subFont: "'Inter', sans-serif",
          subColor: "#71717a",
          bgType: "solid",
          bgColor: "#fff1f2",
          bgGrad1: "#fff1f2",
          bgGrad2: "#ffe4e6",
          borderT: 1,
          borderB: 1,
          borderL: 1,
          borderR: 1,
          borderColor: "#fecdd3",
          borderRadius: 16,
        },
      ];

      // ═══════════════════════════════════════════
      // CATEGORIES
      // ═══════════════════════════════════════════
      const CATS = [
        { id: "all", label: "Todos", color: "#09090b" },
        { id: "social", label: "Social", color: "#e1306c" },
        { id: "contact", label: "Contacto", color: "#25d366" },
        { id: "cta", label: "CTA", color: "#2563eb" },
        { id: "editorial", label: "Editorial", color: "#92400e" },
        { id: "minimal", label: "Minimal", color: "#71717a" },
      ];

      // ═══════════════════════════════════════════
      // STATE
      // ═══════════════════════════════════════════
      const S = {
        cat: "all",
        q: "",
        activePresetId: null, // preset abierto en detail view
        selectedVariantId: null, // variante seleccionada dentro del detail
      };

      // ═══════════════════════════════════════════
      // BIO-BTN COMPILER (igual que builder)
      // ═══════════════════════════════════════════
      function compileBioBtn(p, opts = {}) {
        const descClass = p.desc ? "bio-btn--has-desc" : "";
        const bg =
          p.bgType === "gradient"
            ? `linear-gradient(135deg, ${p.bgGrad1}, ${p.bgGrad2})`
            : p.bgColor;
        const alignItems =
          p.textAlign === "center"
            ? "center"
            : p.textAlign === "right"
              ? "flex-end"
              : "flex-start";
        const mediaBg =
          p.variant === "image"
            ? `linear-gradient(135deg,${p.color},#cbd5e1)`
            : "transparent";
        const extraStyle = opts.extraStyle || "";

        return `
          <div class="bio-btn ${descClass}"
               data-variant="${p.variant}" data-shape="${p.shape}"
               style="
                 --btn-bg:${bg};--btn-radius:${p.borderRadius}px;
                 --btn-text-color:${p.titleColor};--btn-color:${p.color};
                 --btn-border-top:${p.borderT}px;--btn-border-bottom:${p.borderB}px;
                 --btn-border-left:${p.borderL}px;--btn-border-right:${p.borderR}px;
                 --btn-border-color:${p.borderColor};
                 --btn-media-margin:${p.marginMedia}px;--btn-media-padding:${p.paddingMedia}px;
                 --btn-text-align:${p.textAlign};--btn-align-items:${alignItems};
                 ${extraStyle}
               ">
            <div class="bio-btn__media" style="background:${mediaBg}">${ico(p.icon)}</div>
            <div class="bio-btn__content">
              <span class="bio-btn__title" style="font-family:${p.titleFont};color:${p.titleColor}">${p.label}</span>
              ${p.desc ? `<span class="bio-btn__desc" style="font-family:${p.subFont};color:${p.subColor}">${p.desc}</span>` : ""}
            </div>
          </div>`;
      }

      // ═══════════════════════════════════════════
      // FILTER
      // ═══════════════════════════════════════════
      function filtered() {
        const q = S.q.toLowerCase().trim();
        return PRESETS.filter((p) => {
          const mCat = S.cat === "all" || p.category === S.cat;
          const mQ =
            !q ||
            p.name.toLowerCase().includes(q) ||
            p.tags.some((t) => t.includes(q));
          return mCat && mQ;
        });
      }

      // ═══════════════════════════════════════════
      // VIEW A — RENDER
      // ═══════════════════════════════════════════
      function renderPills() {
        document.getElementById("pillsInner").innerHTML = CATS.map(
          (c) => `
          <div class="pill ${S.cat === c.id ? "active" : ""}" onclick="setCat('${c.id}')">
            <span class="pill-dot" style="background:${c.color}"></span>${c.label}
          </div>`,
        ).join("");
      }

      function renderList() {
        const list = filtered();
        const ul = document.getElementById("presetList");
        const lbl = document.getElementById("sectionLabel");

        // Section label
        if (S.q) {
          lbl.textContent = `${list.length} resultado${list.length !== 1 ? "s" : ""} para "${S.q}"`;
        } else {
          lbl.textContent =
            S.cat === "all"
              ? "Presets sugeridos"
              : `Presets · ${CATS.find((c) => c.id === S.cat)?.label}`;
        }

        if (list.length === 0) {
          ul.innerHTML = `
            <li>
              <div class="empty-state">
                <div class="empty-ico">${ico("search")}</div>
                <div class="empty-txt">Sin resultados</div>
                <div class="empty-hint">Intenta con otro término</div>
              </div>
            </li>`;
          return;
        }

        ul.innerHTML = list
          .map(
            (p) => `
          <li>
            <div class="preset-row" onclick="openDetail('${p.id}')">
              <div class="row-badge" style="background:${p.badgeBg}">
                <svg class="svg-icon" style="width:20px;height:20px;color:${p.badgeColor}">
                  <use href="#icon-${p.icon}"/>
                </svg>
              </div>
              <div class="row-text">
                <div class="row-name">${p.name}</div>
                <div class="row-desc">${p.shortDesc}</div>
              </div>
              <span class="row-arrow">${ico("chevron-right")}</span>
            </div>
          </li>`,
          )
          .join("");
      }

      // ═══════════════════════════════════════════
      // VIEW B — DETAIL RENDER
      // ═══════════════════════════════════════════
      function openDetail(id) {
        const preset = PRESETS.find((p) => p.id === id);
        if (!preset) return;

        S.activePresetId = id;
        S.selectedVariantId = id; // default: el mismo preset es la variante activa

        // Header
        document.getElementById("detailTitle").textContent = preset.name;
        document.getElementById("detailCat").textContent =
          CATS.find((c) => c.id === preset.category)?.label || preset.category;

        // Build detail content
        renderDetailContent(preset);

        // Switch views
        showView("viewDetail", "right");
      }

      function renderDetailContent(preset) {
        const variantIds = preset.variants || [preset.id];
        const variantPresets = variantIds
          .map((vid) => PRESETS.find((p) => p.id === vid))
          .filter(Boolean);

        // Hero preview (active variant)
        const activeVariant =
          PRESETS.find((p) => p.id === S.selectedVariantId) || preset;

        // Specs chips
        const specsHtml = Object.entries(activeVariant.specs)
          .map(
            ([k, v]) => `
          <div class="spec-chip">
            <span class="spec-label">${k}</span>
            <span class="spec-val">${v}</span>
          </div>`,
          )
          .join("");

        // Variants strip (solo si hay más de 1)
        let variantsHtml = "";
        if (variantPresets.length > 1) {
          variantsHtml = `
            <div class="variants-section">
              <div class="variants-title">Variantes del estilo</div>
              <div class="variants-row">
                ${variantPresets
                  .map(
                    (vp) => `
                  <div class="variant-option ${S.selectedVariantId === vp.id ? "sel" : ""}"
                       onclick="selectVariant('${vp.id}')">
                    ${compileBioBtn(vp)}
                  </div>`,
                  )
                  .join("")}
              </div>
            </div>`;
        }

        document.getElementById("detailScroll").innerHTML = `
          <div class="hero-preview">
            <div class="hero-preview-label">
              ${ico("sparkle")} Vista previa real
            </div>
            <div class="hero-preview-content" id="heroPreviewContent">
              ${compileBioBtn(activeVariant, { extraStyle: "pointer-events:none;" })}
            </div>
          </div>

          <div class="specs-section">
            <div class="specs-title">Configuración del preset</div>
            <div class="specs-grid">${specsHtml}</div>
          </div>

          ${variantsHtml}
        `;
      }

      function selectVariant(id) {
        S.selectedVariantId = id;
        const mainPreset = PRESETS.find((p) => p.id === S.activePresetId);
        if (mainPreset) renderDetailContent(mainPreset);
      }

      // ═══════════════════════════════════════════
      // USE PRESET → localStorage → redirect
      // ═══════════════════════════════════════════
      const BUILDER_PRESET_KEY = "bio_builder_pending_preset";
      const BUILDER_URL = "bio-site-link-builder.html";

      function usePreset() {
        const id = S.selectedVariantId || S.activePresetId;
        const preset = PRESETS.find((p) => p.id === id);
        if (!preset) return;

        localStorage.setItem(BUILDER_PRESET_KEY, JSON.stringify(preset));

        showToast(() => {
          window.location.href = BUILDER_URL;
        });
      }

      function showToast(cb) {
        const t = document.getElementById("toast");
        t.classList.add("show");
        setTimeout(() => {
          t.classList.remove("show");
          if (cb) setTimeout(cb, 300);
        }, 1300);
      }

      // ═══════════════════════════════════════════
      // NAVIGATION
      // ═══════════════════════════════════════════
      function showView(id, dir = "right") {
        document
          .querySelectorAll(".view")
          .forEach((v) =>
            v.classList.remove("active", "view-enter-right", "view-enter-left"),
          );
        const el = document.getElementById(id);
        el.classList.add("active");
        el.classList.add(
          dir === "right" ? "view-enter-right" : "view-enter-left",
        );
      }

      function goBack() {
        showView("viewSearch", "left");
      }

      // ═══════════════════════════════════════════
      // FILTERS
      // ═══════════════════════════════════════════
      function setCat(id) {
        S.cat = id;
        renderPills();
        renderList();
      }

      function handleSearch(val) {
        S.q = val;
        document
          .getElementById("searchClear")
          .classList.toggle("vis", val.length > 0);
        renderList();
      }

      function clearSearch() {
        S.q = "";
        document.getElementById("searchInput").value = "";
        document.getElementById("searchClear").classList.remove("vis");
        renderList();
      }

      // ═══════════════════════════════════════════
      // INIT
      // ═══════════════════════════════════════════
      renderPills();
      renderList();
    </script>
