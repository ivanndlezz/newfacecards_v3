<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Digital Business Card - Dynamic Themes</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="../../shared/styles/purchase.css" />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@500;700&family=JetBrains+Mono:wght@400;700&display=swap");

      :root {
        --app-bg-color: #09090b;
        --app-text-color: #ffffff;
        --app-shell-max-width: 80rem;
        --app-spacing: 1rem;
        --app-stage-height: 550px;
        --card-width: 320px;
        --card-height: 480px;
        --card-radius: 24px;
        --card-padding: 32px 24px;
        --card-avatar-size: 96px;
        --action-bg: rgba(255, 255, 255, 0.1);
        --action-bg-hover: rgba(255, 255, 255, 0.2);
        --action-border: rgba(255, 255, 255, 0.1);
        --action-color: #ffffff;
        --action-font-weight: 500;
        --action-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.25);
        --action-bar-bottom: calc(
          20px + env(safe-area-inset-bottom, 0px) + var(--browser-ui-offset, 0px)
        );
        --action-bar-hidden-bottom: -100px;
        --sheet-surface: #ffffff;
        --sheet-muted: #f4f4f5;
        --sheet-soft: #fafafa;
        --sheet-border: #e4e4e7;
        --sheet-border-strong: #d4d4d8;
        --sheet-text: #18181b;
        --sheet-text-muted: #71717a;
        --sheet-text-subtle: #a1a1aa;
        --sheet-accent: #10b981;
        --sheet-accent-ring: rgba(16, 185, 129, 0.16);
        --sheet-shadow: 0 -12px 34px rgba(24, 24, 27, 0.13);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        min-height: 100dvh;
        width: 100%;
        background-color: var(--app-bg-color);
        color: var(--app-text-color);
        font-family: "Inter", sans-serif;
        overflow: hidden;
        touch-action: pan-y; /* Previene scroll horizontal nativo en móviles */
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      button {
        font: inherit;
      }

      .app {
        position: relative;
        display: flex;
        min-height: 100vh;
        min-height: 100dvh;
        width: 100%;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }

      .app__ambient {
        position: absolute;
        inset: 0;
        z-index: 0;
        overflow: hidden;
        pointer-events: none;
      }

      .app__glow {
        position: absolute;
        width: 40%;
        height: 40%;
        border-radius: 999px;
        filter: blur(120px);
      }

      .app__glow--primary {
        top: -10%;
        left: -10%;
        background: rgba(79, 70, 229, 0.1);
      }

      .app__glow--secondary {
        right: -10%;
        bottom: -10%;
        background: rgba(147, 51, 234, 0.1);
      }

      .app__main {
        position: relative;
        z-index: 10;
        display: flex;
        flex: 1;
        width: 100%;
        max-width: var(--app-shell-max-width);
        margin: 0 auto;
        padding: 0 var(--app-spacing);
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }

      /* Contenedor del Carrusel 3D */
      .carousel-viewport {
        display: flex;
        width: 100%;
        height: var(--app-stage-height);
        align-items: center;
        justify-content: center;
        perspective: 1200px;
        transform-style: preserve-3d;
      }

      .card-track {
        position: relative;
        width: var(--card-width);
        height: var(--card-height);
        transform-style: preserve-3d;
      }

      .card {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        padding: var(--card-padding);
        border: var(--card-border);
        border-radius: var(--card-radius);
        background: var(--card-bg);
        color: var(--card-text-main);
        box-shadow: var(--card-shadow);
        font-family: var(--card-font-family);
        -webkit-backdrop-filter: var(--card-backdrop-filter);
        backdrop-filter: var(--card-backdrop-filter);
        will-change: transform, opacity;
        transition:
          transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1),
          opacity 0.6s ease,
          filter 0.6s ease;
        user-select: none;
      }

      .bio-card__profile {
        display: flex;
        flex: 1;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
      }

      .bio-card__avatar {
        width: var(--card-avatar-size);
        height: var(--card-avatar-size);
        margin-bottom: 1rem;
        padding: 0.5rem;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 999px;
        background: rgba(0, 0, 0, 0.2);
        backdrop-filter: blur(4px);
      }

      .bio-card__avatar-image {
        display: block;
        width: 100%;
        height: 100%;
        border-radius: 999px;
        object-fit: cover;
      }

      .bio-card__name {
        margin: 0 0 0.25rem;
        color: var(--card-text-main);
        font-size: 1.5rem;
        font-weight: var(--card-title-weight);
        line-height: 1.2;
        text-transform: var(--card-title-transform);
        letter-spacing: var(--card-title-letter-spacing);
      }

      .bio-card__role {
        margin: 0 0 0.25rem;
        color: var(--card-text-subtle);
        font-size: 0.875rem;
        font-weight: 500;
        line-height: 1.4;
      }

      .bio-card__location {
        display: flex;
        margin: 0;
        align-items: center;
        gap: 0.25rem;
        color: var(--card-text-subtle);
        font-size: 0.75rem;
        line-height: 1.4;
        opacity: 0.8;
      }

      .bio-card__links {
        display: flex;
        width: 100%;
        margin-top: 1.5rem;
        flex-direction: column;
        gap: 0.75rem;
      }

      .bio-card__link {
        display: flex;
        width: 100%;
        min-height: 3rem;
        align-items: center;
        justify-content: center;
        gap: 0.75rem;
        padding: 0.75rem 1rem;
        border: var(--card-link-border);
        border-radius: 0.75rem;
        background: var(--card-link-bg);
        color: var(--card-link-color);
        font-size: 0.875rem;
        font-weight: 500;
        -webkit-backdrop-filter: var(--card-link-backdrop-filter);
        backdrop-filter: var(--card-link-backdrop-filter);
        transition:
          background-color 0.25s ease,
          transform 0.25s ease;
      }

      .bio-card__link:hover {
        background: var(--card-link-bg-hover);
      }

      .bio-card__label {
        position: absolute;
        top: 1rem;
        right: 1rem;
        color: var(--card-text-main);
        font-size: 0.625rem;
        font-weight: 700;
        line-height: 1;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        opacity: 0.3;
      }

      .more-card {
        align-items: center;
        justify-content: center;
        border: 1px solid rgba(255, 255, 255, 0.18);
        background: rgba(255, 255, 255, 0.08);
        color: #ffffff;
        box-shadow: 0 20px 35px -18px rgba(0, 0, 0, 0.65);
        font-family: "Inter", sans-serif;
        -webkit-backdrop-filter: blur(32px);
        backdrop-filter: blur(32px);
        cursor: pointer;
      }

      .more-card__icon {
        display: grid;
        width: 4rem;
        height: 4rem;
        margin-bottom: 1rem;
        place-items: center;
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.1);
        font-size: 1.5rem;
      }

      .more-card__title {
        margin: 0 0 0.35rem;
        font-size: 1.35rem;
        font-weight: 700;
        line-height: 1.2;
      }

      .more-card__copy {
        max-width: 14rem;
        margin: 0;
        color: rgba(255, 255, 255, 0.68);
        font-size: 0.875rem;
        line-height: 1.45;
        text-align: center;
      }

      /* ===========================================
       ESTADOS DEL MODO EDICIÓN (CARRUSEL)
     ===========================================
    */
      body.app--edit-mode .card--active {
        transform: translateX(0) translateZ(0) scale(1);
        opacity: 1;
        z-index: 10;
        filter: brightness(1);
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      }

      body.app--edit-mode .card--prev {
        transform: translateX(-70%) translateZ(-150px) scale(0.85);
        opacity: 0.4;
        z-index: 5;
        filter: brightness(0.5);
        cursor: pointer;
      }

      body.app--edit-mode .card--next {
        transform: translateX(70%) translateZ(-150px) scale(0.85);
        opacity: 0.4;
        z-index: 5;
        filter: brightness(0.5);
        cursor: pointer;
      }

      body.app--edit-mode .card--hidden {
        transform: translateX(0) translateZ(-300px) scale(0.6);
        opacity: 0;
        z-index: 1;
        pointer-events: none;
      }

      /* ===========================================
       ESTADOS DEL MODO VISTA (SELECCIONADO)
     ===========================================
    */
      body.app--view-mode .card--active {
        transform: translateX(0) translateZ(40px) scale(1.05);
        opacity: 1;
        z-index: 10;
        filter: brightness(1);
        box-shadow:
          0 35px 60px -15px rgba(0, 0, 0, 0.8),
          0 0 40px rgba(255, 255, 255, 0.05);
      }

      /* Ocultar absolutamente todas las demás tarjetas poniéndolas atrás y transparentes */
      body.app--view-mode .card:not(.card--active) {
        transform: translateX(0) translateZ(-200px) scale(0.8);
        opacity: 0;
        z-index: 1;
        pointer-events: none;
        filter: brightness(0);
      }

      /* Utilidades de Transición para los Dots */
      .carousel-dots {
        display: flex;
        height: 1.5rem;
        margin-top: 1rem;
        align-items: center;
        gap: 0.75rem;
        transition:
          opacity 0.4s ease,
          transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      }

      .carousel-dots__dot {
        width: 0.5rem;
        height: 0.5rem;
        padding: 0;
        border: 0;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.3);
        cursor: pointer;
        transition:
          width 0.3s ease,
          background-color 0.3s ease;
      }

      .carousel-dots__dot--active {
        width: 1.5rem;
        background: #ffffff;
      }

      body.app--view-mode #dots-container {
        opacity: 0;
        pointer-events: none;
        transform: translateY(15px);
      }

      body.app--edit-mode #dots-container {
        opacity: 1;
        pointer-events: auto;
        transform: translateY(0);
      }

      .action-bar {
        position: fixed;
        bottom: var(--action-bar-bottom);
        left: 50%;
        z-index: 9999;
        display: flex;
        width: max-content;
        max-width: calc(100vw - 2rem);
        justify-content: center;
        padding: 0;
        transform: translateX(-50%) translateZ(0);
        transition:
          bottom 0.6s cubic-bezier(0.25, 0.1, 0, 1.02),
          opacity 0.24s ease,
          transform 0.24s ease;
      }

      .action-button {
        position: relative;
        display: flex;
        min-height: 3.25rem;
        align-items: center;
        gap: 0.75rem;
        overflow: hidden;
        padding: 0.875rem 2rem;
        border: 1px solid var(--action-border);
        border-radius: 999px;
        background: var(--action-bg);
        color: var(--action-color);
        box-shadow: var(--action-shadow);
        font-weight: var(--action-font-weight);
        cursor: pointer;
        backdrop-filter: blur(24px);
        transition:
          background-color 0.3s ease,
          box-shadow 0.3s ease,
          transform 0.3s ease;
      }

      .action-button:hover {
        background: var(--action-bg-hover);
      }

      .action-button:active {
        transform: scale(0.95);
      }

      .action-button__icon {
        font-size: 0.875rem;
      }

      .action-button--save {
        --action-bg: #10b981;
        --action-bg-hover: #34d399;
        --action-border: transparent;
        --action-color: #022c22;
        --action-font-weight: 700;
        --action-shadow: 0 0 30px rgba(16, 185, 129, 0.3);
      }

      .action-bar--hidden {
        bottom: var(--action-bar-hidden-bottom);
        opacity: 0;
        pointer-events: none;
        transform: translateX(-50%) translateY(1rem) scale(0.96);
      }

      .sheet-overlay {
        position: fixed;
        inset: 0;
        z-index: 40;
        background: linear-gradient(
          0deg,
          rgba(0, 0, 0, 0.42),
          transparent 40%,
          transparent
        );
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.28s ease;
      }

      .sheet-overlay--open {
        opacity: 1;
        pointer-events: auto;
      }

      .theme-sheet {
        position: fixed;
        right: 0;
        bottom: 0;
        left: 0;
        z-index: 50;
        display: flex;
        width: 100%;
        max-width: 31.25rem;
        height: min(45dvh, 720px);
        max-height: 45dvh;
        margin: 0 auto;
        padding: 0.625rem 1rem 0;
        flex-direction: column;
        border: 1px solid var(--sheet-border);
        border-bottom: 0;
        border-radius: 22px 22px 0 0;
        background: var(--sheet-surface);
        color: var(--sheet-text);
        box-shadow: var(--sheet-shadow);
        transform: translateY(110%);
        transition: transform 0.34s cubic-bezier(0.34, 1, 0.64, 1);
      }

      .theme-sheet--open {
        transform: translateY(0);
      }

      .theme-sheet__handle {
        width: 2.625rem;
        height: 0.25rem;
        margin: 0.125rem auto 0.75rem;
        flex-shrink: 0;
        border-radius: 999px;
        background: var(--sheet-border-strong);
      }

      .theme-sheet__header {
        display: flex;
        min-height: 2.25rem;
        margin-bottom: 0.625rem;
        align-items: center;
        justify-content: space-between;
        gap: 0.75rem;
        flex-shrink: 0;
      }

      .theme-sheet__title {
        margin: 0;
        color: var(--sheet-text);
        font-size: 0.95rem;
        font-weight: 750;
        line-height: 1;
        transition:
          opacity 0.18s ease,
          transform 0.18s ease;
      }

      .theme-sheet__header-search {
        position: relative;
        display: none;
        flex: 1;
      }

      .theme-sheet--searching .theme-sheet__title {
        display: none;
      }

      .theme-sheet--searching .theme-sheet__header-search {
        display: block;
      }

      .theme-sheet__close {
        display: grid;
        width: 2rem;
        height: 2rem;
        place-items: center;
        border: 0;
        border-radius: 999px;
        background: transparent;
        color: var(--sheet-text-subtle);
        cursor: pointer;
        transition:
          background-color 0.2s ease,
          color 0.2s ease;
      }

      .theme-sheet__close:hover {
        background: var(--sheet-muted);
        color: var(--sheet-text);
      }

      .theme-sheet__content {
        flex: 1;
        min-height: 0;
        overflow-y: auto;
        padding: 0 0.125rem calc(1.5rem + env(safe-area-inset-bottom));
        overscroll-behavior: contain;
        scrollbar-width: thin;
        scrollbar-color: var(--sheet-border-strong) transparent;
      }

      .theme-sheet__content::-webkit-scrollbar {
        width: 5px;
      }

      .theme-sheet__content::-webkit-scrollbar-thumb {
        border-radius: 10px;
        background: var(--sheet-border-strong);
      }

      .theme-strip::-webkit-scrollbar {
        display: none;
      }

      .theme-sheet__section {
        margin-bottom: 1rem;
      }

      .theme-sheet__section-title {
        margin: 0 0 0.625rem;
        color: var(--sheet-text);
        font-size: 0.75rem;
        font-weight: 700;
        letter-spacing: 0;
      }

      .theme-sheet__search {
        position: relative;
        margin-bottom: 1rem;
      }

      .theme-sheet__search--hidden {
        display: none;
      }

      .theme-sheet__search-trigger {
        width: 100%;
        padding: 0.625rem 0.75rem 0.625rem 2.35rem;
        border: 1px solid var(--sheet-border);
        border-radius: 8px;
        outline: 0;
        background: var(--sheet-surface);
        color: var(--sheet-text-subtle);
        font-size: 0.8125rem;
        font-weight: 600;
        text-align: left;
        cursor: pointer;
        transition:
          border-color 0.2s ease,
          box-shadow 0.2s ease;
      }

      .theme-sheet__search-trigger:hover {
        border-color: var(--sheet-border-strong);
      }

      .theme-sheet__search-icon {
        position: absolute;
        top: 50%;
        left: 0.875rem;
        color: var(--sheet-text-subtle);
        font-size: 0.875rem;
        transform: translateY(-50%);
      }

      .theme-sheet__input {
        width: 100%;
        padding: 0.625rem 0.75rem 0.625rem 2.35rem;
        border: 1px solid var(--sheet-border);
        border-radius: 8px;
        outline: 0;
        background: var(--sheet-surface);
        color: var(--sheet-text);
        font-size: 0.8125rem;
        font-weight: 600;
        transition:
          border-color 0.2s ease,
          box-shadow 0.2s ease;
      }

      .theme-sheet__input:focus {
        border-color: var(--sheet-accent);
        box-shadow: 0 0 0 4px var(--sheet-accent-ring);
      }

      .theme-strip {
        display: flex;
        gap: 0.75rem;
        margin: 0 -0.25rem;
        padding: 0.25rem;
        overflow-x: auto;
        scrollbar-width: none;
      }

      .theme-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 0.75rem;
      }

      .theme-option {
        position: relative;
        display: flex;
        min-width: 88px;
        overflow: hidden;
        flex-direction: column;
        justify-content: space-between;
        padding: 0.5rem;
        border: 2px solid var(--sheet-border);
        border-radius: 14px;
        background: var(--sheet-surface);
        color: var(--sheet-text);
        cursor: pointer;
        transition:
          border-color 0.2s ease,
          box-shadow 0.2s ease,
          transform 0.05s ease;
      }

      .theme-option:hover {
        border-color: var(--sheet-border-strong);
      }

      .theme-option:active {
        transform: scale(0.995);
      }

      .theme-option--owned {
        width: 90px;
        aspect-ratio: 4 / 5;
        flex-shrink: 0;
      }

      .theme-option--market {
        aspect-ratio: 4 / 5;
      }

      .theme-option--selected {
        border-color: var(--sheet-accent);
        box-shadow: 0 0 0 4px var(--sheet-accent-ring);
      }

      .theme-option__radio {
        position: absolute;
        top: 0.5rem;
        right: 0.5rem;
        display: grid;
        width: 1.375rem;
        height: 1.375rem;
        place-items: center;
        border: 2px solid rgba(255, 255, 255, 0.72);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.86);
        color: var(--sheet-accent);
        box-shadow: 0 1px 3px rgba(24, 24, 27, 0.16);
      }

      .theme-option__dot {
        width: 0.625rem;
        height: 0.625rem;
        border-radius: 999px;
        background: currentColor;
        opacity: 0;
      }

      .theme-option--selected .theme-option__dot {
        opacity: 1;
      }

      .theme-option__spacer {
        flex: 1;
        width: 100%;
        min-height: 3.25rem;
        margin-bottom: 0.5rem;
        border-radius: 10px;
        background: var(--option-bg);
        box-shadow:
          inset 0 10px 20px rgba(255, 255, 255, 0.12),
          0 2px 4px rgba(24, 24, 27, 0.04);
      }

      .theme-option__name {
        width: 100%;
        color: var(--sheet-text);
        font-size: 0.75rem;
        font-weight: 600;
        line-height: 1.2;
        text-align: center;
      }

      .theme-option__price {
        margin-top: 0.25rem;
        color: var(--sheet-text-muted);
        font-size: 0.6875rem;
        font-weight: 700;
        text-align: center;
      }

      .theme-sheet__empty {
        display: none;
        margin: 0;
        padding: 0.875rem;
        border-radius: 14px;
        background: var(--sheet-muted);
        color: var(--sheet-text-muted);
        font-size: 0.8125rem;
        text-align: center;
      }

      .theme-sheet__empty--visible {
        display: block;
      }

      .purchase-overlay {
        position: fixed;
        inset: 0;
        z-index: 90;
        background: rgba(0, 0, 0, 0.4);
        opacity: 0;
        pointer-events: none;
        backdrop-filter: blur(4px);
        transition: opacity var(--transition-base);
      }

      .purchase-overlay.open {
        opacity: 1;
        pointer-events: auto;
      }

      .purchase-sheet {
        position: fixed;
        top: 0;
        right: 0;
        bottom: 0;
        z-index: 100;
        display: flex;
        width: 100%;
        max-width: var(--sheet-w);
        flex-direction: column;
        background: var(--color-bg-primary);
        box-shadow: -10px 0 40px rgba(0, 0, 0, 0.1);
        transform: translateX(100%);
        transition: transform var(--transition-base);
      }

      .purchase-sheet.open {
        transform: translateX(0);
      }

      .purchase-item-preview {
        width: 54px;
        height: 68px;
        flex: 0 0 auto;
        border-radius: 14px;
        background: var(--purchase-preview-bg);
        box-shadow:
          inset 0 10px 20px rgba(255, 255, 255, 0.14),
          0 4px 12px rgba(0, 0, 0, 0.08);
      }

      @media (prefers-color-scheme: dark) {
        .theme-sheet {
          --sheet-surface: #18181b;
          --sheet-muted: #27272a;
          --sheet-soft: #1f1f23;
          --sheet-border: #3f3f46;
          --sheet-border-strong: #52525b;
          --sheet-text: #f4f4f5;
          --sheet-text-muted: #a1a1aa;
          --sheet-text-subtle: #71717a;
          --sheet-shadow: 0 -12px 34px rgba(0, 0, 0, 0.34);
        }
      }
    </style>
  </head>

      const RECENT_THEMES_STORAGE_KEY = "select-theme-1:recent-theme-ids";
      const DEFAULT_RECENT_THEME_IDS = [
        "theme-glass",
        "theme-cyber",
        "theme-minimal",
      ];

      // Estado Global (Falso = Modo Vista, Verdadero = Modo Edición)
      let isEditMode = false;

      function isCurrentCardMore() {
        return cards[currentIndex]?.dataset.cardType === "more";
      }

      function getCurrentCardThemeId() {
        return cards[currentIndex]?.dataset.themeId || selectedThemeId;
      }

      function isCurrentCardThemeOwned() {
        return Boolean(getThemeById(getCurrentCardThemeId()));
      }

      function getCurrentMarketplaceTheme() {
        return getMarketplaceThemeById(getCurrentCardThemeId());
      }

      function syncActionButtonState() {
        actionBar.classList.toggle("action-bar--hidden", isCurrentCardMore());

        if (isEditMode) {
          actionBtn.classList.add("action-button--save");

          if (isCurrentCardThemeOwned()) {
            actionIcon.innerHTML = '<i class="fa-solid fa-check"></i>';
            actionText.innerText = "Guardar Selección";
          } else {
            actionIcon.innerHTML = '<i class="fa-solid fa-bag-shopping"></i>';
            actionText.innerText = "Comprar";
          }
        } else {
          actionBtn.classList.remove("action-button--save");
          actionIcon.innerHTML = '<i class="fa-solid fa-pen"></i>';
          actionText.innerText = "Editar Diseño";
        }
      }

      function getThemeById(themeId) {
        return themesData.find((theme) => theme.id === themeId);
      }

      function getMarketplaceThemeById(themeId) {
        return marketplaceThemesData.find((theme) => theme.id === themeId);
      }

      function getSelectableThemeById(themeId) {
        return getThemeById(themeId) || getMarketplaceThemeById(themeId);
      }

      function getStoredRecentThemeIds() {
        let storedThemeIds = [];

        try {
          storedThemeIds =
            JSON.parse(localStorage.getItem(RECENT_THEMES_STORAGE_KEY)) || [];
        } catch (error) {
          storedThemeIds = [];
        }

        const validThemeIds = themesData.map((theme) => theme.id);
        const uniqueStoredIds = storedThemeIds.filter(
          (themeId, index, list) =>
            validThemeIds.includes(themeId) && list.indexOf(themeId) === index,
        );

        const filledThemeIds = [
          ...uniqueStoredIds,
          ...DEFAULT_RECENT_THEME_IDS.filter(
            (themeId) => !uniqueStoredIds.includes(themeId),
          ),
        ];

        return filledThemeIds.slice(0, 3);
      }

      function persistRecentThemeIds() {
        localStorage.setItem(
          RECENT_THEMES_STORAGE_KEY,
          JSON.stringify(recentThemeIds),
        );
      }

      function getRecentThemes() {
        return recentThemeIds.map(getThemeById).filter(Boolean);
      }

      function getVisibleThemes() {
        const selectedTheme = getSelectableThemeById(selectedThemeId);
        const recentThemes = getRecentThemes().filter(
          (theme) => theme.id !== selectedThemeId,
        );

        return [selectedTheme || getRecentThemes()[0], ...recentThemes]
          .filter(Boolean)
          .slice(0, 3);
      }

      function applyThemeVariables(element, variables) {
        Object.entries(variables).forEach(([property, value]) => {
          element.style.setProperty(property, value);
        });
      }

      function buildBioCardMarkup(theme) {
        return `
          <div class="bio-card__profile">
            <div class="bio-card__avatar">
              <img src="${BIO_PROFILE_DATA.avatar}" alt="Avatar" class="bio-card__avatar-image">
            </div>

            <p class="bio-card__role">${BIO_PROFILE_DATA.role}</p>
            <p class="bio-card__location">
              <i class="fa-solid fa-location-dot"></i> ${BIO_PROFILE_DATA.location}
            </p>
          </div>
          <div class="bio-card__links">
            ${BIO_PROFILE_DATA.links
              .map(
                (link) => `
              <a href="${link.url}" class="bio-card__link">
                <i class="${link.icon}"></i>
                <span>${link.title}</span>
              </a>
            `,
              )
              .join("")}
          </div>
          <div class="bio-card__label">
            ${theme.name}
          </div>
        `;
      }

      function buildMoreCardMarkup() {
        return `
          <div class="more-card__icon">
            <i class="fa-solid fa-plus"></i>
          </div>
          <h2 class="more-card__title">Más temas</h2>
          <p class="more-card__copy">Busca tus temas y descubre nuevos estilos para comprar.</p>
        `;
      }

      // Renderizar las tarjetas
      function renderCards() {
        stage.innerHTML = "";
        dotsContainer.innerHTML = "";
        cards = [];
        dots = [];

        const visibleItems = [
          { type: "more" },
          ...getVisibleThemes().map((theme) => ({ type: "theme", theme })),
          { type: "more" },
        ];

        currentIndex = Math.max(
          0,
          Math.min(currentIndex, visibleItems.length - 1),
        );

        visibleItems.forEach((item, index) => {
          // Crear Tarjeta
          const cardEl = document.createElement("div");
          cardEl.dataset.cardType = item.type;

          if (item.type === "theme") {
            cardEl.className = `card bio-card bio-card--${item.theme.id}`;
            cardEl.dataset.themeId = item.theme.id;
            applyThemeVariables(cardEl, item.theme.variables);
            cardEl.innerHTML = buildBioCardMarkup(item.theme);
          } else {
            cardEl.className = "card more-card";
            cardEl.innerHTML = buildMoreCardMarkup();
          }

          cardEl.addEventListener("click", () => {
            if (item.type === "more") {
              openThemeSheet();
              return;
            }

            if (!isEditMode || isTransitioning) return;

            if (index === currentIndex) {
              return;
            }

            selectTheme(item.theme.id, { keepSheetOpen: true });
          });

          stage.appendChild(cardEl);
          cards.push(cardEl);

          // Crear Dot (Punto indicador)
          const dot = document.createElement("button");
          dot.className = "carousel-dots__dot";
          dot.type = "button";
          dot.setAttribute(
            "aria-label",
            item.type === "theme"
              ? `Seleccionar tema ${item.theme.name}`
              : "Abrir más temas",
          );
          dot.addEventListener("click", () => {
            if (item.type === "more") {
              openThemeSheet();
              return;
            }

            if (isEditMode && !isTransitioning) goToIndex(index);
          });
          dotsContainer.appendChild(dot);
          dots.push(dot);
        });

        updateClasses();
      }

      // Actualizar clases de posiciones (prev, active, next, hidden)
      function updateClasses() {
        cards.forEach((card, index) => {
          card.classList.remove(
            "card--active",
            "card--prev",
            "card--next",
            "card--hidden",
          );
          dots[index].classList.remove("carousel-dots__dot--active");

          if (index === currentIndex) {
            card.classList.add("card--active");
            dots[index].classList.add("carousel-dots__dot--active");
          } else if (index === currentIndex - 1) {
            card.classList.add("card--prev");
          } else if (index === currentIndex + 1) {
            card.classList.add("card--next");
          } else {
            card.classList.add("card--hidden");
          }
        });
      }

      // Navegar a un índice específico
      function goToIndex(newIndex) {
        if (isTransitioning) return;
        const boundedIndex = Math.max(0, Math.min(newIndex, cards.length - 1));
        if (boundedIndex === currentIndex) return;

        isTransitioning = true;
        currentIndex = boundedIndex;
        updateClasses();
        syncActionButtonState();
        setTimeout(() => {
          isTransitioning = false;
        }, 600); // Coincide con la transición CSS
      }

      function selectTheme(themeId, options = {}) {
        const selectedTheme = getSelectableThemeById(themeId);
        if (!selectedTheme) return;

        selectedThemeId = themeId;

        if (getThemeById(themeId)) {
          recentThemeIds = [
            themeId,
            ...recentThemeIds.filter(
              (recentThemeId) => recentThemeId !== themeId,
            ),
          ].slice(0, 3);

          persistRecentThemeIds();
        }

        currentIndex = 1;
        renderCards();
        renderThemeSheet();
        syncActionButtonState();
        if (!options.keepSheetOpen) closeThemeSheet();
      }

      function getThemePreview(theme) {
        return {
          "--option-bg": theme.variables["--card-bg"],
          "--option-color": theme.variables["--card-text-main"],
        };
      }

      function createThemeOption(theme, type) {
        const option = document.createElement("button");
        option.className = `theme-option theme-option--${type}`;
        option.type = "button";
        option.dataset.themeId = theme.id;
        option.setAttribute("aria-label", `Seleccionar ${theme.name}`);

        if (theme.id === selectedThemeId) {
          option.classList.add("theme-option--selected");
        }

        applyThemeVariables(
          option,
          type === "owned" ? getThemePreview(theme) : theme.preview,
        );

        option.innerHTML = `
          <span class="theme-option__radio">
            <span class="theme-option__dot"></span>
          </span>
          <span class="theme-option__spacer"></span>
          <span class="theme-option__name">${theme.name}</span>
          ${
            type === "market"
              ? `<span class="theme-option__price">${theme.price}</span>`
              : ""
          }
        `;

        option.addEventListener("click", () => {
          selectTheme(theme.id, { keepSheetOpen: true });
        });

        return option;
      }

      function renderThemeSheet() {
        const query = searchInput.value.trim().toLowerCase();
        const ownedThemes = themesData.filter((theme) =>
          theme.name.toLowerCase().includes(query),
        );
        const marketplaceThemes = marketplaceThemesData.filter((theme) =>
          theme.name.toLowerCase().includes(query),
        );

        acquiredThemesList.innerHTML = "";
        presetList.innerHTML = "";

        ownedThemes.forEach((theme) => {
          acquiredThemesList.appendChild(createThemeOption(theme, "owned"));
        });

        marketplaceThemes.forEach((theme) => {
          presetList.appendChild(createThemeOption(theme, "market"));
        });

        themeEmptyState.classList.toggle(
          "theme-sheet__empty--visible",
          ownedThemes.length === 0 && marketplaceThemes.length === 0,
        );
      }

      function openThemeSheet() {
        currentIndex = 1;
        updateClasses();
        syncActionButtonState();
        renderThemeSheet();
        sheetOverlay.hidden = false;
        themeSheet.hidden = false;

        requestAnimationFrame(() => {
          sheetOverlay.classList.add("sheet-overlay--open");
          themeSheet.classList.add("theme-sheet--open");
        });
      }

      function closeThemeSheet() {
        sheetOverlay.classList.remove("sheet-overlay--open");
        themeSheet.classList.remove("theme-sheet--open");
        themeSheet.classList.remove("theme-sheet--searching");
        themeSearchMockup.classList.remove("theme-sheet__search--hidden");
        searchInput.value = "";
        renderThemeSheet();

        setTimeout(() => {
          sheetOverlay.hidden = true;
          themeSheet.hidden = true;
        }, 340);
      }

      function activateThemeSearch() {
        themeSearchMockup.classList.add("theme-sheet__search--hidden");
        themeSheet.classList.add("theme-sheet--searching");

        requestAnimationFrame(() => {
          searchInput.focus();
        });
      }

      function openPurchaseSheet() {
        const theme = getCurrentMarketplaceTheme();
        if (!theme) return;

        purchaseChipValue.innerText = theme.name;
        purchaseItemName.innerText = theme.name;
        purchaseItemPrice.innerText = theme.price;
        purchaseTotal.innerText = theme.price;
        purchaseChipDot.style.background = theme.preview["--option-bg"];
        purchaseItemPreview.style.setProperty(
          "--purchase-preview-bg",
          theme.preview["--option-bg"],
        );

        purchaseOverlay.hidden = false;
        purchaseSheet.hidden = false;

        requestAnimationFrame(() => {
          purchaseOverlay.classList.add("open");
          purchaseSheet.classList.add("open");
        });
      }

      function closePurchaseSheet() {
        purchaseOverlay.classList.remove("open");
        purchaseSheet.classList.remove("open");

        setTimeout(() => {
          purchaseOverlay.hidden = true;
          purchaseSheet.hidden = true;
        }, 320);
      }

      // Inicializar Render
      renderCards();
      renderThemeSheet();

      // ==========================================
      // LÓGICA DE BOTÓN MODO VISTA/EDICIÓN
      // ==========================================
      const actionBtn = document.getElementById("action-btn");
      const actionBar = document.querySelector(".action-bar");
      const actionIcon = document.getElementById("action-icon");
      const actionText = document.getElementById("action-text");

      function syncActionBarViewportOffset() {
        const viewport = window.visualViewport;
        const browserUiOffset = viewport
          ? Math.min(
              120,
              Math.max(
                0,
                Math.round(
                  window.innerHeight - viewport.height - viewport.offsetTop,
                ),
              ),
            )
          : 0;

        document.documentElement.style.setProperty(
          "--browser-ui-offset",
          `${browserUiOffset}px`,
        );
      }

      syncActionBarViewportOffset();
      window.visualViewport?.addEventListener(
        "resize",
        syncActionBarViewportOffset,
      );
      window.visualViewport?.addEventListener(
        "scroll",
        syncActionBarViewportOffset,
      );
      window.addEventListener("orientationchange", syncActionBarViewportOffset);

      actionBtn.addEventListener("click", () => {
        if (isEditMode && !isCurrentCardThemeOwned() && !isCurrentCardMore()) {
          openPurchaseSheet();
          return;
        }

        isEditMode = !isEditMode;
        const bodyCls = document.body.classList;

        if (isEditMode) {
          // Pasar a MODO EDICIÓN: Mostramos el carrusel y los dots
          bodyCls.remove("app--view-mode");
          bodyCls.add("app--edit-mode");
        } else {
          // Pasar a MODO VISTA: Ocultamos el resto de tarjetas
          bodyCls.remove("app--edit-mode");
          bodyCls.add("app--view-mode");
        }

        syncActionButtonState();
      });

      closeSheetBtn.addEventListener("click", closeThemeSheet);
      sheetOverlay.addEventListener("click", closeThemeSheet);
      themeSearchTrigger.addEventListener("click", activateThemeSearch);
      searchInput.addEventListener("input", renderThemeSheet);
      purchaseCloseBtn.addEventListener("click", closePurchaseSheet);
      purchaseOverlay.addEventListener("click", closePurchaseSheet);

      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape" && !themeSheet.hidden) closeThemeSheet();
        if (e.key === "Escape" && !purchaseSheet.hidden) closePurchaseSheet();
      });

      // ==========================================
      // CONTROLES DE NAVEGACIÓN (Solo activos en Edit Mode)
      // ==========================================
      const viewport = document.getElementById("carousel-viewport");

      // 1. Teclado
      document.addEventListener("keydown", (e) => {
        if (!isEditMode || isTransitioning) return;
        if (e.key === "ArrowRight") goToIndex(currentIndex + 1);
        if (e.key === "ArrowLeft") goToIndex(currentIndex - 1);
      });

      // 2. Scroll (Trackpad / Mouse Wheel)
      let wheelAccumulator = 0;
      let isWheelOnCooldown = false;

      viewport.addEventListener(
        "wheel",
        (e) => {
          if (!isEditMode) return; // Si no estamos editando, no hacer nada

          const delta =
            Math.abs(e.deltaX) > Math.abs(e.deltaY) ? e.deltaX : e.deltaY;
          if (Math.abs(delta) > 5) e.preventDefault();

          if (isWheelOnCooldown || isTransitioning) return;

          wheelAccumulator += delta;

          if (wheelAccumulator > 60) {
            goToIndex(currentIndex + 1);
            triggerWheelCooldown();
          } else if (wheelAccumulator < -60) {
            goToIndex(currentIndex - 1);
            triggerWheelCooldown();
          }
        },
        { passive: false },
      );

      function triggerWheelCooldown() {
        wheelAccumulator = 0;
        isWheelOnCooldown = true;
        setTimeout(() => {
          isWheelOnCooldown = false;
          wheelAccumulator = 0;
        }, 400);
      }

      // 3. Gestos (Swipe / Arrastre con mouse)
      let startX = 0;
      let isDragging = false;

      function getPositionX(e) {
        if (e.type.includes("mouse")) {
          return e.clientX;
        } else {
          return e.type.includes("end")
            ? e.changedTouches[0].clientX
            : e.touches[0].clientX;
        }
      }

      function touchStart(e) {
        if (!isEditMode) return; // Si estamos en modo vista, no permitir arrastre
        isDragging = true;
        startX = getPositionX(e);
      }

      function touchEnd(e) {
        if (!isDragging || !isEditMode) return;
        isDragging = false;
        const endX = getPositionX(e);
        const diffX = startX - endX;

        if (Math.abs(diffX) > 50 && !isTransitioning) {
          if (diffX > 0) goToIndex(currentIndex + 1);
          else goToIndex(currentIndex - 1);
        }
      }

      viewport.addEventListener("mousedown", touchStart);
      viewport.addEventListener("mouseup", touchEnd);
      viewport.addEventListener("mouseleave", () => (isDragging = false));

      viewport.addEventListener("touchstart", touchStart, { passive: true });
      viewport.addEventListener("touchend", touchEnd);
    </script>
  </body>
</html>
